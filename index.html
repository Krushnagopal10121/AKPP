// SNAKE & LADDER
// ════════════════════════════════════════════════════════════════
const SL_SNAKES={98:79,95:56,87:24,64:21,62:19,54:34,17:7};
const SL_LADDERS={4:14,9:31,20:38,28:84,40:59,51:67,63:81,71:91};
const SL_SMSG={98:"An argument sent us apart 💔",95:"A moment of distance 🌧",87:"A long stretch apart 😔",64:"A misunderstanding 🥺",62:"The distance hurt 😭",54:"A quiet sadness 💧",17:"A small fight 😢"};
const SL_LMSG={4:"Our first real conversation 💬",9:"You laughed at my bad joke 😂",20:"A midnight phone call 🌙",28:"Our first trip together ✈️",40:"A night I'll never forget ✨",51:"When I knew it was you 💛",63:"Our favourite song came on 🎵",71:"You said yes 💕"};
const SL_INIT={p1:0,p2:0,turn:1,dice:null,lastMsg:"",winner:null,ts:0};

const SZ=32;
function sqToXY(sq){
  const idx=sq-1,row=Math.floor(idx/10);
  const col=row%2===0?idx%10:9-(idx%10);
  return{x:col*SZ+SZ/2,y:(9-row)*SZ+SZ/2};
}

function SLBoard({gs}){
  const cells=[];
  // Cells
  for(let r=0;r<10;r++){for(let c=0;c<10;c++){
    const row=9-r,col=row%2===0?c:9-c;
    const sq=row*10+col+1;
    const isSn=SL_SNAKES[sq]!==undefined,isLd=SL_LADDERS[sq]!==undefined;
    const even=(r+c)%2===0;
    let fill=even?"rgba(255,245,215,0.07)":"rgba(20,8,40,0.55)";
    if(isSn)fill="rgba(180,30,30,0.28)";
    if(isLd)fill="rgba(40,160,60,0.28)";
    cells.push(
      <g key={"cell"+sq}>
        <rect x={c*SZ} y={r*SZ} width={SZ} height={SZ} fill={fill} stroke="rgba(212,160,64,0.06)" strokeWidth="0.5"/>
        <text x={c*SZ+3} y={r*SZ+10} fontSize="8" fill="rgba(205,180,120,0.28)" fontFamily="serif">{sq}</text>
      </g>
    );
  }}
  // Draw ladders
  Object.entries(SL_LADDERS).forEach(([from,to])=>{
    const f=sqToXY(+from),t=sqToXY(+to);
    const dx=t.x-f.x,dy=t.y-f.y,len=Math.sqrt(dx*dx+dy*dy);
    const ux=dx/len*4,uy=dy/len*4,nx=-uy,ny=ux;
    const steps=4;
    cells.push(
      <g key={"lad"+from} opacity="0.75">
        <line x1={f.x+nx} y1={f.y+ny} x2={t.x+nx} y2={t.y+ny} stroke="#d4a040" strokeWidth="2" strokeLinecap="round"/>
        <line x1={f.x-nx} y1={f.y-ny} x2={t.x-nx} y2={t.y-ny} stroke="#d4a040" strokeWidth="2" strokeLinecap="round"/>
        {Array.from({length:steps},(_,i)=>{
          const p=(i+1)/(steps+1);
          const rx=f.x+nx+dx*p, ry=f.y+ny+dy*p, lx=f.x-nx+dx*p, ly=f.y-ny+dy*p;
          return<line key={i} x1={rx} y1={ry} x2={lx} y2={ly} stroke="#d4a040" strokeWidth="1.5" strokeLinecap="round"/>;
        })}
        <circle cx={f.x} cy={f.y} r="4" fill="#d4a040" opacity="0.6"/>
        <circle cx={t.x} cy={t.y} r="3" fill="#d4a040" opacity="0.4"/>
      </g>
    );
  });
  // Draw snakes
  Object.entries(SL_SNAKES).forEach(([from,to])=>{
    const f=sqToXY(+from),t=sqToXY(+to);
    const mx=(f.x+t.x)/2+(f.y>t.y?28:-28);
    const my=(f.y+t.y)/2+(f.x>t.x?-18:18);
    cells.push(
      <g key={"sn"+from} opacity="0.8">
        <path d={"M"+f.x+","+f.y+" Q"+mx+","+my+" "+t.x+","+t.y}
          fill="none" stroke="#cc3333" strokeWidth="3.5" strokeLinecap="round"/>
        <path d={"M"+f.x+","+f.y+" Q"+mx+","+my+" "+t.x+","+t.y}
          fill="none" stroke="rgba(255,80,80,0.35)" strokeWidth="5.5" strokeLinecap="round"/>
        {/* Snake head */}
        <circle cx={f.x} cy={f.y} r="5.5" fill="#cc3333"/>
        <circle cx={f.x-2} cy={f.y-2} r="1.5" fill="#ff9999"/>
        <circle cx={f.x+2} cy={f.y-2} r="1.5" fill="#ff9999"/>
      </g>
    );
  });
  // Tokens
  if(gs.p1>0&&gs.p1<=100){const p=sqToXY(gs.p1);cells.push(<circle key="tok1" cx={p.x-5} cy={p.y} r="7" fill={P1C} stroke="#fff" strokeWidth="1.5" style={{filter:"drop-shadow(0 0 5px "+P1C+")"}}/>);}
  if(gs.p2>0&&gs.p2<=100){const p=sqToXY(gs.p2);cells.push(<circle key="tok2" cx={p.x+5} cy={p.y} r="7" fill={P2C} stroke="#fff" strokeWidth="1.5" style={{filter:"drop-shadow(0 0 5px "+P2C+")"}}/>);}
  // Border
  cells.push(<rect key="bdr" x="0" y="0" width={SZ*10} height={SZ*10} fill="none" stroke="rgba(212,160,64,0.35)" strokeWidth="2"/>);
  return(
    <svg width={SZ*10} height={SZ*10} viewBox={"0 0 "+(SZ*10)+" "+(SZ*10)} style={{maxWidth:"min("+(SZ*10)+"px,96vw)",display:"block",background:"#0a0318",borderRadius:4}}>
      {cells}
    </svg>
  );
}

function SnakeLadder({onBack}){
  const [gs,setGs]=useState(SL_INIT);
  const [myP,setMyP]=useState(0);
  const [rolling,setRolling]=useState(false);
  const [chatOpen,setChatOpen]=useState(false);
  const [roomCode,setRoomCode]=useState("");
  const [toast,showToast]=useToast();
  const CHAT_PATH=(rc)=>"/rooms/"+rc+"/sl_chat";
  const PRES_PATH=(rc)=>"/rooms/"+rc+"/sl_pres";
  const PFBS=(rc)=>"/rooms/"+rc+"/sl_state";

  useEffect(()=>{
    if(!myP||!roomCode)return;
    const iv=setInterval(async()=>{
      const d=await fbGet(PFBS(roomCode));
      if(d&&d.ts!==gs.ts)setGs(d);
    },2200);
    return()=>clearInterval(iv);
  },[myP,roomCode,gs.ts]);



  const roll=async()=>{
    if(rolling||gs.winner||gs.turn!==myP)return;
    setRolling(true);
    await new Promise(r=>setTimeout(r,900));
    const d=Math.floor(Math.random()*6)+1;
    let p1=gs.p1,p2=gs.p2,msg="Rolled "+d;
    const move=(cur)=>{
      let nx=cur+d;
      if(nx>100)return{pos:cur,extra:" — Too far!"};
      if(SL_SNAKES[nx]!==undefined)return{pos:SL_SNAKES[nx],extra:" 🐍 "+(SL_SMSG[nx]||"Snake!")};
      if(SL_LADDERS[nx]!==undefined)return{pos:SL_LADDERS[nx],extra:" 🪜 "+(SL_LMSG[nx]||"Ladder!")};
      return{pos:nx,extra:nx===100?" 🎉 Reached 100!":""};
    };
    let extra="";
    if(myP===1){const r=move(p1);p1=r.pos;extra=r.extra;}
    else{const r=move(p2);p2=r.pos;extra=r.extra;}
    if(extra)showToast(extra, extra.includes("🐍")?"snake":extra.includes("🪜")?"ladder":"info");
    const winner=p1>=100?1:p2>=100?2:null;
    const ng={p1,p2,turn:myP===1?2:1,dice:d,lastMsg:msg+extra,winner,ts:Date.now()};
    await fbSet(PFBS(roomCode),ng);setGs(ng);setRolling(false);
  };

  if(!myP)return(
    <div className="lk-screen">
      <button className="lk-back" onClick={onBack}>← Back</button>
      <RoomGate gameKey="sl" gameTitle="Snake &amp; Ladder" gameIcon="🐍" initState={SL_INIT}
        onJoined={async(p,rc)=>{
          if(!p){onBack();return;}
          setMyP(p);setRoomCode(rc);
          const fresh=await fbGet(PFBS(rc));
          if(fresh)setGs(fresh);
        }}/>
    </div>
  );

  const myTurn=gs.turn===myP;
  const myPos=myP===1?gs.p1:gs.p2;
  const herPos=myP===1?gs.p2:gs.p1;

  return(
    <div className="lk-screen sl-screen">
      <div className="lk-topbar">
        <button className="lk-back sm" onClick={onBack}>← Games</button>
        <GamePresenceBar myP={myP} presPath={PRES_PATH(roomCode)}/>
      </div>

      {gs.winner&&(
        <div className="lk-winner-banner">
          {gs.winner===myP?"🎉 You won! 🔴":"🟢 She won!"}
          <button className="lk-reset-btn" onClick={async()=>{
            const r={...SL_INIT,ts:Date.now()};
            await fbSet(PFBS(roomCode),r);setGs(r);setMyP(0);setRoomCode("");
          }}>Play Again</button>
        </div>
      )}

      <Toast msg={toast?.msg} type={toast?.type}/>

      <div className="sl-layout">
        <SLBoard gs={gs}/>
        <div className="sl-ctrl">
          <div className="sl-scores">
            <div className="sl-score-card" style={{borderColor:P1C}}>
              <div style={{color:P1C,fontSize:".75rem",fontFamily:"'Cinzel Decorative',cursive"}}>🔴 {myP===1?"You":"Her"}</div>
              <div style={{color:"#d4a040",fontSize:"1.5rem",fontFamily:"'Cinzel Decorative',cursive"}}>{myP===1?gs.p1:gs.p2}</div>
              <div style={{color:"rgba(205,180,120,.3)",fontSize:".65rem",fontStyle:"italic"}}>sq / 100</div>
            </div>
            <div className="sl-score-card" style={{borderColor:P2C}}>
              <div style={{color:P2C,fontSize:".75rem",fontFamily:"'Cinzel Decorative',cursive"}}>🟢 {myP===1?"Her":"You"}</div>
              <div style={{color:"#d46fa0",fontSize:"1.5rem",fontFamily:"'Cinzel Decorative',cursive"}}>{myP===1?gs.p2:gs.p1}</div>
              <div style={{color:"rgba(205,180,120,.3)",fontSize:".65rem",fontStyle:"italic"}}>sq / 100</div>
            </div>
          </div>
          <div className="sl-turn" style={{color:myTurn?"#d4a040":"rgba(205,180,120,0.35)",borderColor:myTurn?"rgba(212,160,64,0.35)":"rgba(212,160,64,0.08)"}}>
            {myTurn?"✨ Your turn":"⏳ Her turn…"}
          </div>
          <DiceFace value={gs.dice} rolling={rolling} canRoll={myTurn&&!rolling&&!gs.winner} onRoll={roll} color={myP===1?P1C:P2C}/>
          {gs.lastMsg&&<div className="sl-msg">{gs.lastMsg}</div>}
        </div>
      </div>
      <ChatPanel myP={myP} chatPath={CHAT_PATH(roomCode)} presPath={PRES_PATH(roomCode)} open={chatOpen} onClose={()=>setChatOpen(s=>!s)}/>
    </div>
  );
}

// TIC TAC TOE
// ════════════════════════════════════════════════════════════════
const TTT_INIT={board:Array(9).fill(null),turn:1,winner:null,draw:false,ts:0};
const TTT_LINES=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function tttCheck(b){for(const [a,c,d] of TTT_LINES){if(b[a]&&b[a]===b[c]&&b[a]===b[d])return b[a];}return null;}

function TicTacToe({onBack}){
  const [gs,setGs]=useState(TTT_INIT);
  const [myP,setMyP]=useState(0);
  const [roomCode,setRoomCode]=useState("");
  const [chatOpen,setChatOpen]=useState(false);
  const [toast,showToast]=useToast();
  const CHAT_PATH=(rc)=>"/rooms/"+rc+"/ttt_chat";
  const PRES_PATH=(rc)=>"/rooms/"+rc+"/ttt_pres";
  const PFBS=(rc)=>"/rooms/"+rc+"/ttt_state";

  useEffect(()=>{
    if(!myP||!roomCode)return;
    const iv=setInterval(async()=>{const d=await fbGet(PFBS(roomCode));if(d&&d.ts!==gs.ts)setGs(d);},1800);
    return()=>clearInterval(iv);
  },[myP,roomCode,gs.ts]);

  const move=async(i)=>{
    if(gs.board[i]||gs.winner||gs.draw||gs.turn!==myP)return;
    const b=[...gs.board];
    b[i]=myP===1?"X":"O";
    const w=tttCheck(b);
    const draw=!w&&b.every(Boolean);
    const ng={board:b,turn:myP===1?2:1,winner:w?myP:null,draw,ts:Date.now()};
    await fbSet(PFBS(roomCode),ng);setGs(ng);
    if(w)showToast("You won! 🎉","info");
    if(draw)showToast("It's a draw 🤝","info");
  };

  const reset=async()=>{
    const ng={...TTT_INIT,ts:Date.now()};
    await fbSet(PFBS(roomCode),ng);setGs(ng);
  };

  if(!myP)return(
    <div className="lk-screen">
      <button className="lk-back" onClick={onBack}>← Back</button>
      <RoomGate gameKey="ttt" gameTitle="Tic Tac Toe" gameIcon="⭕" initState={TTT_INIT}
        onJoined={async(p,rc)=>{
          if(!p){onBack();return;}
          setMyP(p);setRoomCode(rc);
          const fresh=await fbGet(PFBS(rc));
          if(fresh)setGs(fresh);
        }}/>
    </div>
  );

  const myMark=myP===1?"X":"O";
  const herMark=myP===1?"O":"X";
  const myTurn=gs.turn===myP&&!gs.winner&&!gs.draw;
  const winLine=gs.winner?TTT_LINES.find(([a,c,d])=>gs.board[a]&&gs.board[a]===gs.board[c]&&gs.board[a]===gs.board[d]):null;

  return(
    <div className="lk-screen ttt-screen">
      <Toast msg={toast?.msg} type={toast?.type}/>
      <div className="lk-topbar">
        <button className="lk-back sm" onClick={onBack}>← Games</button>
        <div style={{fontFamily:"'Cinzel Decorative',cursive",color:"#d4a040",fontSize:".8rem"}}>Tic Tac Toe</div>
      </div>
      <GamePresenceBar myP={myP} presPath={PRES_PATH(roomCode)}/>
      <div className="ttt-marks">
        <div style={{color:myP===1?"#d4a040":"#d46fa0",opacity:.9}}>You: <b>{myMark}</b></div>
        <div style={{color:"rgba(205,180,120,.4)",fontSize:".75rem"}}>{myTurn?"Your turn ✦":"Waiting…"}</div>
        <div style={{color:myP===1?"#d46fa0":"#d4a040",opacity:.9}}>Her: <b>{herMark}</b></div>
      </div>
      {(gs.winner||gs.draw)&&(
        <div className="ttt-result">
          {gs.winner?(gs.winner===myP?"🎉 You won!":"💕 She won!"):"🤝 It's a draw!"}
          <button className="ttt-replay" onClick={reset}>Play Again</button>
        </div>
      )}
      <div className="ttt-board">
        {gs.board.map((cell,i)=>{
          const isWin=winLine&&winLine.includes(i);
          return(
            <div key={i} className={"ttt-cell"+(cell?" filled":"")+(myTurn&&!cell?" hover":"")+(isWin?" win-cell":"")}
              onClick={()=>move(i)}>
              {cell&&<span className={"ttt-mark "+(cell==="X"?"tx":"to")}>{cell}</span>}
            </div>
          );
        })}
      </div>
      <ChatPanel myP={myP} chatPath={CHAT_PATH(roomCode)} presPath={PRES_PATH(roomCode)} open={chatOpen} onClose={()=>setChatOpen(s=>!s)}/>
    </div>
  );
}

// CONNECT FOUR
// ════════════════════════════════════════════════════════════════
const C4_ROWS=6,C4_COLS=7;
const C4_INIT={board:Array(C4_ROWS*C4_COLS).fill(0),turn:1,winner:null,ts:0};
function c4Check(board){
  const get=(r,c)=>r>=0&&r<C4_ROWS&&c>=0&&c<C4_COLS?board[r*C4_COLS+c]:0;
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(let r=0;r<C4_ROWS;r++)for(let c=0;c<C4_COLS;c++){
    const p=get(r,c);if(!p)continue;
    for(const[dr,dc] of dirs){
      if(get(r+dr,c+dc)===p&&get(r+2*dr,c+2*dc)===p&&get(r+3*dr,c+3*dc)===p)return p;
    }
  }
  return null;
}
function c4Drop(board,col,player){
  const b=[...board];
  for(let r=C4_ROWS-1;r>=0;r--){if(!b[r*C4_COLS+col]){b[r*C4_COLS+col]=player;return b;}}
  return null;
}

function ConnectFour({onBack}){
  const [gs,setGs]=useState(C4_INIT);
  const [myP,setMyP]=useState(0);
  const [roomCode,setRoomCode]=useState("");
  const [hoverCol,setHoverCol]=useState(-1);
  const [chatOpen,setChatOpen]=useState(false);
  const [toast,showToast]=useToast();
  const CHAT_PATH=(rc)=>"/rooms/"+rc+"/c4_chat";
  const PRES_PATH=(rc)=>"/rooms/"+rc+"/c4_pres";
  const PFBS=(rc)=>"/rooms/"+rc+"/c4_state";

  useEffect(()=>{
    if(!myP||!roomCode)return;
    const iv=setInterval(async()=>{const d=await fbGet(PFBS(roomCode));if(d&&d.ts!==gs.ts)setGs(d);},1800);
    return()=>clearInterval(iv);
  },[myP,roomCode,gs.ts]);

  const drop=async(col)=>{
    if(gs.winner||gs.turn!==myP)return;
    const b=c4Drop(gs.board,col,myP);
    if(!b)return;
    const w=c4Check(b);
    const ng={board:b,turn:myP===1?2:1,winner:w||null,ts:Date.now()};
    await fbSet(PFBS(roomCode),ng);setGs(ng);
    if(w)showToast("You won! 🎉","info");
  };

  const reset=async()=>{const ng={...C4_INIT,ts:Date.now()};await fbSet(PFBS(roomCode),ng);setGs(ng);};

  if(!myP)return(
    <div className="lk-screen">
      <button className="lk-back" onClick={onBack}>← Back</button>
      <RoomGate gameKey="c4" gameTitle="Connect Four" gameIcon="🟡" initState={C4_INIT}
        onJoined={async(p,rc)=>{
          if(!p){onBack();return;}
          setMyP(p);setRoomCode(rc);
          const fresh=await fbGet(PFBS(rc));if(fresh)setGs(fresh);
        }}/>
    </div>
  );

  const myTurn=gs.turn===myP&&!gs.winner;
  const myColor=myP===1?"#d4a040":"#d46fa0";
  const herColor=myP===1?"#d46fa0":"#d4a040";

  return(
    <div className="lk-screen c4-screen">
      <Toast msg={toast?.msg} type={toast?.type}/>
      <div className="lk-topbar">
        <button className="lk-back sm" onClick={onBack}>← Games</button>
        <div style={{fontFamily:"'Cinzel Decorative',cursive",color:"#d4a040",fontSize:".8rem"}}>Connect Four</div>
      </div>
      <GamePresenceBar myP={myP} presPath={PRES_PATH(roomCode)}/>
      <div className="ttt-marks">
        <div style={{color:myColor}}>You ●</div>
        <div style={{color:"rgba(205,180,120,.4)",fontSize:".75rem"}}>{myTurn?"Your turn ✦":"Waiting…"}</div>
        <div style={{color:herColor}}>Her ●</div>
      </div>
      {gs.winner&&(
        <div className="ttt-result">
          {gs.winner===myP?"🎉 You won!":"💕 She won!"}
          <button className="ttt-replay" onClick={reset}>Play Again</button>
        </div>
      )}
      <div className="c4-grid" onMouseLeave={()=>setHoverCol(-1)}>
        {Array.from({length:C4_COLS},(_,c)=>(
          <div key={c} className={"c4-col"+(myTurn?" hoverable":"")} onClick={()=>drop(c)} onMouseEnter={()=>myTurn&&setHoverCol(c)}>
            {hoverCol===c&&myTurn&&<div className="c4-preview" style={{background:myColor}}/>}
            {Array.from({length:C4_ROWS},(_,r)=>{
              const v=gs.board[r*C4_COLS+c];
              return <div key={r} className={"c4-cell"+(v?" filled":"")} style={v?{background:v===1?"#d4a040":"#d46fa0",boxShadow:"0 0 10px "+(v===1?"rgba(212,160,64,.5)":"rgba(212,111,160,.5)")}:{}}/>
            })}
          </div>
        ))}
      </div>
      {!gs.winner&&gs.board.every(Boolean)&&(
        <div className="ttt-result">🤝 Board full — Draw! <button className="ttt-replay" onClick={reset}>Play Again</button></div>
      )}
      <ChatPanel myP={myP} chatPath={CHAT_PATH(roomCode)} presPath={PRES_PATH(roomCode)} open={chatOpen} onClose={()=>setChatOpen(s=>!s)}/>
    </div>
  );
}

// WORD GUESS (romantic 5-letter Wordle-style)
// ════════════════════════════════════════════════════════════════
const WG_WORDS=["HEART","BLISS","LOVER","DREAM","SWEET","HONEY","ANGEL","GRACE","FAITH","LIGHT","PEACE","SMILE","DANCE","FLAME","SPARK","CRISP","BLOOM","STARS","CHARM","MAGIC","CANDY","PIANO","WALKS","LAUGH","FIRST","NIGHT","ROSES","TOUCH","WAVES","LUCKY"];
const WG_INIT={word:"",guesses:[],currentGuess:"",turn:1,winner:null,ts:0,wordSet:false};
function wgScore(guess,word){return guess.split("").map((ch,i)=>{if(ch===word[i])return"G";if(word.includes(ch))return"Y";return"B";});}

function WordGuess({onBack}){
  const [gs,setGs]=useState(WG_INIT);
  const [myP,setMyP]=useState(0);
  const [roomCode,setRoomCode]=useState("");
  const [input,setInput]=useState("");
  const [chatOpen,setChatOpen]=useState(false);
  const [toast,showToast]=useToast();
  const CHAT_PATH=(rc)=>"/rooms/"+rc+"/wg_chat";
  const PRES_PATH=(rc)=>"/rooms/"+rc+"/wg_pres";
  const PFBS=(rc)=>"/rooms/"+rc+"/wg_state";

  useEffect(()=>{
    if(!myP||!roomCode)return;
    const iv=setInterval(async()=>{const d=await fbGet(PFBS(roomCode));if(d&&d.ts!==gs.ts)setGs(d);},1800);
    return()=>clearInterval(iv);
  },[myP,roomCode,gs.ts]);

  // P1 sets the secret word, P2 guesses (then swap)
  const setWord=async()=>{
    const w=input.toUpperCase().trim();
    if(w.length!==5){showToast("Word must be 5 letters","info");return;}
    const ng={...WG_INIT,word:w,wordSet:true,ts:Date.now()};
    await fbSet(PFBS(roomCode),ng);setGs(ng);setInput("");
  };

  const submitGuess=async()=>{
    const g=input.toUpperCase().trim();
    if(g.length!==5){showToast("5 letters please","info");return;}
    const guesses=[...gs.guesses,{word:g,score:wgScore(g,gs.word)}];
    const won=g===gs.word;
    const lost=!won&&guesses.length>=6;
    const ng={...gs,guesses,currentGuess:g,winner:won?myP:(lost?0:null),ts:Date.now()};
    await fbSet(PFBS(roomCode),ng);setGs(ng);setInput("");
    if(won)showToast("Correct! 🎉 You got it!","info");
    else if(lost)showToast("Out of tries! The word was "+gs.word,"info");
  };

  const reset=async()=>{const ng={...WG_INIT,ts:Date.now()};await fbSet(PFBS(roomCode),ng);setGs(ng);setInput("");};

  if(!myP)return(
    <div className="lk-screen">
      <button className="lk-back" onClick={onBack}>← Back</button>
      <RoomGate gameKey="wg" gameTitle="Word Guess" gameIcon="📝" initState={WG_INIT}
        onJoined={async(p,rc)=>{
          if(!p){onBack();return;}
          setMyP(p);setRoomCode(rc);
          const fresh=await fbGet(PFBS(rc));if(fresh)setGs(fresh);
        }}/>
    </div>
  );

  const isWordSetter=myP===1;
  const needsWord=!gs.wordSet;
  const canGuess=gs.wordSet&&myP===2&&!gs.winner&&gs.guesses.length<6;
  const randomWord=()=>setInput(WG_WORDS[Math.floor(Math.random()*WG_WORDS.length)]);

  return(
    <div className="lk-screen wg-screen">
      <Toast msg={toast?.msg} type={toast?.type}/>
      <div className="lk-topbar">
        <button className="lk-back sm" onClick={onBack}>← Games</button>
        <div style={{fontFamily:"'Cinzel Decorative',cursive",color:"#d4a040",fontSize:".8rem"}}>Word Guess</div>
      </div>
      <GamePresenceBar myP={myP} presPath={PRES_PATH(roomCode)}/>

      {isWordSetter&&needsWord&&(
        <div className="wg-setter">
          <div className="wg-role-label">You are the <span style={{color:"#d4a040"}}>Word Setter 🔐</span></div>
          <div className="wg-role-hint">Pick a 5-letter word — she will try to guess it!</div>
          <div className="wg-input-row">
            <input className="wg-input" maxLength={5} value={input} onChange={e=>setInput(e.target.value.replace(/[^a-zA-Z]/g,"").toUpperCase())}
              placeholder="TYPE WORD" onKeyDown={e=>e.key==="Enter"&&setWord()}/>
            <button className="wg-btn" onClick={setWord}>Set ✦</button>
          </div>
          <button className="wg-random" onClick={randomWord}>🎲 Random romantic word</button>
        </div>
      )}
      {!isWordSetter&&needsWord&&(
        <div className="wg-setter">
          <div className="wg-role-label">She is choosing a word for you… 🤫</div>
          <div className="wg-role-hint">Get ready to guess! You have 6 tries.</div>
          <div className="wg-wait-dots">Waiting<span className="wg-dot-anim">...</span></div>
        </div>
      )}

      {gs.wordSet&&(
        <div className="wg-board">
          {Array.from({length:6},(_,row)=>{
            const g=gs.guesses[row];
            return(
              <div key={row} className="wg-row">
                {Array.from({length:5},(_,col)=>{
                  const ch=g?g.word[col]:"";
                  const sc=g?g.score[col]:"";
                  return <div key={col} className={"wg-tile"+(sc?" wg-"+sc.toLowerCase():"")+(ch?" filled":"")}>{ch}</div>;
                })}
              </div>
            );
          })}
        </div>
      )}

      {canGuess&&(
        <div className="wg-input-row" style={{marginTop:10}}>
          <input className="wg-input" maxLength={5} value={input} onChange={e=>setInput(e.target.value.replace(/[^a-zA-Z]/g,"").toUpperCase())}
            placeholder="YOUR GUESS" onKeyDown={e=>e.key==="Enter"&&submitGuess()}/>
          <button className="wg-btn" onClick={submitGuess}>Guess ✦</button>
        </div>
      )}
      {gs.wordSet&&myP===1&&!gs.winner&&<div style={{color:"rgba(205,180,120,.35)",fontSize:".78rem",marginTop:8,fontStyle:"italic"}}>She is guessing your word… {gs.guesses.length}/6 tries used</div>}

      {(gs.winner!==null&&gs.winner!==undefined&&(gs.winner||gs.guesses.length>=6))&&(
        <div className="ttt-result">
          {gs.winner===myP?"🎉 Correct!":(gs.winner===0||gs.guesses.length>=6)?("The word was: "+gs.word):"💕 She got it!"}
          <button className="ttt-replay" onClick={reset}>Play Again</button>
        </div>
      )}
      <ChatPanel myP={myP} chatPath={CHAT_PATH(roomCode)} presPath={PRES_PATH(roomCode)} open={chatOpen} onClose={()=>setChatOpen(s=>!s)}/>
    </div>
  );
}

function GamesHub({onBack}){
  const [game,setGame]=useState(null);
  if(game==="snakes")return <SnakeLadder onBack={()=>setGame(null)}/>;
  if(game==="ttt")return <TicTacToe onBack={()=>setGame(null)}/>;
  if(game==="c4")return <ConnectFour onBack={()=>setGame(null)}/>;
  if(game==="wg")return <WordGuess onBack={()=>setGame(null)}/>;

  return(
    <div className="lk-hub">
      <button className="lk-back" onClick={onBack}>← Back to Map</button>
      <div className="lk-hub-title">♟ Our Game Room</div>
      <div className="lk-hub-sub">Private · Real-time · Just the two of us ✦</div>
      <div className="lk-hub-live"><span className="live-dot"/>LIVE MULTIPLAYER</div>
      <div className="lk-hub-cards">
        <div className="lk-hub-card" onClick={()=>setGame("ttt")}>
          <div className="lk-hub-card-shine"/>
          <div className="lk-hub-card-icon">⭕</div>

          <div className="lk-hub-card-desc">Classic X's and O's. Take turns, get three in a row. Simple, sweet, satisfying.</div>
          <div className="lk-hub-card-play">Play Now ▶</div>
        </div>
        <div className="lk-hub-card" onClick={()=>setGame("c4")}>
          <div className="lk-hub-card-shine"/>
          <div className="lk-hub-card-icon">🟡</div>
          <div className="lk-hub-card-name">Connect Four</div>
          <div className="lk-hub-card-desc">Drop discs, connect four in a row. Think two steps ahead — or she will!</div>
          <div className="lk-hub-card-play">Play Now ▶</div>
        </div>
        <div className="lk-hub-card" onClick={()=>setGame("wg")}>
          <div className="lk-hub-card-shine"/>
          <div className="lk-hub-card-icon">📝</div>
          <div className="lk-hub-card-name">Word Guess</div>
          <div className="lk-hub-card-desc">One hides a word, the other gets 6 tries to guess it. Green = right place, yellow = wrong place.</div>
          <div className="lk-hub-card-play">Play Now ▶</div>
        </div>
        <div className="lk-hub-card" onClick={()=>setGame("snakes")}>
          <div className="lk-hub-card-shine"/>
          <div className="lk-hub-card-icon">🐍</div>
          <div className="lk-hub-card-name">Snake &amp; Ladder</div>
          <div className="lk-hub-card-desc">Climb the ladders of love. Dodge the snakes of distance. First to 100 wins!</div>
          <div className="lk-hub-card-play">Play Now ▶</div>
        </div>
      </div>
      <div className="lk-hub-how">
        <div className="lk-hub-how-title">How to play together</div>
        <div className="lk-hub-how-steps">
          <div className="lk-hub-step"><span className="step-num">1</span>Both open this website and log in with the password</div>
          <div className="lk-hub-step"><span className="step-num">2</span>Both tap 🎲 Game Room and open the same game</div>
          <div className="lk-hub-step"><span className="step-num">3</span>One taps "Create Room" and shares the 4-digit code</div>
          <div className="lk-hub-step"><span className="step-num">4</span>The other taps "Join Room", enters the code — and the game begins!</div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [auth, setAuth]             = useState(false);
  const [activePage, setActivePage]   = useState('map');
  const [pw, setPw]                 = useState("");
  const [pwErr, setPwErr]           = useState(false);
  const [shakeKey, setShakeKey]     = useState(0);
  const [pageShow, setPageShow]     = useState(false);
  const [pinsShow, setPinsShow]     = useState(false);
  const [selected, setSelected]     = useState(null);
  const [modal, setModal]           = useState(false);
  const [journeyDest, setJourneyDest] = useState(null);
  const [bikeProg, setBikeProg]     = useState(null);
  const [coupleAt, setCoupleAt]     = useState(null);
  const [barPct, setBarPct]         = useState(0);
  const [travelling, setTravelling] = useState(false);
  const [photoIdx, setPhotoIdx]     = useState(0);
  const mapRef  = useRef(null);
  const animRef = useRef(null);
  const [mapSize, setMapSize]       = useState({ w: 400, h: 400 });

  useEffect(() => {
    if (auth) {
      setTimeout(() => setPageShow(true), 80);
      setTimeout(() => setPinsShow(true), 900);
    }
  }, [auth]);

  useEffect(() => {
    if (!mapRef.current) return;
    const ob = new ResizeObserver(entries => {
      const el = entries[0].target;
      setMapSize({ w: el.clientWidth, h: el.clientHeight });
    });
    ob.observe(mapRef.current);
    return () => ob.disconnect();
  }, [auth]);

  const tryPw = () => {
    if (pw.toLowerCase() === PASSWORD) { setAuth(true); }
    else {
      setPwErr(true); setShakeKey(k => k + 1);
      setTimeout(() => setPwErr(false), 600);
      setPw("");
    }
  };

  const startJourney = (dest) => {
    if (animRef.current) cancelAnimationFrame(animRef.current);
    setCoupleAt(null);
    setJourneyDest(dest);
    setTravelling(true);
    setBikeProg(0);
    setBarPct(0);
    // Duration scales with distance: nearest ~5s, farthest ~14s
    const _dx = dest.left - HOME.left, _dy = dest.top - HOME.top;
    const _dist = Math.sqrt(_dx*_dx + _dy*_dy);
    const DURATION = 5000 + (_dist / MAX_DIST) * 9000;
    const start = performance.now();
    const tick = (now) => {
      const t = Math.min((now - start) / DURATION, 1);
      setBikeProg(t);
      setBarPct(Math.round(t * 100));
      if (t < 1) {
        animRef.current = requestAnimationFrame(tick);
      } else {
        setTimeout(() => {
          setBikeProg(null);
          setTravelling(false);
          setJourneyDest(null);
          setCoupleAt(dest);
          setTimeout(() => { setSelected(dest); setModal(true); setPhotoIdx(0); }, 700);
        }, 300);
      }
    };
    animRef.current = requestAnimationFrame(tick);
  };

  const cancelJourney = () => {
    if (animRef.current) cancelAnimationFrame(animRef.current);
    setTravelling(false);
    setJourneyDest(null);
    setBikeProg(null);
    setBarPct(0);
  };

  const closeModal = () => { setModal(false); setSelected(null); setPhotoIdx(0); };

  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape" && modal) closeModal(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [modal]);

  if (!auth) return (
    <>
      <style>{CSS}</style>
      <div className="pw-screen">
        {["tl","tr","bl","br"].map(c => (
          <div key={c} className={"c-orn " + c}><OrnSVG /></div>
        ))}
        <div className="pw-box">
          <div className="mandala">
            <div className="mandala-mid">
              <span className="mandala-icon">🪔</span>
            </div>
          </div>
          <div className="pw-title">Journeys With You</div>
          <div className="pw-eyebrow">across the sacred land of India</div>
          <div className="pw-rule" />
          <input
            key={shakeKey}
            className={"pw-input" + (pwErr ? " err" : "")}
            type="password"
            placeholder="· · · · · · · ·"
            value={pw}
            onChange={e => setPw(e.target.value)}
            onKeyDown={e => e.key === "Enter" && tryPw()}
          />
          <div className="pw-err">{pwErr ? "that is not the word, my love" : ""}</div>
          <button className="pw-btn" onClick={tryPw}>ENTER</button>
          <div style={{fontFamily:"'IM Fell English',serif",fontStyle:"italic",color:"rgba(205,180,120,.28)",fontSize:".76rem"}}>
            a private map, sealed with love
          </div>
        </div>
      </div>
    </>
  );

  if(activePage==='games') return(
    <>
      <style>{CSS}</style>
      <div className={"page show"} style={{minHeight:'100vh',background:'#0e0c06'}}>
        <GamesHub onBack={()=>setActivePage('map')}/>
      </div>
    </>
  );

  return (
    <>
      <style>{CSS}</style>
      <div className={"page" + (pageShow ? " show" : "")}>

        <div className="site-header">
          <div className="hdr-eyebrow">A private cartography of longing</div>
          <div className="hdr-title">Journeys I Dream of With You</div>
          <div className="hdr-sub">across the sacred, ancient land of Bharat</div>
          <div style={{marginTop:10}}><button className="games-btn" onClick={()=>setActivePage('games')}>🎲 Game Room</button></div>
          <div className="hdr-orn">
            <div className="hdr-line" />
            <span style={{color:"rgba(212,160,64,.55)",fontSize:".54rem"}}>◆ ✦ ◆</span>
            <div className="hdr-line r" />
          </div>
        </div>

        <div className="main-body">
          <div className="map-wrap">
            <div className="map-frame">
              <div className="mc tl"/><div className="mc tr"/><div className="mc bl"/><div className="mc br"/>
              <div className="map-img-wrap" ref={mapRef}>

                <img src={MAP_IMG} alt="India 3D Map" draggable={false} />

                <BikeLayer dest={journeyDest} progress={bikeProg} mapW={mapSize.w} mapH={mapSize.h} />

                {travelling && journeyDest && (
                  <div className="journey-banner">
                    <span style={{fontSize:"1.1rem"}}>🚂</span>
                    <div style={{flex:1}}>
                      <div className="jb-text">
                        Travelling from Odisha to {journeyDest.name}
                        <span className="jb-dot"> .</span>
                        <span className="jb-dot"> .</span>
                        <span className="jb-dot"> .</span>
                      </div>
                      <div style={{width:"100%",height:"2px",background:"rgba(212,160,64,.12)",borderRadius:2,marginTop:5,overflow:"hidden"}}>
                        <div style={{height:"100%",width:barPct+"%",background:"linear-gradient(90deg,#d4a040,#e8c060)",borderRadius:2,transition:"width .1s linear"}} />
                      </div>
                    </div>
                    <button className="jb-cancel" onClick={cancelJourney}>✕</button>
                  </div>
                )}

                {pinsShow && (
                  <div className="pin-wrap pin-appear" style={{left:HOME.left+"%", top:HOME.top+"%"}}>
                    <div className="pin-inner">
                      <div style={{position:"relative"}}>
                        <div className="pin-pulse" style={{background:"rgba(232,85,85,0.45)"}} />
                        <div className="pin-pulse" style={{background:"rgba(232,85,85,0.2)",animationDelay:"1.2s"}} />
                        <div className="pin-drop" style={{background:"#e85555", boxShadow:"0 4px 18px rgba(232,85,85,0.7), 0 2px 6px rgba(0,0,0,0.5)"}}>
                          <div className="pin-drop-icon">🏠</div>
                        </div>
                      </div>
                      <div className="pin-stem" style={{background:"#e85555"}} />
                      <div className="pin-shadow" />
                      <div className="pin-label r always" style={{color:"#e87575",borderColor:"rgba(232,85,85,.38)"}}>
                        We are Here 🏠
                      </div>
                    </div>
                  </div>
                )}

                {pinsShow && DESTINATIONS.map((d, i) => (
                  <div
                    key={d.id}
                    className={"pin-wrap pin-appear"}
                    style={{left:d.left+"%", top:d.top+"%", animationDelay:((i+1)*0.14)+"s"}}
                    onClick={() => startJourney(d)}
                  >
                    <div className="pin-inner">
                      <div style={{position:"relative"}}>
                        <div className="pin-pulse" style={{background:d.glow}} />
                        <div className="pin-drop" style={{
                          background: d.color,
                          boxShadow: `0 3px 14px ${d.glow}, 0 2px 5px rgba(0,0,0,0.5)`
                        }}>
                          <div className="pin-drop-icon">{d.icon}</div>
                        </div>
                      </div>
                      <div className="pin-stem" style={{background: d.color}} />
                      <div className="pin-shadow" />
                      <div className={"pin-label " + d.labelSide} style={{color: "rgba(212,160,64,.95)", borderColor: "rgba(212,160,64,.42)"}}>
                        {d.name}
                      </div>
                    </div>
                  </div>
                ))}

                {coupleAt && (
                  <div className="couple-wrap" style={{left:coupleAt.left+"%", top:coupleAt.top+"%"}}>
                    <PixelCouple sc={2.5} />
                    <div className="couple-label">{coupleAt.name} 💕</div>
                  </div>
                )}

              </div>
            </div>
          </div>

          <div className="sidebar">
            <div className="sb-title">Destinations ◆</div>
            <div className="home-row">
              <div className="dr-dot" style={{background:"#e85555",boxShadow:"0 0 6px rgba(232,85,85,.6)"}} />
              <div className="dr-icon">🏠</div>
              <div className="dr-info">
                <div className="dr-name" style={{color:"#e87070"}}>Odisha</div>
                <div className="dr-state">Our home · where it begins</div>
              </div>
              <div className="home-badge">HOME</div>
            </div>

            {DESTINATIONS.map(d => (
              <div key={d.id}
                className={"dest-row" + (selected && selected.id === d.id ? " active" : "")}
                onClick={() => startJourney(d)}
              >
                <div className="dr-dot" style={{background: d.color, boxShadow: "0 0 5px " + d.glow}} />
                <div className="dr-icon">{d.icon}</div>
                <div className="dr-info">
                  <div className="dr-name">{d.name}</div>
                  <div className="dr-state">{d.state}</div>
                </div>
                <div className="dr-arr">›</div>
              </div>
            ))}

            <div className="legend">
              <div className="lg-title">Pin Legend</div>
              {[
                {c:"#e85555", l:"We Are Here (Odisha)"},
                {c:"#d4a040", l:"Sacred / Temple"},
                {c:"#d46fa0", l:"City of Love"},
                {c:"#70b8e8", l:"Mountain / Himalaya"},
                {c:"#a87dce", l:"Stargazing Escape"},
                {c:"#c8824a", l:"Ancient Ruins"},
                {c:"rgba(130,120,90,.55)", l:"Mystery Destination"},
              ].map(({ c, l }) => (
                <div key={l} className="lg-row">
                  <div className="lg-dot" style={{background:c}} />
                  <div className="lg-txt">{l}</div>
                </div>
              ))}
            </div>

            <div className="quote-box">
              <div className="quote-txt">Not all those who wander are lost — but I would rather wander with you.</div>
            </div>
          </div>
        </div>

        <div className="site-footer">
          ✦ Starting from Odisha · {DESTINATIONS.length} dreams mapped · all of them, with you ✦
        </div>
      </div>

      <div className={"modal-bg" + (modal ? " show" : "")} onClick={e => { if (e.target === e.currentTarget) closeModal(); }}>
        {selected && (
          <div className="modal-card">
            <button className="close-x" onClick={closeModal}>✕</button>
            {(() => {
              const photos = selected.photos || [];
              const cur = photos[photoIdx] || photos[0];
              const prev = () => setPhotoIdx(i => (i - 1 + photos.length) % photos.length);
              const next = () => setPhotoIdx(i => (i + 1) % photos.length);
              return (
                <div className="gallery-wrap">
                  {cur && <img className="gallery-img" src={cur.url} alt={cur.cap} key={cur.url} />}
                  <div className="gallery-fade" />
                  {cur && cur.cap && <div className="gallery-cap">{cur.cap}</div>}
                  {photos.length > 1 && (
                    <>
                      <button className="gallery-arr left" onClick={e=>{e.stopPropagation();prev();}}>‹</button>
                      <button className="gallery-arr right" onClick={e=>{e.stopPropagation();next();}}>›</button>
                      <div className="gallery-dots">
                        {photos.map((_,i) => (
                          <div key={i} className={"g-dot"+(i===photoIdx?" active":"")} onClick={e=>{e.stopPropagation();setPhotoIdx(i);}} />
                        ))}
                      </div>
                    </>
                  )}
                  <div className="gallery-name">
                    {selected.name}
                    <span className="gallery-state">{selected.state}</span>
                  </div>
                </div>
              );
            })()}
            <div className="card-body">

              <div className="card-tags">
                {selected.tags.map(t => <span key={t} className="ctag">{t}</span>)}
              </div>
              <div className="c-lbl">Why I want to take you here</div>
              <div className="c-txt">"{selected.why}"</div>
              <div className="c-lbl">A scene I imagine</div>
              <div className="c-txt">"{selected.scene}"</div>
              <div className="c-song"><span>♩</span><span>{selected.song}</span></div>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
