function PixelCouple({ sc }) {
  const s = sc || 3;
  const draw = (rows, cols) => (
    <div style={{display:"inline-block",lineHeight:0}}>
      {rows.map((row, ri) => (
        <div key={ri} style={{display:"flex"}}>
          {row.map((v, ci) => (
            <div key={ci} style={{width:s, height:s, background:cols[v]}} />
          ))}
        </div>
      ))}
    </div>
  );
  return (
    <div style={{display:"flex", alignItems:"flex-end", gap:s*1.5}}>
      {draw(BOY, BC)}
      <div style={{fontSize:s*4, lineHeight:1, marginBottom:s*4, color:"#e85577", filter:"drop-shadow(0 0 3px rgba(232,85,119,0.7))"}}>♥</div>
      {draw(GIRL, GC)}
    </div>
  );
}

function qbez (t,p0,p1,p2){ return (1-t)*(1-t)*p0 + 2*(1-t)*t*p1 + t*t*p2; }
function qbezD(t,p0,p1,p2){ return 2*(1-t)*(p1-p0) + 2*t*(p2-p1); }

function TrainLayer({ dest, progress, mapW, mapH }){
  if(!dest || progress===null || mapW < 10) return null;

  const ox = HOME.left/100*mapW,  oy = HOME.top/100*mapH;
  const dx = dest.left/100*mapW,  dy = dest.top/100*mapH;

  // ── Arc: perpendicular bow, proportional to route length ──────────────
  // Ensures consistent entry+exit directions and visible curves on all routes.
  // "Left of travel" perpendicular always keeps the arc inside the map.
  const lineLen = Math.sqrt((dx-ox)**2+(dy-oy)**2) || 1;
  const bow  = lineLen * 0.42;                  // 42% of route = visible arc
  const midX = (ox+dx)/2,  midY = (oy+dy)/2;
  const perpX = -(dy-oy)/lineLen,  perpY = (dx-ox)/lineLen;
  // Clamp so control point never exits the map bounds
  const cx1 = Math.max(mapW*0.04, Math.min(mapW*0.96,  midX + perpX*bow));
  const cy1 = Math.max(mapH*0.04, Math.min(mapH*0.96,  midY + perpY*bow));

  const t   = progress;
  const bx  = qbez(t, ox, cx1, dx);
  const by  = qbez(t, oy, cy1, dy);
  const tdx = qbezD(t, ox, cx1, dx);
  const tdy = qbezD(t, oy, cy1, dy);
  const angle     = Math.atan2(tdy, tdx) * 180/Math.PI;
  const angleRad  = Math.atan2(tdy, tdx);
  const col = dest.color || "#d4a040";
  const sc  = Math.max(0.65, Math.min(1.5, mapW/460));   // responsive size

  // ── Chimney screen position (24*sc behind the nose along the track) ───
  const csx = bx - Math.cos(angleRad)*24*sc;
  const csy = by - Math.sin(angleRad)*24*sc;

  // ── Smoke puffs — emitted at chimney, rise straight up in screen space ──
  // "age" 0=freshest/smallest, 2=oldest/biggest/most faded
  const puffs = [0, 1, 2].map(age => {
    const delay = age * 0.09;   // parametric distance behind chimney
    const pt    = Math.max(0, t - delay);
    if(pt < 0.005) return null;
    // Past chimney position
    const pbx   = qbez(pt, ox, cx1, dx);
    const pby   = qbez(pt, oy, cy1, dy);
    const ptdx  = qbezD(pt, ox, cx1, dx);
    const ptdy  = qbezD(pt, oy, cy1, dy);
    const pAngle = Math.atan2(ptdy, ptdx);
    const pcsx  = pbx - Math.cos(pAngle)*24*sc;
    const pcsy  = pby - Math.sin(pAngle)*24*sc;
    return {
      px: pcsx + (-Math.sin(pAngle)) * age * 5 * sc,  // slight lateral wind drift
      py: pcsy - age * 26 * sc,                         // rises straight up on screen
      r:  (7 + age * 11) * sc,
      op: 0.58 - age * 0.20,
    };
  }).filter(Boolean);

  // ── Arrival burst: last 18% of journey ────────────────────────────────
  const burst = t > 0.82 ? (t-0.82)/0.18 : 0;

  return(
    <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",
                 pointerEvents:"none",zIndex:20}} overflow="visible">
      <defs>
        <filter id="tlSmoke" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="3.2"/>
        </filter>
        <filter id="tlGlow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      {/* ── Track ── */}
      {/* Soft shadow under rails */}
      <path d={`M${ox} ${oy} Q${cx1} ${cy1} ${dx} ${dy}`}
        fill="none" stroke="rgba(0,0,0,0.35)" strokeWidth="5" strokeLinecap="round"/>
      {/* Wide glow */}
      <path d={`M${ox} ${oy} Q${cx1} ${cy1} ${dx} ${dy}`}
        fill="none" stroke={`${col}28`} strokeWidth="6" strokeLinecap="round"/>
      {/* Rail outline */}
      <path d={`M${ox} ${oy} Q${cx1} ${cy1} ${dx} ${dy}`}
        fill="none" stroke={`${col}44`} strokeWidth="2.5" strokeLinecap="round"/>
      {/* Dashed centre sleepers */}
      <path d={`M${ox} ${oy} Q${cx1} ${cy1} ${dx} ${dy}`}
        fill="none" stroke={`${col}bb`} strokeWidth="1.2"
        strokeDasharray="5 6" strokeLinecap="round"/>

      {/* ── Smoke ── */}
      {puffs.map((p,i)=>(
        <circle key={i} cx={p.px} cy={p.py} r={p.r}
          fill="rgba(215,207,193,0.95)" opacity={p.op}
          filter="url(#tlSmoke)"/>
      ))}

      {/* ── Train ──────────────────────────────────────────────────────────
          Coordinate frame after transforms:
            +x = travel direction (nose/headlight)
            -x = backward (carriage tail)
          Bezier point sits at the nose tip (x=0).                         */}
      <g transform={`translate(${bx} ${by}) rotate(${angle}) translate(0 ${-11*sc})`}>

        {/* Wheels — 4 total across loco + carriage */}
        {[-12,-23,-38,-49].map(wx=>(
          <g key={wx}>
            <circle cx={wx*sc} cy={20*sc} r={4.5*sc} fill="#150f04" stroke="#907030" strokeWidth={0.9*sc}/>
            <circle cx={wx*sc} cy={20*sc} r={1.8*sc} fill="#c89030" opacity="0.8"/>
            {/* Wheel spoke cross */}
            <line x1={(wx-1.8)*sc} y1={20*sc} x2={(wx+1.8)*sc} y2={20*sc} stroke="#5a3a10" strokeWidth={0.6*sc}/>
            <line x1={wx*sc} y1={(20-1.8)*sc} x2={wx*sc} y2={(20+1.8)*sc} stroke="#5a3a10" strokeWidth={0.6*sc}/>
          </g>
        ))}

        {/* Connecting rod between loco wheels */}
        <rect x={-25*sc} y={17.5*sc} width={14*sc} height={1.5*sc} rx={0.7*sc}
          fill="#a07828" opacity="0.7"/>

        {/* ── Carriage ── */}
        <rect x={-60*sc} y={4*sc}  width={30*sc} height={14*sc} rx={2.5*sc}
          fill={col} opacity="0.78"/>
        {/* Roof line */}
        <rect x={-60*sc} y={4*sc}  width={30*sc} height={3*sc}   rx={2.5*sc}
          fill="rgba(0,0,0,0.18)"/>
        {/* Windows */}
        {[-55,-47,-39].map(wx=>(
          <rect key={wx} x={wx*sc} y={9*sc} width={5.5*sc} height={4.5*sc} rx={sc}
            fill="rgba(200,235,255,0.50)"/>
        ))}
        {/* Bottom stripe */}
        <rect x={-60*sc} y={16*sc} width={30*sc} height={2*sc}
          fill="rgba(0,0,0,0.22)"/>

        {/* Carriage-loco coupler */}
        <rect x={-32*sc} y={9.5*sc} width={5*sc} height={3*sc} rx={sc} fill="#251508"/>

        {/* ── Locomotive body ── */}
        <rect x={-28*sc} y={3*sc}  width={24*sc} height={16*sc} rx={3*sc} fill={col}/>
        {/* Boiler barrel highlight */}
        <rect x={-26*sc} y={4*sc}  width={20*sc} height={5*sc}  rx={2*sc}
          fill="rgba(255,255,255,0.09)"/>
        {/* Loco windows */}
        <rect x={-25*sc} y={9*sc}  width={6.5*sc} height={5.5*sc} rx={sc}
          fill="rgba(200,235,255,0.55)"/>
        <rect x={-16*sc} y={9*sc}  width={5.5*sc} height={5.5*sc} rx={sc}
          fill="rgba(200,235,255,0.45)"/>
        {/* Loco base stripe */}
        <rect x={-28*sc} y={16.5*sc} width={24*sc} height={2*sc}
          fill="rgba(0,0,0,0.28)"/>

        {/* ── Chimney (smoke stack) ── */}
        <rect x={-25*sc} y={-5*sc}   width={4.5*sc} height={9*sc}  rx={sc} fill={col}/>
        {/* Chimney cap (wider flared top) */}
        <rect x={-26.5*sc} y={-5*sc} width={7.5*sc} height={2.5*sc} rx={sc} fill={col}/>
        {/* Inner chimney dark hole */}
        <circle cx={-23*sc} cy={-5*sc} r={1.6*sc} fill="rgba(0,0,0,0.6)"/>

        {/* ── Front cab ── */}
        <rect x={-9*sc} y={3*sc}  width={9*sc}  height={16*sc} rx={2*sc} fill={col}/>
        <rect x={-8*sc} y={7*sc}  width={4.5*sc} height={5.5*sc} rx={sc}
          fill="rgba(200,235,255,0.55)"/>
        {/* Cab roof */}
        <rect x={-10*sc} y={3*sc} width={11*sc} height={2.5*sc} rx={1.5*sc}
          fill="rgba(0,0,0,0.2)"/>

        {/* ── Nose cowcatcher (tapers forward in +x direction) ── */}
        <polygon points={`0,${5*sc} 0,${18*sc} ${7*sc},${21*sc} ${7*sc},${2*sc}`}
          fill={col} opacity="0.90"/>
        {/* Nose grille lines */}
        {[8,12,16].map(yg=>(
          <line key={yg} x1={0} y1={yg*sc} x2={7*sc} y2={(yg+1)*sc}
            stroke="rgba(0,0,0,0.2)" strokeWidth={0.8*sc}/>
        ))}

        {/* ── Headlight ── brightest at nose tip ── */}
        <circle cx={7*sc} cy={11.5*sc} r={3.2*sc}
          fill="rgba(255,245,160,1)" filter="url(#tlGlow)"/>
        {/* Outer halo */}
        <circle cx={7*sc} cy={11.5*sc} r={6*sc}
          fill="rgba(255,235,80,0.14)"/>
      </g>

      {/* ── Arrival rings ── */}
      {burst>0 && [0,0.30,0.60].map((phase,i)=>{
        const rp = Math.min(1, Math.max(0, burst-phase));
        if(rp<=0) return null;
        return(
          <circle key={i} cx={dx} cy={dy}
            r={rp*52}
            fill="none" stroke={col}
            strokeWidth={Math.max(0.4, 2.8-rp*2.4)}
            opacity={(1-rp)*0.9}/>
        );
      })}

      {/* Destination station dot — fades in as train approaches */}
      {t>0.65 && (
        <circle cx={dx} cy={dy}
          r={Math.min(7, ((t-0.65)/0.35)*9)}
          fill="none" stroke={col} strokeWidth="1.2"
          opacity={Math.min(0.55, ((t-0.65)/0.35)*0.55)}
          strokeDasharray="2 3"/>
      )}
    </svg>
  );
}

.modal-bg.show .modal-card{transform:translateY(0) scale(1);}
.card-img-wrap{position:relative;height:220px;overflow:hidden;}
.card-img{width:100%;height:100%;object-fit:cover;filter:sepia(18%) saturate(.88) contrast(1.08) brightness(.85);transition:transform .6s ease;}
.modal-card:hover .card-img{transform:scale(1.03);}
.card-img-fade{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 38%,rgba(26,19,7,.95) 100%);}
.card-img-name{position:absolute;bottom:11px;left:17px;right:17px;font-family:'Cinzel Decorative',cursive;font-size:1.08rem;color:#d4a040;text-shadow:0 2px 10px rgba(0,0,0,.8);}
.card-state{font-family:'IM Fell English',serif;font-style:italic;font-size:.72rem;color:rgba(205,180,120,.7);display:block;margin-top:2px;}
.card-locked{height:195px;background:linear-gradient(135deg,#181006,#231b09);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.card-body{padding:15px 19px 22px;}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.ctag{font-family:'IM Fell English',serif;font-style:italic;font-size:.72rem;color:rgba(205,180,120,.62);background:rgba(212,160,64,.05);border:1px solid rgba(212,160,64,.12);padding:2px 7px;}
.c-lbl{font-family:'Cinzel',serif;font-size:.49rem;letter-spacing:.27em;color:rgba(212,160,64,.4);text-transform:uppercase;display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.c-lbl::after{content:'';flex:1;height:1px;background:rgba(212,160,64,.1);}
.c-txt{font-family:'IM Fell English',serif;font-style:italic;color:rgba(220,198,148,.78);font-size:.93rem;line-height:1.82;margin-bottom:12px;}
.c-song{display:flex;align-items:center;gap:7px;padding-top:10px;border-top:1px solid rgba(212,160,64,.09);color:rgba(205,180,120,.44);font-family:'IM Fell English',serif;font-style:italic;font-size:.82rem;}
.close-x{position:absolute;top:10px;right:10px;z-index:10;background:rgba(12,8,2,.92);border:1px solid rgba(212,160,64,.28);color:rgba(212,160,64,.7);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem;transition:all .2s;}
.close-x:hover{border-color:rgba(212,160,64,.7);color:#d4a040;}
.site-footer{text-align:center;padding:11px 20px 24px;border-top:1px solid rgba(212,160,64,.07);font-family:'IM Fell English',serif;font-style:italic;color:rgba(205,180,120,.18);font-size:.76rem;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:rgba(212,160,64,.18);}
.gallery-wrap{position:relative;height:220px;overflow:hidden;background:#0e0c06;}
.gallery-img{width:100%;height:220px;object-fit:cover;filter:sepia(18%) saturate(.85) contrast(1.1) brightness(.82);transition:opacity .4s ease;}
.gallery-fade{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(26,19,7,.95) 100%);pointer-events:none;}
.gallery-name{position:absolute;bottom:11px;left:17px;right:17px;font-family:'Cinzel Decorative',cursive;font-size:1.08rem;color:#d4a040;text-shadow:0 2px 10px rgba(0,0,0,.8);}
.gallery-state{font-family:'IM Fell English',serif;font-style:italic;font-size:.72rem;color:rgba(205,180,120,.7);display:block;margin-top:2px;}
.gallery-cap{position:absolute;bottom:36px;right:14px;font-family:'IM Fell English',serif;font-style:italic;font-size:.64rem;color:rgba(212,160,64,.55);background:rgba(6,4,1,.6);padding:2px 7px;border-radius:2px;}
.gallery-dots{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;}
.g-dot{width:6px;height:6px;border-radius:50%;background:rgba(212,160,64,.35);cursor:pointer;transition:all .2s;}
.g-dot.active{background:#d4a040;transform:scale(1.3);}
.gallery-arr{position:absolute;top:50%;transform:translateY(-50%);background:rgba(6,4,1,.55);border:1px solid rgba(212,160,64,.25);color:rgba(212,160,64,.7);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;transition:all .2s;z-index:4;}
.gallery-arr:hover{background:rgba(212,160,64,.18);border-color:rgba(212,160,64,.6);color:#d4a040;}
.gallery-arr.left{left:8px;}
.gallery-arr.right{right:8px;}

@media(max-width:680px){.main-body{flex-direction:column;}.sidebar{padding-left:0;padding-top:16px;flex:none;width:100%;}}
/* ═══════════════════════════════════════════════════════════════
   GAME ROOM — REDESIGNED v3
   Deep indigo-black base, gold/pink dual-player palette
═══════════════════════════════════════════════════════════════ */

/* ── Screen shell ── */
.lk-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px 12px 90px;background:linear-gradient(160deg,#07001a 0%,#120430 55%,#07000e 100%);color:rgba(205,180,120,.85);overflow-x:hidden;position:relative;}
.lk-back{align-self:flex-start;background:rgba(212,160,64,.06);border:1px solid rgba(212,160,64,.25);color:rgba(212,160,64,.6);padding:6px 13px;border-radius:4px;cursor:pointer;font-family:'IM Fell English',serif;font-style:italic;font-size:.78rem;transition:all .2s;white-space:nowrap;}
.lk-back:hover{border-color:rgba(212,160,64,.55);color:#d4a040;background:rgba(212,160,64,.1);}
.lk-back.sm{padding:5px 10px;font-size:.72rem;}
.lk-topbar{display:flex;align-items:center;gap:10px;width:100%;max-width:660px;margin-bottom:8px;flex-wrap:wrap;}

/* ── Logo / tagline ── */
.lk-logo{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.2rem,5vw,1.9rem);color:#d4a040;text-shadow:0 0 28px rgba(212,160,64,.5),0 0 60px rgba(212,160,64,.12);text-align:center;margin:16px 0 5px;}
.lk-tagline{font-family:'IM Fell English',serif;font-style:italic;color:rgba(205,180,120,.38);font-size:.83rem;text-align:center;margin-bottom:22px;max-width:340px;}

/* ── Join box ── */
.lk-join-box{background:linear-gradient(145deg,rgba(28,10,52,.92),rgba(12,4,24,.96));border:1px solid rgba(212,160,64,.2);border-radius:14px;padding:26px 22px;text-align:center;max-width:340px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.5);}
.lk-join-title{font-family:'Cinzel Decorative',cursive;font-size:.88rem;color:#d4a040;margin-bottom:16px;letter-spacing:.06em;}
.lk-join-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.lk-join-btn{display:flex;align-items:center;gap:9px;padding:11px 18px;border-radius:8px;cursor:pointer;font-family:'IM Fell English',serif;font-style:italic;font-size:.9rem;border:1px solid;transition:all .22s;}
.lk-join-btn.p1{background:rgba(212,160,64,.09);border-color:rgba(212,160,64,.4);color:#d4a040;}
.lk-join-btn.p1:hover{background:rgba(212,160,64,.18);box-shadow:0 0 18px rgba(212,160,64,.18);}
.lk-join-btn.p2{background:rgba(212,111,160,.09);border-color:rgba(212,111,160,.4);color:#d46fa0;}
.lk-join-btn.p2:hover{background:rgba(212,111,160,.18);box-shadow:0 0 18px rgba(212,111,160,.18);}
.lk-join-dot{width:15px;height:15px;border-radius:50%;flex-shrink:0;}
.lk-join-note{margin-top:14px;font-family:'IM Fell English',serif;font-style:italic;font-size:.71rem;color:rgba(205,180,120,.28);line-height:1.55;}

/* ══════════════════════════════════════════════════════════════
   PRESENCE SYSTEM — PlayerCard + compact row
══════════════════════════════════════════════════════════════ */
.player-card{display:flex;align-items:center;gap:12px;background:rgba(0,0,0,.35);border:1px solid;border-radius:10px;padding:10px 14px;min-width:130px;position:relative;overflow:hidden;}
.player-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 60%);pointer-events:none;}
.pc-me{box-shadow:inset 0 0 20px rgba(212,160,64,.04);}
.pc-avatar{width:44px;height:44px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;}
.pc-online-ring{position:absolute;inset:-4px;border-radius:50%;border:2px solid transparent;transition:border-color .4s;}
.pc-online-ring.active{animation:ringPulse 2s ease-in-out infinite;}
@keyframes ringPulse{0%,100%{opacity:.5;transform:scale(1);}50%{opacity:1;transform:scale(1.06);}}
.pc-info{flex:1;min-width:0;}
.pc-name{font-family:'Cinzel Decorative',cursive;font-size:.72rem;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-bars{display:flex;align-items:center;gap:3px;}
.pc-bar{width:6px;height:12px;border-radius:2px;background:rgba(255,255,255,.08);transition:background .4s,height .3s;}
.pc-bar.on{height:14px;}
.pc-status-txt{font-family:'IM Fell English',serif;font-size:.68rem;margin-left:5px;transition:color .4s;}
.pc-lastseen{font-family:'IM Fell English',serif;font-style:italic;font-size:.62rem;color:rgba(205,180,120,.3);margin-top:2px;}

/* Compact presence (in topbar) */
.pres-row{display:flex;gap:8px;flex-wrap:wrap;}
.pc-compact{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.3);border:1px solid rgba(212,160,64,.1);border-radius:16px;padding:4px 10px;}
.pc-dot{width:7px;height:7px;border-radius:50%;background:rgba(100,100,100,.35);transition:all .5s;flex-shrink:0;}
.pc-dot.pc-on{background:#44ff88;box-shadow:0 0 6px #44ff88;}
.pc-dot.pc-away{background:#ffcc44;box-shadow:0 0 5px #ffcc4488;}
.pc-status-sm{font-family:'IM Fell English',serif;font-style:italic;font-size:.65rem;color:rgba(205,180,120,.32);}

/* ══════════════════════════════════════════════════════════════
   LOBBY — waiting room
══════════════════════════════════════════════════════════════ */
.lobby-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding:10px 0;width:100%;max-width:440px;}
.lobby-title{font-family:'Cinzel Decorative',cursive;font-size:1rem;color:rgba(212,160,64,.6);letter-spacing:.1em;}
.lobby-vs{display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;}
.lobby-vs-sep{display:flex;flex-direction:column;align-items:center;gap:4px;}
.lobby-vs-ring{width:36px;height:36px;border-radius:50%;border:2px solid rgba(212,160,64,.25);display:flex;align-items:center;justify-content:center;animation:vsGlow 2.4s ease-in-out infinite;}
@keyframes vsGlow{0%,100%{box-shadow:0 0 0 rgba(212,160,64,0);}50%{box-shadow:0 0 14px rgba(212,160,64,.25);}}
.lobby-vs-txt{font-family:'Cinzel Decorative',cursive;font-size:.68rem;color:rgba(212,160,64,.4);letter-spacing:.12em;}
.lobby-waiting{display:flex;flex-direction:column;align-items:center;gap:10px;}
.lobby-spinner{width:36px;height:36px;border-radius:50%;border:3px solid rgba(212,160,64,.12);border-top-color:rgba(212,160,64,.6);animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.lobby-waiting-txt{font-family:'Cinzel Decorative',cursive;font-size:.82rem;color:rgba(212,160,64,.55);}
.lobby-waiting-sub{font-family:'IM Fell English',serif;font-style:italic;font-size:.72rem;color:rgba(205,180,120,.28);text-align:center;max-width:300px;line-height:1.5;}
.lobby-ready{display:flex;flex-direction:column;align-items:center;gap:8px;}
.lobby-ready-ring{width:56px;height:56px;border-radius:50%;border:3px solid #44ff88;box-shadow:0 0 20px rgba(68,255,136,.3);animation:readyPulse 1.2s ease-in-out infinite;}
@keyframes readyPulse{0%,100%{transform:scale(1);opacity:.8;}50%{transform:scale(1.08);opacity:1;}}
.lobby-ready-txt{font-family:'Cinzel Decorative',cursive;font-size:.92rem;color:#44ff88;text-shadow:0 0 12px rgba(68,255,136,.4);}
.lobby-countdown{font-family:'Cinzel Decorative',cursive;font-size:1.4rem;color:#d4a040;text-shadow:0 0 20px rgba(212,160,64,.4);}

/* ══════════════════════════════════════════════════════════════
   DICE
══════════════════════════════════════════════════════════════ */
.lk-dice-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;transition:transform .15s;}
.lk-dice-wrap:not(.rolling):hover{transform:scale(1.06);}
.lk-dice-wrap.rolling{animation:diceShake .85s ease-in-out;}
@keyframes diceShake{0%{transform:rotate(0);}15%{transform:rotate(-14deg) scale(1.08);}30%{transform:rotate(12deg) scale(1.14);}45%{transform:rotate(-9deg) scale(1.1);}60%{transform:rotate(7deg) scale(1.06);}75%{transform:rotate(-4deg) scale(1.03);}100%{transform:rotate(0) scale(1);}}
.dice-spin-txt{font-family:'IM Fell English',serif;font-style:italic;font-size:.72rem;color:rgba(212,160,64,.5);}
.dice-tap-hint{font-family:'IM Fell English',serif;font-style:italic;font-size:.72rem;margin-top:1px;}

/* ══════════════════════════════════════════════════════════════
   TOAST NOTIFICATION
══════════════════════════════════════════════════════════════ */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-family:'IM Fell English',serif;font-style:italic;font-size:.88rem;z-index:500;animation:toastIn .3s ease;white-space:nowrap;pointer-events:none;max-width:90vw;text-align:center;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.toast-info{background:rgba(20,10,40,.95);border:1px solid rgba(212,160,64,.4);color:#d4a040;}
.toast-snake{background:rgba(40,8,8,.95);border:1px solid rgba(200,50,50,.5);color:#ff8888;}
.toast-ladder{background:rgba(8,30,12,.95);border:1px solid rgba(60,200,80,.4);color:#88ff99;}
.toast-capture{background:rgba(40,12,4,.95);border:1px solid rgba(255,140,60,.4);color:#ffaa66;}
.toast-home{background:rgba(8,20,40,.95);border:1px solid rgba(80,160,255,.4);color:#88ccff;}
.toast-six{background:rgba(30,20,5,.95);border:1px solid rgba(212,160,64,.55);color:#ffd060;}

/* ══════════════════════════════════════════════════════════════
   WINNER BANNER
══════════════════════════════════════════════════════════════ */
.lk-winner-banner{background:linear-gradient(135deg,rgba(212,160,64,.15),rgba(212,111,160,.1));border:1px solid rgba(212,160,64,.4);border-radius:10px;padding:12px 20px;text-align:center;margin:6px 0 10px;font-family:'Cinzel Decorative',cursive;font-size:.88rem;color:#d4a040;width:100%;max-width:500px;box-shadow:0 0 30px rgba(212,160,64,.1);}
.lk-reset-btn{display:inline-block;margin-top:9px;background:rgba(212,160,64,.12);border:1px solid rgba(212,160,64,.38);color:#d4a040;padding:6px 18px;border-radius:4px;cursor:pointer;font-family:'IM Fell English',serif;font-style:italic;font-size:.8rem;transition:all .2s;}
.lk-reset-btn:hover{background:rgba(212,160,64,.25);}

/* ══════════════════════════════════════════════════════════════
   SNAKE & LADDER SCREEN
══════════════════════════════════════════════════════════════ */
.sl-screen{padding:10px 8px 90px;}
.sl-layout{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;justify-content:center;width:100%;max-width:720px;margin-top:8px;}
.sl-ctrl{display:flex;flex-direction:column;gap:10px;min-width:150px;max-width:180px;padding-top:4px;}
.sl-scores{display:flex;gap:8px;}
.sl-score-card{display:flex;flex-direction:column;align-items:center;padding:10px 12px;background:rgba(0,0,0,.4);border:1px solid;border-radius:8px;min-width:72px;gap:2px;}
.sl-turn{border:1px solid;border-radius:6px;padding:8px 10px;text-align:center;font-family:'IM Fell English',serif;font-style:italic;font-size:.82rem;transition:all .35s;background:rgba(0,0,0,.3);}
.sl-msg{font-family:'IM Fell English',serif;font-style:italic;font-size:.75rem;color:rgba(205,180,120,.55);padding:7px 10px;background:rgba(0,0,0,.38);border-left:2px solid rgba(212,160,64,.3);border-radius:0 4px 4px 0;line-height:1.5;}

/* ══════════════════════════════════════════════════════════════
   LUDO SCREEN
══════════════════════════════════════════════════════════════ */
.ludo-full{padding:10px 6px 90px;}
.ludo-layout{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;justify-content:center;width:100%;max-width:800px;margin-top:6px;}
.ludo-board-col{flex-shrink:0;}
.ludo-ctrl{display:flex;flex-direction:column;gap:10px;min-width:148px;max-width:180px;padding-top:6px;}
.ludo-score-row{display:flex;gap:8px;}
.ludo-score{display:flex;flex-direction:column;align-items:center;padding:9px 12px;background:rgba(0,0,0,.38);border:1px solid;border-radius:8px;min-width:68px;gap:2px;}
.ludo-turn-badge{border:1px solid;border-radius:6px;padding:8px 10px;text-align:center;font-family:'IM Fell English',serif;font-style:italic;font-size:.8rem;transition:all .35s;background:rgba(0,0,0,.32);}
.ludo-hint{font-family:'IM Fell English',serif;font-style:italic;font-size:.74rem;color:rgba(212,160,64,.6);text-align:center;padding:4px 6px;background:rgba(0,0,0,.28);border-radius:4px;line-height:1.4;}
.ludo-waiting{font-family:'IM Fell English',serif;font-style:italic;font-size:.72rem;color:rgba(205,180,120,.28);text-align:center;}

/* Token pulse */
.tok-pulse{animation:tokP 1.1s ease-in-out infinite;}
@keyframes tokP{0%,100%{opacity:.3;}50%{opacity:.75;}}

/* ══════════════════════════════════════════════════════════════
   GAMES HUB
══════════════════════════════════════════════════════════════ */
.lk-hub{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 14px 60px;background:linear-gradient(160deg,#07001a 0%,#120430 60%,#07000e 100%);}
.lk-hub-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.3rem,5vw,2rem);color:#d4a040;text-shadow:0 0 28px rgba(212,160,64,.5);margin:18px 0 5px;text-align:center;}
.lk-hub-sub{font-family:'IM Fell English',serif;font-style:italic;color:rgba(205,180,120,.36);font-size:.83rem;margin-bottom:10px;}
.lk-hub-live{display:flex;align-items:center;gap:7px;font-family:'Cinzel Decorative',cursive;font-size:.65rem;color:rgba(68,255,136,.65);letter-spacing:.16em;margin-bottom:26px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:#44ff88;box-shadow:0 0 8px #44ff88;animation:ldPulse 1.5s ease-in-out infinite;}
@keyframes ldPulse{0%,100%{opacity:1;}50%{opacity:.45;box-shadow:0 0 14px #44ff88;}}
.lk-hub-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:28px;}
.lk-hub-card{width:clamp(190px,44vw,230px);background:linear-gradient(145deg,#1a0836 0%,#0c001e 100%);border:1px solid rgba(212,160,64,.2);border-radius:14px;padding:24px 16px;cursor:pointer;transition:all .26s;text-align:center;position:relative;overflow:hidden;box-shadow:0 4px 22px rgba(0,0,0,.5);}
.lk-hub-card:hover{border-color:rgba(212,160,64,.5);transform:translateY(-5px);box-shadow:0 12px 36px rgba(212,160,64,.1);}
.lk-hub-card-shine{position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 30%,rgba(212,160,64,.05) 0%,transparent 60%);pointer-events:none;}
.lk-hub-card-icon{font-size:2.4rem;margin-bottom:10px;filter:drop-shadow(0 0 8px rgba(212,160,64,.25));}
.lk-hub-card-name{font-family:'Cinzel Decorative',cursive;font-size:.92rem;color:#d4a040;margin-bottom:9px;}
.lk-hub-card-desc{font-family:'IM Fell English',serif;font-style:italic;font-size:.76rem;color:rgba(205,180,120,.45);line-height:1.58;margin-bottom:13px;}
.lk-hub-card-play{font-family:'Cinzel Decorative',cursive;font-size:.7rem;color:rgba(212,160,64,.55);letter-spacing:.1em;transition:color .2s;}
.lk-hub-card:hover .lk-hub-card-play{color:#d4a040;}
.lk-hub-how{background:rgba(0,0,0,.28);border:1px solid rgba(212,160,64,.09);border-radius:10px;padding:18px;max-width:460px;width:100%;}
.lk-hub-how-title{font-family:'Cinzel Decorative',cursive;font-size:.75rem;color:rgba(212,160,64,.5);letter-spacing:.08em;margin-bottom:12px;text-align:center;}
.lk-hub-how-steps{display:flex;flex-direction:column;gap:9px;}
.lk-hub-step{display:flex;align-items:flex-start;gap:9px;font-family:'IM Fell English',serif;font-style:italic;font-size:.78rem;color:rgba(205,180,120,.48);line-height:1.5;}
.step-num{background:rgba(212,160,64,.13);border:1px solid rgba(212,160,64,.28);color:#d4a040;border-radius:50%;width:19px;height:19px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel Decorative',cursive;font-size:.6rem;flex-shrink:0;}

/* ══════════════════════════════════════════════════════════════
   TIC TAC TOE
══════════════════════════════════════════════════════════════ */
.ttt-screen{padding-top:8px;}
.ttt-marks{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:340px;padding:10px 16px;margin:10px 0 4px;background:rgba(0,0,0,.25);border:1px solid rgba(212,160,64,.1);border-radius:10px;font-family:'Cinzel Decorative',cursive;font-size:.78rem;}
.ttt-board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0;padding:14px;background:rgba(0,0,0,.3);border:1px solid rgba(212,160,64,.13);border-radius:14px;width:min(310px,90vw);}
.ttt-cell{aspect-ratio:1;border-radius:10px;border:2px solid rgba(212,160,64,.18);background:rgba(10,3,26,.6);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.ttt-cell.hover:hover{border-color:rgba(212,160,64,.45);background:rgba(212,160,64,.06);transform:scale(1.04);}
.ttt-cell.filled{cursor:default;}
.ttt-cell.win-cell{border-color:rgba(212,160,64,.7);background:rgba(212,160,64,.1);box-shadow:0 0 16px rgba(212,160,64,.2);animation:winPulse .8s ease-in-out infinite alternate;}
@keyframes winPulse{from{box-shadow:0 0 8px rgba(212,160,64,.15);}to{box-shadow:0 0 22px rgba(212,160,64,.4);}}
.ttt-mark{font-size:2.2rem;font-weight:900;font-family:'Cinzel Decorative',cursive;animation:markPop .18s cubic-bezier(.2,1.4,.5,1) both;}
@keyframes markPop{from{transform:scale(0) rotate(-15deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.ttt-mark.tx{color:#d4a040;text-shadow:0 0 12px rgba(212,160,64,.6);}
.ttt-mark.to{color:#d46fa0;text-shadow:0 0 12px rgba(212,111,160,.6);}
.ttt-result{margin:8px 0;padding:14px 22px;background:rgba(212,160,64,.08);border:1px solid rgba(212,160,64,.25);border-radius:10px;font-family:'Cinzel Decorative',cursive;font-size:.85rem;color:#d4a040;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;}
.ttt-replay{background:rgba(212,160,64,.12);border:1px solid rgba(212,160,64,.35);color:#d4a040;border-radius:8px;padding:6px 20px;font-family:'Cinzel Decorative',cursive;font-size:.68rem;cursor:pointer;transition:all .2s;}
.ttt-replay:hover{background:rgba(212,160,64,.22);box-shadow:0 0 12px rgba(212,160,64,.15);}

══════════════════════════════════════════════════════════════ */
.c4-screen{padding-top:8px;}
.c4-grid{display:flex;gap:5px;padding:12px;background:rgba(8,2,30,.85);border:2px solid rgba(212,160,64,.18);border-radius:14px;margin:12px 0;box-shadow:0 4px 24px rgba(0,0,0,.5);}
.c4-col{display:flex;flex-direction:column;gap:5px;align-items:center;cursor:pointer;padding:2px;border-radius:6px;transition:background .15s;position:relative;}
.c4-col.hoverable:hover{background:rgba(212,160,64,.07);}
.c4-preview{width:clamp(30px,8vw,42px);height:10px;border-radius:4px 4px 0 0;opacity:.75;margin-bottom:2px;animation:previewBounce .4s ease-in-out infinite alternate;}
@keyframes previewBounce{from{transform:translateY(0);}to{transform:translateY(-4px);}}
.c4-cell{width:clamp(30px,8vw,42px);height:clamp(30px,8vw,42px);border-radius:50%;background:rgba(20,8,44,.9);border:2px solid rgba(212,160,64,.1);transition:all .2s;}
.c4-cell.filled{border-color:transparent;animation:dropIn .25s cubic-bezier(.4,1.6,.6,1) both;}
@keyframes dropIn{from{transform:scaleY(0) scaleX(1.1);opacity:.5;}to{transform:scaleY(1) scaleX(1);opacity:1;}}

// ════════════════════════════════════════════════════════════════
// SUPABASE HELPERS  (replaces Firebase — free, no credit card)

// 👇 Fill these two values in after creating your Supabase project
const SB_URL = "https://hqasmuyzmhclrlqbmkfe.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxYXNtdXl6bWhjbHJscWJta2ZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTYwOTEsImV4cCI6MjA4ODg5MjA5MX0.rYlUbM48af0TCAYm6X-qn0v-VJVLiCns_7hTz4RL_S8";

const SB_H=()=>({
  "apikey": SB_KEY,
  "Authorization": "Bearer "+SB_KEY,
  "Content-Type": "application/json",
  "Prefer": "return=representation"
});
// Convert /rooms/ABCD/ttt_state  →  ABCD__ttt_state
function sbId(p){return p.replace(/^\/rooms\//,"").replace(/\//g,"__");}

async function fbGet(p){
  try{
    const r=await fetch(SB_URL+"/rest/v1/rooms?id=eq."+encodeURIComponent(sbId(p)),{headers:SB_H()});
    if(!r.ok)return null;
    const a=await r.json();
    return a.length?a[0].data:null;
  }catch{return null;}
}
async function fbGetEx(p){
  try{
    const r=await fetch(SB_URL+"/rest/v1/rooms?id=eq."+encodeURIComponent(sbId(p)),{headers:SB_H()});
    if(!r.ok){
      const body=await r.text().catch(()=>"");
      if(SB_URL.includes("PASTE")||SB_KEY.includes("PASTE"))
        return{data:null,err:"⚠️ Supabase not configured — open the JSX file and fill in SB_URL and SB_KEY"};
      return{data:null,err:"Supabase error "+r.status+(body.includes("permission")?" — check RLS policies":"")};
    }
    const a=await r.json();
    return{data:a.length?a[0].data:null,err:null};
  }catch(e){
    const msg=e?.message||"unknown";
    if(SB_URL.includes("PASTE")||SB_KEY.includes("PASTE"))
      return{data:null,err:"⚠️ Supabase not configured — open the JSX file and fill in SB_URL and SB_KEY"};
    return{data:null,err:"Cannot reach Supabase: "+msg+" — check your URL and key"};
  }
}
async function fbSet(p,d){
  try{
    const r=await fetch(SB_URL+"/rest/v1/rooms",{
      method:"POST",
      headers:{...SB_H(),"Prefer":"resolution=merge-duplicates,return=representation"},
      body:JSON.stringify({id:sbId(p),data:d,updated_at:new Date().toISOString()})
    });
    if(!r.ok){const b=await r.text().catch(()=>"");console.error("sbSet failed",r.status,b);}
    return r.ok;
  }catch(e){console.error("sbSet threw",e?.message);return false;}
}
async function fbPatch(p,d){
  const existing=await fbGet(p)||{};
  return fbSet(p,{...existing,...d});
}
async function fbPush(p,d){
  const existing=await fbGet(p)||{};
  const key="msg_"+Date.now();
  return fbSet(p,{...existing,[key]:d})?key:null;
}

const EMOJIS=["❤️","😍","🥰","😘","💕","💛","💗","😂","😭","😊","🤗","😏","😅","🥺","🙏","💫","🎉","🌹","🌸","✨","💎","🔥","🫶","😌","💌","🌙","⭐","🦋","🌺","🤣","💪","🫀","💝","💞","💓","🎲","🐍","🪜","😴","🤭","😇","🫣","😆","🤩","😜","🥳","🫂","🤞","👑","🏆"];

// ROOM CODE MATCHMAKING
// Host creates a 4-digit room code. Guest types it to join.
// Firebase path: /rooms/{CODE}/{gameKey}
// No timestamps, no polling for "online", no clock comparison.
// ════════════════════════════════════════════════════════════════
function genCode(){return String(Math.floor(1000+Math.random()*9000));}

function RoomGate({gameKey,gameTitle,gameIcon,initState,onJoined}){
  const [screen,setScreen]=useState("menu"); // menu | creating | joining | waiting
  const [code,setCode]=useState("");
  const [inputCode,setInputCode]=useState(["","","",""]);
  const [err,setErr]=useState("");
  const [waitDots,setWaitDots]=useState(".");
  const roomPath=code?"/rooms/"+code+"/"+gameKey:null;
  const inputRefs=[useRef(),useRef(),useRef(),useRef()];

  // Animate waiting dots
  useEffect(()=>{
    if(screen!=="waiting")return;
    const iv=setInterval(()=>setWaitDots(d=>d.length>=3?".":".".repeat(d.length+1)),600);
    return()=>clearInterval(iv);
  },[screen]);

  // While waiting (host): poll for guest joining
  useEffect(()=>{
    if(screen!=="waiting"||!roomPath)return;
    const iv=setInterval(async()=>{
      const d=await fbGet(roomPath);
      if(d&&d.p2===true){
        clearInterval(iv);
        // Reset game state fresh for this session
        await fbSet(roomPath+"_state",{...initState,ts:Date.now()});
        onJoined(1,code);
      }
    },1500);
    return()=>clearInterval(iv);
  },[screen,roomPath]);

  const createRoom=async()=>{
    const c=genCode();
    setErr("Creating room…");
    const ok=await fbSet("/rooms/"+c+"/"+gameKey,{p1:true,p2:false,ts:Date.now()});
    if(!ok){setErr("Firebase write failed — check your database rules (Firebase Console → Realtime Database → Rules → set .read and .write to true)");return;}
    setCode(c);
    setErr("");
    setScreen("waiting");
  };

  const joinRoom=async()=>{
    const c=inputCode.join("");
    if(c.length!==4){setErr("Enter all 4 digits");return;}
    setErr("Checking…");
    const {data:d,err:connErr}=await fbGetEx("/rooms/"+c+"/"+gameKey);
    if(connErr){setErr(connErr);return;}
    if(!d||!d.p1){setErr("Room not found. Check the code!");return;}
    if(d.p2){setErr("Room is full — game already started!");return;}
    const patched=await fbPatch("/rooms/"+c+"/"+gameKey,{p2:true});
    if(!patched){setErr("Connection error — try again.");return;}
    setErr("");
    setCode(c);
    onJoined(2,c);
  };

  const handleDigit=(i,val)=>{
    if(!/^\d*$/.test(val))return;
    const next=[...inputCode];
    next[i]=val.slice(-1);
    setInputCode(next);
    setErr("");
    if(val&&i<3)inputRefs[i+1].current?.focus();
    if(!val&&i>0)inputRefs[i-1].current?.focus();
  };

  const handleDigitKey=(i,e)=>{
    if(e.key==="Backspace"&&!inputCode[i]&&i>0){
      inputRefs[i-1].current?.focus();
    }
    if(e.key==="Enter")joinRoom();
  };

  if(screen==="menu")return(
    <div className="rg-screen">
      <button className="lk-back" onClick={()=>onJoined(0,"")}>← Back</button>
      <div className="rg-icon">{gameIcon}</div>
      <div className="rg-title">{gameTitle}</div>
      <div className="rg-tagline">Private room · Just the two of you</div>
      {err&&<div className="rg-err" style={{maxWidth:"320px",textAlign:"center",lineHeight:"1.5"}}>{err}</div>}
      <div className="rg-cards">
        <div className="rg-card rg-create" onClick={createRoom}>
          <div className="rg-card-glow"/>
          <div className="rg-card-icon">🏠</div>
          <div className="rg-card-label">Create Room</div>
          <div className="rg-card-desc">Start a new game and share the code with her</div>
          <div className="rg-card-cta">You go first →</div>
        </div>
        <div className="rg-card rg-join" onClick={()=>{setScreen("joining");setTimeout(()=>inputRefs[0].current?.focus(),100);}}>
          <div className="rg-card-glow"/>
          <div className="rg-card-icon">🔑</div>
          <div className="rg-card-label">Join Room</div>
          <div className="rg-card-desc">Enter the 4-digit code she sent you</div>
          <div className="rg-card-cta">Enter code →</div>
        </div>
      </div>
    </div>
  );

  if(screen==="joining")return(
    <div className="rg-screen">
      <button className="lk-back" onClick={()=>setScreen("menu")}>← Back</button>
      <div className="rg-icon">{gameIcon}</div>
      <div className="rg-title">Enter Room Code</div>
      <div className="rg-tagline">Ask her to share the 4-digit code</div>
      <div className="rg-otp-row">
        {inputCode.map((d,i)=>(
          <input key={i} ref={inputRefs[i]} className={"rg-otp-box"+(d?" filled":"")}
            type="text" inputMode="numeric" maxLength={1} value={d}
            onChange={e=>handleDigit(i,e.target.value)}
            onKeyDown={e=>handleDigitKey(i,e)}
            onFocus={e=>e.target.select()}/>
        ))}
      </div>
      {err&&<div className="rg-err">{err}</div>}
      <button className="rg-join-btn" onClick={joinRoom}
        disabled={inputCode.join("").length!==4}>
        Join Game ✦
      </button>
      <div className="rg-hint">Ask her to open the same game and tap "Create Room"</div>
    </div>
  );

  if(screen==="waiting")return(
    <div className="rg-screen">
      <button className="lk-back" onClick={()=>{setScreen("menu");setCode("");}}>← Cancel</button>
      <div className="rg-icon">{gameIcon}</div>
      <div className="rg-title">Room Created!</div>
      <div className="rg-code-block">
        <div className="rg-code-label">Share this code with her</div>
        <div className="rg-code-display">
          {code.split("").map((d,i)=>(
            <div key={i} className="rg-code-digit">{d}</div>
          ))}
        </div>
        <button className="rg-copy-btn" onClick={()=>{
          navigator.clipboard?.writeText(code).catch(()=>{});
        }}>📋 Copy Code</button>
      </div>
      <div className="rg-waiting-row">
        <div className="rg-waiting-ring"/>
        <div className="rg-waiting-txt">Waiting for her to join{waitDots}</div>
      </div>
      <div className="rg-waiting-sub">She needs to tap "Join Room" and enter <strong style={{color:"#d4a040"}}>{code}</strong></div>
    </div>
  );

  return null;
}

// DICE — animated roll, cycles numbers
// ════════════════════════════════════════════════════════════════
const DICE_DOTS={
  1:[[50,50]],
  2:[[30,30],[70,70]],
  3:[[30,30],[50,50],[70,70]],
  4:[[30,30],[70,30],[30,70],[70,70]],
  5:[[30,30],[70,30],[50,50],[30,70],[70,70]],
  6:[[30,23],[70,23],[30,50],[70,50],[30,77],[70,77]]
};

function DiceFace({value,rolling,canRoll,onRoll,color}){
  const [display,setDisplay]=useState(value||1);
  const col=color||P1C;
  const tiRef=useRef(null);

  useEffect(()=>{
    if(rolling){
      let i=0;
      tiRef.current=setInterval(()=>{
        setDisplay(Math.floor(Math.random()*6)+1);
        i++;
        if(i>14){clearInterval(tiRef.current);}
      },60);
    } else {
      clearInterval(tiRef.current);
      if(value)setDisplay(value);
    }
    return()=>clearInterval(tiRef.current);
  },[rolling,value]);

  return(
    <div className={"lk-dice-wrap"+(rolling?" rolling":"")}
      onClick={canRoll&&!rolling?onRoll:undefined}
      style={{cursor:canRoll&&!rolling?"pointer":"default",opacity:(!canRoll&&!rolling&&!value)?0.35:1}}>
      <svg viewBox="0 0 100 100" width="80" height="80">
        <defs>
          <linearGradient id="dgDiceFace" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#1e0d00"/>
            <stop offset="100%" stopColor="#0a0400"/>
          </linearGradient>
          <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stopColor="rgba(255,255,255,0.07)"/>
            <stop offset="100%" stopColor="rgba(0,0,0,0)"/>
          </linearGradient>
          <filter id="dg-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        {/* Shadow */}
        <rect x="8" y="10" width="88" height="88" rx="18" fill="rgba(0,0,0,0.5)"/>
        {/* Body */}
        <rect x="4" y="4" width="88" height="88" rx="18" fill="url(#dgDiceFace)" stroke={col} strokeWidth="2.5" filter="url(#dg-glow)"/>
        {/* Top shine */}
        <rect x="10" y="8" width="76" height="38" rx="12" fill="url(#shine)"/>
        {/* Dots */}
        {(DICE_DOTS[display]||[]).map(([x,y],i)=>(
          <circle key={i} cx={x} cy={y} r="9"
            fill={col}
            style={{filter:"drop-shadow(0 0 3px "+col+"99)"}}/>
        ))}
        {/* Tap hint */}
        {!value&&!rolling&&canRoll&&(
          <text x="50" y="62" textAnchor="middle" fill={col} fontSize="12" fontFamily="serif" opacity="0.6">TAP</text>
        )}
      </svg>
      {rolling&&<div className="dice-spin-txt">Rolling…</div>}
      {canRoll&&!rolling&&!value&&<div className="dice-tap-hint" style={{color:col}}>Roll dice</div>}
    </div>
  );
}

// TOAST NOTIFICATION
// ════════════════════════════════════════════════════════════════
function Toast({msg,type}){
  if(!msg)return null;
  return <div className={"toast toast-"+type}>{msg}</div>;
}
function useToast(){
  const [toast,setToast]=useState(null);
  const tiRef=useRef(null);
  const show=(msg,type="info",dur=2800)=>{
    setToast({msg,type});
    clearTimeout(tiRef.current);
    tiRef.current=setTimeout(()=>setToast(null),dur);
  };
  return[toast,show];
}

// CHAT PANEL
// ════════════════════════════════════════════════════════════════
function ChatPanel({myP,chatPath,presPath,open,onClose}){
  const [msgs,setMsgs]=useState([]);
  const [inp,setInp]=useState("");
  const [showEmoji,setShowEmoji]=useState(false);
  const [otherTyping,setOtherTyping]=useState(false);
  const [unread,setUnread]=useState(0);
  const bottomRef=useRef(null);
  const typingTimer=useRef(null);
  const lastTs=useRef(Date.now());
  const openRef=useRef(open);
  useEffect(()=>{openRef.current=open;},[open]);

  useEffect(()=>{
    if(!myP||!chatPath)return;
    const poll=async()=>{
      const cd=await fbGet(chatPath);
      if(cd){
        const arr=Object.values(cd).sort((a,b)=>a.ts-b.ts);
        setMsgs(arr);
        if(!openRef.current){
          const nc=arr.filter(m=>m.player!==myP&&m.ts>lastTs.current).length;
          if(nc>0)setUnread(n=>n+nc);
          if(arr.length)lastTs.current=arr[arr.length-1].ts;
        }
      }
      const pd=await fbGet(presPath);
      const other=myP===1?2:1;
      if(pd)setOtherTyping(!!(pd["t"+other]));
    };
    poll();
    const iv=setInterval(poll,2500);
    return()=>clearInterval(iv);
  },[myP,chatPath,presPath]);

  useEffect(()=>{
    if(open){
      setUnread(0);
      if(msgs.length)lastTs.current=msgs[msgs.length-1].ts;
    }
  },[open]);

  useEffect(()=>{
    if(open&&bottomRef.current)bottomRef.current.scrollIntoView({behavior:"smooth"});
  },[msgs,otherTyping,open]);

  const handleInp=(e)=>{
    setInp(e.target.value);
    fbPatch(presPath,{["t"+myP]:true});
    clearTimeout(typingTimer.current);
    typingTimer.current=setTimeout(()=>fbPatch(presPath,{["t"+myP]:false}),2000);
  };
  const send=async()=>{
    const t=inp.trim();if(!t)return;
    await fbPush(chatPath,{player:myP,text:t,ts:Date.now()});
    setInp("");setShowEmoji(false);
    fbPatch(presPath,{["t"+myP]:false});
    clearTimeout(typingTimer.current);
  };
  const quickReact=(e)=>fbPush(chatPath,{player:myP,text:e,ts:Date.now()});

  return(
    <>
      <button className={"chat-fab"+(open?" open":"")} onClick={()=>onClose()}>
        {open?"✕":"💬"}
        {!open&&unread>0&&<span className="chat-badge">{unread>9?"9+":unread}</span>}
      </button>
      {open&&(
        <div className="chat-overlay">
          <div className="chat-hdr">
            <span className="chat-hdr-title">💬 Chat</span>
            <div className="chat-quick-row">
              {["❤️","😂","🥺","💛","🤭","🙏"].map(e=>(
                <button key={e} className="chat-quick" onClick={()=>quickReact(e)}>{e}</button>
              ))}
            </div>
            <button className="chat-close" onClick={()=>onClose()}>✕</button>
          </div>
          <div className="chat-msgs">
            {msgs.length===0&&<div className="chat-empty">Say something sweet… 💌</div>}
            {msgs.map((m,i)=>{
              const mine=m.player===myP;
              const isEmoji=[...m.text].length===1||m.text.length<=2;
              return(
                <div key={i} className={"cb"+(mine?" mine":" theirs")}>
                  <div className={"ct"+(isEmoji?" emoji-only":"")} style={mine?{background:"rgba(212,160,64,.18)",border:"1px solid rgba(212,160,64,.22)"}:{background:"rgba(212,111,160,.14)",border:"1px solid rgba(212,111,160,.18)"}}>{m.text}</div>
                  <div className="cts">{new Date(m.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>
                </div>
              );
            })}
            {otherTyping&&(
              <div className="typing-row">
                <span className="td"/><span className="td"/><span className="td"/>
                <span style={{marginLeft:5,color:P2C,fontSize:".7rem",fontStyle:"italic"}}>typing…</span>
              </div>
            )}
            <div ref={bottomRef}/>
          </div>
          {showEmoji&&(
            <div className="emoji-grid">
              {EMOJIS.map(e=><button key={e} className="emoji-btn" onClick={()=>{setInp(v=>v+e);setShowEmoji(false);}}>{e}</button>)}
            </div>
          )}
          <div className="chat-inp-bar">
            <button className="emoji-tog" onClick={()=>setShowEmoji(s=>!s)}>😊</button>
            <input className="chat-inp" value={inp} onChange={handleInp}
              onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Say something sweet…"/>
            <button className="chat-snd" onClick={send}>➤</button>
          </div>
        </div>
      )}
    </>
  );
}

// GAME PRESENCE BAR — shows who is online in the game room
// ════════════════════════════════════════════════════════════════
function GamePresenceBar({myP, presPath}){
  const [online,setOnline]=useState({p1:false,p2:false});
  useEffect(()=>{
    if(!myP||!presPath)return;
    const ping=()=>fbPatch(presPath,{["on"+myP]:Date.now()});
    ping();
    const iv=setInterval(async()=>{
      ping();
      const d=await fbGet(presPath);
      if(d){
        const now=Date.now();
        setOnline({p1:!!(d.on1&&now-d.on1<9000),p2:!!(d.on2&&now-d.on2<9000)});
      }
    },3000);
    return()=>clearInterval(iv);
  },[myP,presPath]);
  const players=[
    {p:1,label:myP===1?"You":"Her",col:P1C},
    {p:2,label:myP===2?"You":"Her",col:P2C},
  ];
  return(
    <div className="pres-row">
      {players.map(({p,label,col})=>{
        const isOn=online[p===1?"p1":"p2"];
        return(
          <div key={p} className="pc-compact">
            <div className={"pc-dot"+(isOn?" pc-on":"")} style={isOn?{}:{background:"rgba(120,100,80,.25)"}}/>
            <span className="pc-status-sm" style={{color:isOn?col:"rgba(205,180,120,.3)"}}>
              {label} {isOn?"· online":"· waiting"}
            </span>
          </div>
        );
      })}
    </div>
  );
}

// SNAKE & LADDER
// ════════════════════════════════════════════════════════════════
const SL_SNAKES={98:79,95:56,87:24,64:21,62:19,54:34,17:7};
const SL_LADDERS={4:14,9:31,20:38,28:84,40:59,51:67,63:81,71:91};
const SL_SMSG={98:"An argument sent us apart 💔",95:"A moment of distance 🌧",87:"A long stretch apart 😔",64:"A misunderstanding 🥺",62:"The distance hurt 😭",54:"A quiet sadness 💧",17:"A small fight 😢"};
const SL_LMSG={4:"Our first real conversation 💬",9:"You laughed at my bad joke 😂",20:"A midnight phone call 🌙",28:"Our first trip together ✈️",40:"A night I'll never forget ✨",51:"When I knew it was you 💛",63:"Our favourite song came on 🎵",71:"You said yes 💕"};
const SL_INIT={p1:0,p2:0,turn:1,dice:null,lastMsg:"",winner:null,ts:0};

const SZ=32;
function sqToXY(sq){
  const idx=sq-1,row=Math.floor(idx/10);
  const col=row%2===0?idx%10:9-(idx%10);
  return{x:col*SZ+SZ/2,y:(9-row)*SZ+SZ/2};
}

function SLBoard({gs}){
  const cells=[];
  // Cells
  for(let r=0;r<10;r++){for(let c=0;c<10;c++){
    const row=9-r,col=row%2===0?c:9-c;
    const sq=row*10+col+1;
    const isSn=SL_SNAKES[sq]!==undefined,isLd=SL_LADDERS[sq]!==undefined;
    const even=(r+c)%2===0;
    let fill=even?"rgba(255,245,215,0.07)":"rgba(20,8,40,0.55)";
    if(isSn)fill="rgba(180,30,30,0.28)";
    if(isLd)fill="rgba(40,160,60,0.28)";
    cells.push(
      <g key={"cell"+sq}>
        <rect x={c*SZ} y={r*SZ} width={SZ} height={SZ} fill={fill} stroke="rgba(212,160,64,0.06)" strokeWidth="0.5"/>
        <text x={c*SZ+3} y={r*SZ+10} fontSize="8" fill="rgba(205,180,120,0.28)" fontFamily="serif">{sq}</text>
      </g>
    );
  }}
  // Draw ladders
  Object.entries(SL_LADDERS).forEach(([from,to])=>{
    const f=sqToXY(+from),t=sqToXY(+to);
    const dx=t.x-f.x,dy=t.y-f.y,len=Math.sqrt(dx*dx+dy*dy);
    const ux=dx/len*4,uy=dy/len*4,nx=-uy,ny=ux;
    const steps=4;
    cells.push(
      <g key={"lad"+from} opacity="0.75">
        <line x1={f.x+nx} y1={f.y+ny} x2={t.x+nx} y2={t.y+ny} stroke="#d4a040" strokeWidth="2" strokeLinecap="round"/>
        <line x1={f.x-nx} y1={f.y-ny} x2={t.x-nx} y2={t.y-ny} stroke="#d4a040" strokeWidth="2" strokeLinecap="round"/>
        {Array.from({length:steps},(_,i)=>{
          const p=(i+1)/(steps+1);
          const rx=f.x+nx+dx*p, ry=f.y+ny+dy*p, lx=f.x-nx+dx*p, ly=f.y-ny+dy*p;
          return<line key={i} x1={rx} y1={ry} x2={lx} y2={ly} stroke="#d4a040" strokeWidth="1.5" strokeLinecap="round"/>;
        })}
        <circle cx={f.x} cy={f.y} r="4" fill="#d4a040" opacity="0.6"/>
        <circle cx={t.x} cy={t.y} r="3" fill="#d4a040" opacity="0.4"/>
      </g>
    );
  });
  // Draw snakes
  Object.entries(SL_SNAKES).forEach(([from,to])=>{
    const f=sqToXY(+from),t=sqToXY(+to);
    const mx=(f.x+t.x)/2+(f.y>t.y?28:-28);
    const my=(f.y+t.y)/2+(f.x>t.x?-18:18);
    cells.push(
      <g key={"sn"+from} opacity="0.8">
        <path d={"M"+f.x+","+f.y+" Q"+mx+","+my+" "+t.x+","+t.y}
          fill="none" stroke="#cc3333" strokeWidth="3.5" strokeLinecap="round"/>
        <path d={"M"+f.x+","+f.y+" Q"+mx+","+my+" "+t.x+","+t.y}
          fill="none" stroke="rgba(255,80,80,0.35)" strokeWidth="5.5" strokeLinecap="round"/>
        {/* Snake head */}
        <circle cx={f.x} cy={f.y} r="5.5" fill="#cc3333"/>
        <circle cx={f.x-2} cy={f.y-2} r="1.5" fill="#ff9999"/>
        <circle cx={f.x+2} cy={f.y-2} r="1.5" fill="#ff9999"/>
      </g>
    );
  });
  // Tokens
  if(gs.p1>0&&gs.p1<=100){const p=sqToXY(gs.p1);cells.push(<circle key="tok1" cx={p.x-5} cy={p.y} r="7" fill={P1C} stroke="#fff" strokeWidth="1.5" style={{filter:"drop-shadow(0 0 5px "+P1C+")"}}/>);}
  if(gs.p2>0&&gs.p2<=100){const p=sqToXY(gs.p2);cells.push(<circle key="tok2" cx={p.x+5} cy={p.y} r="7" fill={P2C} stroke="#fff" strokeWidth="1.5" style={{filter:"drop-shadow(0 0 5px "+P2C+")"}}/>);}
  // Border
  cells.push(<rect key="bdr" x="0" y="0" width={SZ*10} height={SZ*10} fill="none" stroke="rgba(212,160,64,0.35)" strokeWidth="2"/>);
  return(

      {cells}
    </svg>
  );
}

// LUDO BOARD DATA
// ════════════════════════════════════════════════════════════════
const LUDO_PATH=[
  {r:8,c:0},{r:8,c:1},{r:8,c:2},{r:8,c:3},{r:8,c:4},{r:8,c:5},
  {r:7,c:5},{r:6,c:5},{r:5,c:5},{r:4,c:5},{r:3,c:5},{r:2,c:5},{r:1,c:5},{r:0,c:5},
  {r:0,c:6},{r:0,c:7},{r:0,c:8},{r:0,c:9},{r:0,c:10},{r:0,c:11},{r:0,c:12},{r:0,c:13},{r:0,c:14},
  {r:1,c:14},{r:2,c:14},{r:3,c:14},{r:4,c:14},{r:5,c:14},
  {r:6,c:14},{r:6,c:13},{r:6,c:12},{r:6,c:11},{r:6,c:10},{r:6,c:9},{r:6,c:8},
  {r:7,c:8},{r:8,c:8},{r:9,c:8},{r:10,c:8},{r:11,c:8},{r:12,c:8},{r:13,c:8},{r:14,c:8},
  {r:14,c:7},{r:14,c:6},{r:14,c:5},{r:14,c:4},{r:14,c:3},{r:14,c:2},{r:14,c:1},{r:14,c:0},
  {r:13,c:0},
];
// 6-square home stretches per player
const LP1S=[{r:7,c:1},{r:7,c:2},{r:7,c:3},{r:7,c:4},{r:7,c:5},{r:7,c:6}];
const LP2S=[{r:1,c:7},{r:2,c:7},{r:3,c:7},{r:4,c:7},{r:5,c:7},{r:6,c:7}];
// 8 safe squares: 4 starting squares (idx 0,26 per player + player offsets) + 4 stars
// Absolute indices on 52-path: 0,8,13,21,26,34,39,47
const LSAFE=new Set([0,8,13,21,26,34,39,47]);
const P1HD=[{r:2,c:2},{r:2,c:4},{r:4,c:2},{r:4,c:4}];
const P2HD=[{r:2,c:10},{r:2,c:12},{r:4,c:10},{r:4,c:12}];

// Player relative position → shared 52-path index (0-51), or -1
function lSIdx(player,pos){
  if(pos<=0||pos>=53)return -1;
  return(pos-1+(player===1?0:26))%52;
}
// Board coords from player-relative position
function lCoords(player,pos){
  if(pos===0)return null;
  if(pos>=59)return{r:7,c:7};
  if(pos>=53){const s=player===1?LP1S:LP2S;return s[pos-53]||{r:7,c:7};}
  return LUDO_PATH[lSIdx(player,pos)];
}
// Count tokens of `player` at shared index `si` (for blockade detection)
function tokensAtSI(tokens,player,si){
  return tokens.filter(p=>p>=1&&p<=52&&lSIdx(player,p)===si).length;
}
// Get all legally movable token indices for a player
function getLegalMoves(player,myToks,oppToks,dice,mode,kills){
  if(!dice)return[];
  const oppP=player===1?2:1;
  const moves=[];
  for(let i=0;i<myToks.length;i++){
    const pos=myToks[i];
    if(pos>=59)continue;                     // already home
    if(pos===0&&dice!==6)continue;           // need 6 to activate
    const npos=pos===0?1:pos+dice;
    if(npos>59)continue;                     // exact finish rule
    // Quick mode: can't enter home stretch (pos 53+) without a prior kill
    if(mode==="quick"&&npos>=53&&(kills[player]||0)===0)continue;
    // Check for opponent BLOCKADE along entire path including landing square
    let blocked=false;
    const startStep=pos===0?1:pos+1;
    const endStep=Math.min(npos,52);         // blockades only on outer path
    for(let step=startStep;step<=endStep&&!blocked;step++){
      const si=lSIdx(player,step);
      if(si>=0&&tokensAtSI(oppToks,oppP,si)>=2)blocked=true;
    }
    if(!blocked)moves.push(i);
  }
  return moves;
}

// LUDO GAME
// ════════════════════════════════════════════════════════════════
function LudoGame({onBack}){
  const [gs,setGs]=useState(LUDO_INIT);
  const [myP,setMyP]=useState(0);
  const [rolling,setRolling]=useState(false);
  const [dv,setDv]=useState(null);
  const [chatOpen,setChatOpen]=useState(false);
  const [roomCode,setRoomCode]=useState("");
  const [toast,showToast]=useToast();
  const [timer,setTimer]=useState(30);
  const [selectedMode,setSelectedMode]=useState(null);
  const timerRef=React.useRef(null);
  const autoRef=React.useRef(false);
  const dvRef=React.useRef(null);
  const gsRef=React.useRef(gs);   // always-current gs for timer/auto callbacks

  const CHAT_PATH=(rc)=>"/rooms/"+rc+"/ludo_chat";
  const PRES_PATH=(rc)=>"/rooms/"+rc+"/ludo_pres";
  const PFBS=(rc)=>"/rooms/"+rc+"/ludo_state";
  const CS=26;const BS=15*CS;

  // Keep refs in sync on every render
  React.useEffect(()=>{dvRef.current=dv;},[dv]);
  React.useEffect(()=>{gsRef.current=gs;},[gs]);

  // Poll for remote updates
  React.useEffect(()=>{
    if(!myP||!roomCode)return;
    const iv=setInterval(async()=>{
      const d=await fbGet(PFBS(roomCode));
      if(d&&d.ts!==gs.ts){
        setGs(d);
        if(d.turn!==myP){setDv(null);dvRef.current=null;}
        else if(d.dice!=null){setDv(d.dice);dvRef.current=d.dice;}
      }
    },2200);
    return()=>clearInterval(iv);
  },[myP,roomCode,gs.ts]);

  // 30-second turn timer
  React.useEffect(()=>{
    if(!myP||!roomCode||gs.winner)return;
    clearInterval(timerRef.current);
    if(gs.turn!==myP){setTimer(30);return;}
    setTimer(30);
    timerRef.current=setInterval(()=>{
      setTimer(t=>{
        if(t<=1){
          clearInterval(timerRef.current);
          if(!autoRef.current){autoRef.current=true;doAutoPlay();}
          return 30;
        }
        return t-1;
      });
    },1000);
    autoRef.current=false;
    return()=>clearInterval(timerRef.current);
  },[gs.turn,myP,roomCode,gs.ts,gs.winner]);

  const doAutoPlay=async()=>{
    const curGs=gsRef.current;
    // Guards: don't act if game is over or if it's not actually our turn
    if(!curGs||curGs.winner)return;
    if(curGs.turn!==myP)return;
    const curDv=dvRef.current;
    if(!curDv){
      // Auto-roll using current gs from ref
      await execRoll(curGs);
    } else {
      const myToks=myP===1?curGs.p1:curGs.p2;
      const oppToks=myP===1?curGs.p2:curGs.p1;
      const legal=getLegalMoves(myP,myToks,oppToks,curDv,curGs.mode,curGs.kills);
      if(legal.length>0){
        // Move most advanced token
        const best=legal.reduce((b,i)=>myToks[i]>myToks[b]?i:b,legal[0]);
        await execMove(best,curDv,curGs);
      } else {
        const skip={...curGs,turn:myP===1?2:1,dice:null,consec6:0,ts:Date.now()};
        await fbSet(PFBS(roomCode),skip);setGs(skip);setDv(null);dvRef.current=null;
      }
    }
  };

  const execRoll=async(state)=>{
    if(rolling)return;
    setRolling(true);
    await new Promise(r=>setTimeout(r,900));
    const d=Math.floor(Math.random()*6)+1;
    const prevC6=state.consec6||0;
    // ── 3 consecutive sixes: forfeit ──
    if(d===6&&prevC6>=2){
      showToast("🎲 तीन छक्के! Turn forfeited!","info");
      const skip={...state,dice:null,turn:state.turn===1?2:1,consec6:0,ts:Date.now()};
      await fbSet(PFBS(roomCode),skip);setGs(skip);setDv(null);dvRef.current=null;setRolling(false);
      return;
    }
    const newC6=d===6?prevC6+1:0;
    const ng={...state,dice:d,consec6:newC6,ts:Date.now()};
    await fbSet(PFBS(roomCode),ng);setGs(ng);
    setDv(d);dvRef.current=d;setRolling(false);
    if(d===6)showToast("🎲 छक्का! Move then roll again!","six");
    const myToks=myP===1?ng.p1:ng.p2;
    const oppToks=myP===1?ng.p2:ng.p1;
    const legal=getLegalMoves(myP,myToks,oppToks,d,ng.mode,ng.kills);
    if(legal.length===0){
      showToast("No valid moves — passing turn","info");
      setTimeout(async()=>{
        const skip={...ng,turn:myP===1?2:1,dice:null,consec6:0,ts:Date.now()};
        await fbSet(PFBS(roomCode),skip);setGs(skip);setDv(null);dvRef.current=null;
      },1500);
    } else if(legal.length===1){
      // ── Auto-move: only one legal option — use gsRef for freshest state ──
      setTimeout(()=>execMove(legal[0],d,gsRef.current||ng),700);
    }
  };

  const rollDice=async()=>{
    if(rolling||gs.winner||gs.turn!==myP||dv!=null)return;
    clearInterval(timerRef.current);
    await execRoll(gs);
  };

  const execMove=async(ti,dice,state)=>{
    let p1=[...state.p1],p2=[...state.p2];
    const my=myP===1?p1:p2,opp=myP===1?p2:p1;
    const oppP=myP===1?2:1;
    const pos=my[ti];
    if(pos>=59)return;
    if(pos===0&&dice!==6)return;
    const npos=pos===0?1:pos+dice;
    if(npos>59)return;
    // Quick mode guard
    if(state.mode==="quick"&&npos>=53&&(state.kills[myP]||0)===0){
      showToast("⚔️ Capture an opponent token first!","info");
      return;
    }
    my[ti]=npos;
    // ── Capture check (outer path 1-52, non-safe) ──
    let captured=false;
    const landSI=lSIdx(myP,npos);
    if(npos>=1&&npos<=52&&landSI>=0&&!LSAFE.has(landSI)){
      for(let oi=0;oi<opp.length;oi++){
        if(opp[oi]>=1&&opp[oi]<=52){
          const oppSI=lSIdx(oppP,opp[oi]);
          if(oppSI===landSI){
            // Only capture if it's a single token (blockade = 2+ tokens, can't land)
            const blockCount=opp.filter((t,j)=>j!==oi&&t>=1&&t<=52&&lSIdx(oppP,t)===oppSI).length;
            if(blockCount===0){opp[oi]=0;captured=true;}
          }
        }
      }
    }
    const newKills={...(state.kills||{1:0,2:0})};
    if(captured){newKills[myP]=(newKills[myP]||0)+1;showToast("💥 Captured! Token sent to yard!","capture");}
    const reachedHome=npos===59;
    if(reachedHome){
      const cnt=my.filter(x=>x>=59).length;
      showToast("🏠 Token home! "+cnt+"/4","home");
    }
    // ── Win condition ──
    const allDone=state.mode==="quick"?my.some(x=>x>=59):my.every(x=>x>=59);
    const winner=allDone?myP:null;
    // ── Bonus roll: on 6, capture, or reaching home ──
    const bonus=(dice===6||captured||reachedHome)&&!winner;
    const nextTurn=bonus?myP:(myP===1?2:1);
    const nextC6=(bonus&&dice===6)?(state.consec6||0):0;
    const ng={
      p1:myP===1?my:opp,p2:myP===2?my:opp,
      turn:nextTurn,dice:null,consec6:nextC6,
      winner,kills:newKills,mode:state.mode,ts:Date.now()
    };
    await fbSet(PFBS(roomCode),ng);setGs(ng);setDv(null);dvRef.current=null;
    if(bonus&&!winner)showToast(dice===6?"🎲 Roll again!":captured?"💫 Bonus roll — Capture!":"🏠 Bonus roll — Token home!","six");
  };

  const moveToken=async(ti)=>{
    if(!dv||gs.turn!==myP||gs.winner)return;
    clearInterval(timerRef.current);
    await execMove(ti,dv,gs);
  };

  // ── Board renderer ──
  const renderBoard=()=>{
    const els=[];
    // ── Ludo King style board ──
    const RED="#E53935",GRN="#43A047",BLU="#1E88E5",YLW="#FDD835";

    // 1. White board background
    els.push(<rect key="bg" x={0} y={0} width={BS} height={BS} fill="#F5F5F0"/>);

    // 2. HOME YARDS (6x6 colored corners)
    // Red (top-left)
    els.push(<rect key="yd-r" x={0} y={0} width={6*CS} height={6*CS} fill={RED}/>);
    els.push(<rect key="yd-ri" x={1*CS} y={1*CS} width={4*CS} height={4*CS} fill="#FFFFFF" rx={6}/>);
    // Green (top-right)
    els.push(<rect key="yd-g" x={9*CS} y={0} width={6*CS} height={6*CS} fill={GRN}/>);
    els.push(<rect key="yd-gi" x={10*CS} y={1*CS} width={4*CS} height={4*CS} fill="#FFFFFF" rx={6}/>);
    // Blue (bottom-left)
    els.push(<rect key="yd-b" x={0} y={9*CS} width={6*CS} height={6*CS} fill={BLU}/>);
    els.push(<rect key="yd-bi" x={1*CS} y={10*CS} width={4*CS} height={4*CS} fill="#FFFFFF" rx={6}/>);
    // Yellow (bottom-right)
    els.push(<rect key="yd-y" x={9*CS} y={9*CS} width={6*CS} height={6*CS} fill={YLW}/>);
    els.push(<rect key="yd-yi" x={10*CS} y={10*CS} width={4*CS} height={4*CS} fill="#FFFFFF" rx={6}/>);

    // 3. TOKEN SLOT CIRCLES in yards
    P1HD.forEach(({r,c},i)=>{
      els.push(<circle key={"sr"+i} cx={c*CS+CS/2} cy={r*CS+CS/2} r={CS*0.36} fill={RED} opacity={0.35} stroke="rgba(0,0,0,0.08)" strokeWidth={1}/>);
    });
    P2HD.forEach(({r,c},i)=>{
      els.push(<circle key={"sg"+i} cx={c*CS+CS/2} cy={r*CS+CS/2} r={CS*0.36} fill={GRN} opacity={0.35} stroke="rgba(0,0,0,0.08)" strokeWidth={1}/>);
    });
    [{r:10,c:2},{r:10,c:4},{r:12,c:2},{r:12,c:4}].forEach(({r,c},i)=>{
      els.push(<circle key={"sb"+i} cx={c*CS+CS/2} cy={r*CS+CS/2} r={CS*0.36} fill={BLU} opacity={0.4} stroke="rgba(0,0,0,0.08)" strokeWidth={1}/>);
    });
    [{r:10,c:10},{r:10,c:12},{r:12,c:10},{r:12,c:12}].forEach(({r,c},i)=>{
      els.push(<circle key={"sy"+i} cx={c*CS+CS/2} cy={r*CS+CS/2} r={CS*0.36} fill={YLW} opacity={0.5} stroke="rgba(0,0,0,0.1)" strokeWidth={1}/>);
    });

    // 4. PATH CELLS (white with grid lines)
    for(let r=0;r<15;r++){for(let c=0;c<15;c++){
      if(r<=5&&c<=5)continue;   // red yard
      if(r<=5&&c>=9)continue;   // green yard
      if(r>=9&&c<=5)continue;   // blue yard
      if(r>=9&&c>=9)continue;   // yellow yard
      if(r>=6&&r<=8&&c>=6&&c<=8)continue; // center (drawn later)
      els.push(<rect key={"pc"+r+"-"+c} x={c*CS} y={r*CS} width={CS} height={CS}
        fill="#FFFFFF" stroke="#CCCCCC" strokeWidth={0.6}/>);
    }}

    // 5. HOME STRETCH CELLS
    // Red stretch: row 7, cols 1-5
    for(let c=1;c<=5;c++){
      els.push(<rect key={"hr"+c} x={c*CS} y={7*CS} width={CS} height={CS} fill={RED} opacity={0.75}/>);
      els.push(<rect key={"hr-s"+c} x={c*CS} y={7*CS} width={CS} height={CS} fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth={0.6}/>);
    }
    // Red stretch col 6 (inside center)
    els.push(<rect key="hr6" x={6*CS} y={7*CS} width={CS} height={CS} fill={RED} opacity={0.6}/>);

    // Green stretch: col 7, rows 1-5
    for(let r=1;r<=5;r++){
      els.push(<rect key={"hg"+r} x={7*CS} y={r*CS} width={CS} height={CS} fill={GRN} opacity={0.75}/>);
      els.push(<rect key={"hg-s"+r} x={7*CS} y={r*CS} width={CS} height={CS} fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth={0.6}/>);
    }
    // Green stretch row 6 (inside center)
    els.push(<rect key="hg6" x={7*CS} y={6*CS} width={CS} height={CS} fill={GRN} opacity={0.6}/>);

    // Yellow stretch: row 7, cols 9-13 (decorative)
    for(let c=9;c<=13;c++){
      els.push(<rect key={"hy"+c} x={c*CS} y={7*CS} width={CS} height={CS} fill={YLW} opacity={0.8}/>);
      els.push(<rect key={"hy-s"+c} x={c*CS} y={7*CS} width={CS} height={CS} fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth={0.6}/>);
    }
    // Yellow stretch col 8 (inside center)
    els.push(<rect key="hy8" x={8*CS} y={7*CS} width={CS} height={CS} fill={YLW} opacity={0.6}/>);

    // Blue stretch: col 7, rows 9-13 (decorative)
    for(let r=9;r<=13;r++){
      els.push(<rect key={"hb"+r} x={7*CS} y={r*CS} width={CS} height={CS} fill={BLU} opacity={0.75}/>);
      els.push(<rect key={"hb-s"+r} x={7*CS} y={r*CS} width={CS} height={CS} fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth={0.6}/>);
    }
    // Blue stretch row 8 (inside center)
    els.push(<rect key="hb8" x={7*CS} y={8*CS} width={CS} height={CS} fill={BLU} opacity={0.6}/>);

    // 6. CENTER 3x3 (rows 6-8, cols 6-8) — colored triangles
    const x0=6*CS,y0=6*CS,x1=9*CS,y1=9*CS,mx=7.5*CS,my=7.5*CS;
    // Top: Green
    els.push(<polygon key="ct-g" points={`${x0},${y0} ${x1},${y0} ${mx},${my}`} fill={GRN}/>);
    // Left: Red
    els.push(<polygon key="ct-r" points={`${x0},${y0} ${x0},${y1} ${mx},${my}`} fill={RED}/>);
    // Right: Yellow
    els.push(<polygon key="ct-y" points={`${x1},${y0} ${x1},${y1} ${mx},${my}`} fill={YLW}/>);
    // Bottom: Blue
    els.push(<polygon key="ct-b" points={`${x0},${y1} ${x1},${y1} ${mx},${my}`} fill={BLU}/>);
    // White center circle
    els.push(<circle key="ct-c" cx={mx} cy={my} r={CS*0.6} fill="#FFFFFF" stroke="rgba(0,0,0,0.08)" strokeWidth={1}/>);
    els.push(<text key="ct-star" x={mx} y={my+6} textAnchor="middle" fill="rgba(180,130,0,0.7)" fontSize="17" fontWeight="bold">★</text>);

    // 7. SAFE STAR MARKERS on path cells
    LUDO_PATH.forEach(({r,c},idx)=>{
      if(LSAFE.has(idx)){
        const safe=(r<=5&&c>=9)||(r>=9&&c<=5)||(r>=9&&c>=9);
        if(!safe) els.push(<text key={"ss"+idx} x={c*CS+CS/2} y={r*CS+CS/2+4} textAnchor="middle" fill="rgba(130,90,0,0.6)" fontSize="12">★</text>);
      }
    });

    // 8. ENTRY ARROWS
    // P1 entry: {r:8,c:0} → ▶
    els.push(<text key="arr1" x={0.5*CS} y={8*CS+CS/2+4} textAnchor="middle" fill={RED} fontSize="11" fontWeight="bold">▶</text>);
    // P2 entry: {r:4,c:14} → ◀
    els.push(<text key="arr2" x={14.5*CS} y={4*CS+CS/2+4} textAnchor="middle" fill={GRN} fontSize="11" fontWeight="bold">◀</text>);
    // Decorative: blue entry ↑ at bottom, yellow ↓ at top
    els.push(<text key="arr3" x={6*CS+CS/2} y={14.5*CS} textAnchor="middle" fill={BLU} fontSize="11" fontWeight="bold">▲</text>);
    els.push(<text key="arr4" x={8*CS+CS/2} y={0.5*CS+4} textAnchor="middle" fill={YLW} fontSize="11" fontWeight="bold">▼</text>);

    // 9. BLOCKADE indicators
    const markBlockades=(tokens,player)=>{
      const siCounts={};
      tokens.forEach(p=>{
        if(p>=1&&p<=52){const si=lSIdx(player,p);siCounts[si]=(siCounts[si]||0)+1;}
      });
      Object.entries(siCounts).forEach(([si,cnt])=>{
        if(cnt>=2){
          const {r,c}=LUDO_PATH[si];
          const col=player===1?P1C:P2C;
          els.push(<rect key={"blk"+player+si} x={c*CS+2} y={r*CS+2} width={CS-4} height={CS-4}
            fill="none" stroke={col} strokeWidth="2" strokeDasharray="3,2" rx="2" opacity="0.85"/>);
        }
      });
    };
    markBlockades(gs.p1,1);
    markBlockades(gs.p2,2);

    // 10. TOKENS as map location pins
    const myLegal=dv&&myP?getLegalMoves(myP,myP===1?gs.p1:gs.p2,myP===1?gs.p2:gs.p1,dv,gs.mode,gs.kills):[];

    const MapPin=({cx,cy,col,lit,num})=>{
      const r=CS*0.37;
      // Pin: circle head + pointed tail
      const pinPath=`M ${cx} ${cy+r*1.55} L ${cx-r*0.82} ${cy-r*0.15} A ${r} ${r} 0 1 1 ${cx+r*0.82} ${cy-r*0.15} Z`;
      return(
        <g>
          {lit&&<circle cx={cx} cy={cy} r={CS*0.5} fill="none" stroke={col} strokeWidth="2" opacity="0.55" className="tok-pulse"/>}
          <path d={pinPath} fill={col}
            stroke={lit?"#FFFFFF":"rgba(0,0,0,0.25)"} strokeWidth={lit?1.5:0.8}
            style={{filter:lit?`drop-shadow(0 0 6px ${col})`:"drop-shadow(0 1px 4px rgba(0,0,0,0.35))"}}/>
          {/* Metallic ring on pin body */}
          <circle cx={cx} cy={cy-r*0.08} r={r*0.7} fill="none" stroke="rgba(0,0,0,0.18)" strokeWidth="1"/>
          {/* Shine highlight */}
          <circle cx={cx-r*0.28} cy={cy-r*0.65} r={r*0.28} fill="rgba(255,255,255,0.6)"/>
          {/* Token number */}
          <text x={cx} y={cy-r*0.08+3} textAnchor="middle" fill="rgba(255,255,255,0.92)" fontSize="6.5" fontWeight="bold">{num}</text>
        </g>
      );
    };

    const renderToks=(tokens,player)=>{
      const col=player===1?P1C:P2C;
      return tokens.map((pos,ti)=>{
        const isLegal=!gs.winner&&gs.turn===player&&myP===player&&dv!=null&&myLegal.includes(ti);
        let tx,ty;
        if(pos===0){
          const hd=player===1?P1HD[ti]:P2HD[ti];
          tx=hd.c*CS+CS/2; ty=hd.r*CS+CS/2;
        } else {
          const coord=lCoords(player,pos);
          if(!coord)return null;
          const ox=[[-5,-5],[5,-5],[-5,5],[5,5]];
          tx=coord.c*CS+CS/2+ox[ti][0];
          ty=coord.r*CS+CS/2+ox[ti][1];
        }
        return(
          <g key={"tok"+player+ti}
            onClick={isLegal?()=>moveToken(ti):undefined}
            style={{cursor:isLegal?"pointer":"default"}}>
            <MapPin cx={tx} cy={ty} col={col} lit={isLegal} num={ti+1}/>
          </g>
        );
      });
    };
    renderToks(gs.p1,1).forEach(el=>el&&els.push(el));
    renderToks(gs.p2,2).forEach(el=>el&&els.push(el));

    // 11. BOARD BORDER
    els.push(<rect key="bdr" x={1} y={1} width={BS-2} height={BS-2} fill="none" stroke="#444444" strokeWidth="2"/>);

    return els;
  };

  // ── Mode select screen ──
  if(!selectedMode)return(
    <LudoModeSelect onSelect={setSelectedMode} onBack={onBack}/>
  );

  // ── Room gate ──
  if(!myP)return(
    <div className="lk-screen">
      <button className="lk-back" onClick={()=>setSelectedMode(null)}>← Back</button>
      <RoomGate gameKey="ludo" gameTitle="Ludo" gameIcon="🎲" initState={{...LUDO_INIT,mode:selectedMode}}
        onJoined={async(p,rc)=>{
          if(!p){setSelectedMode(null);return;}
          setMyP(p);setRoomCode(rc);
          const d=await fbGet(PFBS(rc));
          if(d){setGs(d);if(d.dice!=null){setDv(d.dice);dvRef.current=d.dice;}}
        }}/>
    </div>
  );

  const myTurn=gs.turn===myP;
  const myToks=myP===1?gs.p1:gs.p2;
  const herToks=myP===1?gs.p2:gs.p1;
  const legal=dv&&myTurn?getLegalMoves(myP,myToks,myP===1?gs.p2:gs.p1,dv,gs.mode,gs.kills):[];
  const myKills=gs.kills?gs.kills[myP]||0:0;

  return(
    <div className="lk-screen ludo-full">
      <div className="lk-topbar">
        <button className="lk-back sm" onClick={onBack}>← Games</button>
        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
          <span style={{color:"rgba(205,180,120,0.45)",fontSize:".68rem",fontStyle:"italic"}}>{gs.mode==="quick"?"⚡ Quick":"🏆 Classic"}</span>
          <GamePresenceBar myP={myP} presPath={PRES_PATH(roomCode)}/>
        </div>
      </div>

      {gs.winner&&(
        <div className="lk-winner-banner">
          {gs.winner===myP?"🏆 You won! 🔴":"🟢 She won!"}
          <button className="lk-reset-btn" onClick={async()=>{
            const r={...LUDO_INIT,mode:gs.mode,ts:Date.now()};
            await fbSet(PFBS(roomCode),r);setGs(r);setDv(null);dvRef.current=null;setMyP(0);setRoomCode("");setSelectedMode(null);
          }}>Play Again</button>
        </div>
      )}

      <Toast msg={toast?.msg} type={toast?.type}/>

      <div className="ludo-layout">
        <div className="ludo-board-col">
          <svg width={BS} height={BS} viewBox={"0 0 "+BS+" "+BS}
            style={{maxWidth:"min("+BS+"px,97vw)",maxHeight:"58vh",display:"block",margin:"0 auto",background:"#0a0515",borderRadius:4}}>
            {renderBoard()}
          </svg>
        </div>
        <div className="ludo-ctrl">
          {/* Scores */}
          <div className="ludo-score-row">
            <div className="ludo-score" style={{borderColor:P1C+"55"}}>
              <span style={{color:P1C,fontFamily:"'Cinzel Decorative',cursive",fontSize:".7rem"}}>🔴 {myP===1?"You":"Her"}</span>
              <span style={{color:P1C,fontFamily:"'Cinzel Decorative',cursive",fontSize:"1.2rem"}}>{(myP===1?myToks:herToks).filter(x=>x>=59).length}/4</span>
              <span style={{color:"rgba(205,180,120,.3)",fontSize:".6rem",fontStyle:"italic"}}>home</span>
              {gs.mode==="quick"&&<span style={{color:"rgba(212,160,64,0.6)",fontSize:".6rem"}}>⚔️ {myP===1?myKills:(gs.kills?gs.kills[myP===1?2:1]||0:0)}</span>}
            </div>
            <div className="ludo-score" style={{borderColor:P2C+"55"}}>
              <span style={{color:P2C,fontFamily:"'Cinzel Decorative',cursive",fontSize:".7rem"}}>🟢 {myP===1?"Her":"You"}</span>
              <span style={{color:P2C,fontFamily:"'Cinzel Decorative',cursive",fontSize:"1.2rem"}}>{(myP===1?herToks:myToks).filter(x=>x>=59).length}/4</span>
              <span style={{color:"rgba(205,180,120,.3)",fontSize:".6rem",fontStyle:"italic"}}>home</span>
              {gs.mode==="quick"&&<span style={{color:"rgba(212,111,160,0.6)",fontSize:".6rem"}}>⚔️ {myP===1?(gs.kills?gs.kills[2]||0:0):myKills}</span>}
            </div>
          </div>

          {/* Turn badge + timer */}
          <div className="ludo-turn-badge" style={{borderColor:myTurn?P1C+"55":"rgba(212,160,64,0.08)",color:myTurn?"#d4a040":"rgba(205,180,120,0.3)"}}>
            {myTurn?(dv?"✨ Tap a glowing token":"✨ Your Turn!"):("⏳ Her Turn… ")}
            {myTurn&&<span style={{color:timer<=10?"#e05050":"rgba(205,180,120,0.5)",fontSize:".72rem",marginLeft:"6px"}}>⏱ {timer}s</span>}
          </div>

          {/* Dice */}
          <div style={{display:"flex",justifyContent:"center"}}>
            <DiceFace value={dv} rolling={rolling} canRoll={myTurn&&!rolling&&!gs.winner&&dv==null} onRoll={rollDice} color={myP===1?P1C:P2C}/>
          </div>

          {/* Hint text */}
          {dv&&myTurn&&legal.length>0&&<div className="ludo-hint">{dv===6?"🎲 छक्का — move then roll again!":"Tap a glowing token ✦"}</div>}
          {dv&&myTurn&&legal.length===0&&<div className="ludo-hint" style={{color:"rgba(205,180,120,0.5)"}}>No moves — passing…</div>}
          {!myTurn&&<div className="ludo-waiting">Waiting for her move…</div>}

          {/* Quick mode kill notice */}
          {gs.mode==="quick"&&myKills===0&&<div style={{textAlign:"center",fontSize:".68rem",color:"rgba(212,111,160,0.55)",marginTop:"4px",fontStyle:"italic"}}>⚔️ Capture to unlock home path</div>}
        </div>
      </div>
      <ChatPanel myP={myP} chatPath={CHAT_PATH(roomCode)} presPath={PRES_PATH(roomCode)} open={chatOpen} onClose={()=>setChatOpen(s=>!s)}/>
    </div>
  );
}
