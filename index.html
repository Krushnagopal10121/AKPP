// ─── Bezier helpers ─────────────────────────────────────────────────────────
function qbez (t,p0,p1,p2){ return (1-t)*(1-t)*p0 + 2*(1-t)*t*p1 + t*t*p2; }
function qbezD(t,p0,p1,p2){ return 2*(1-t)*(p1-p0) + 2*t*(p2-p1); }

const ALL_DISTS = DESTINATIONS.map(d => {
  const ddx = d.left - HOME.left, ddy = d.top - HOME.top;
  return Math.sqrt(ddx*ddx + ddy*ddy);
});
const MAX_DIST = Math.max(...ALL_DISTS) || 1;

function BikeLayer({ dest, progress, mapW, mapH }){
  if(!dest || progress===null || mapW < 10) return null;

  const ox = HOME.left/100*mapW, oy = HOME.top/100*mapH;
  const dx = dest.left/100*mapW, dy = dest.top/100*mapH;

  const lineLen = Math.sqrt((dx-ox)**2+(dy-oy)**2) || 1;
  const bow = lineLen * 0.38;
  const midX=(ox+dx)/2, midY=(oy+dy)/2;
  const perpX=-(dy-oy)/lineLen, perpY=(dx-ox)/lineLen;
  const cx1=Math.max(mapW*0.04,Math.min(mapW*0.96,midX+perpX*bow));
  const cy1=Math.max(mapH*0.04,Math.min(mapH*0.96,midY+perpY*bow));

  const t=progress;
  const bx=qbez(t,ox,cx1,dx);
  const by=qbez(t,oy,cy1,dy);
  const tdx=qbezD(t,ox,cx1,dx);
  const tdy=qbezD(t,oy,cy1,dy);
  const angle=Math.atan2(tdy,tdx)*180/Math.PI;
  const col=dest.color||"#d4a040";
  const sc=Math.max(0.72,Math.min(1.55,mapW/480));

  // Wheel spin angle
  const spin=t*2400;

  // Dust puffs from rear wheel
  const dustPuffs=[0,1,2,3].map(age=>{
    const delay=age*0.045;
    const pt=Math.max(0,t-delay);
    if(pt<0.012)return null;
    const pbx=qbez(pt,ox,cx1,dx);
    const pby=qbez(pt,oy,cy1,dy);
    const ptdx=qbezD(pt,ox,cx1,dx);
    const ptdy=qbezD(pt,oy,cy1,dy);
    const pA=Math.atan2(ptdy,ptdx);
    return {
      px:pbx - Math.cos(pA)*24*sc - Math.sin(pA)*age*5*sc,
      py:pby - Math.sin(pA)*24*sc + Math.cos(pA)*age*4*sc,
      r:(3+age*6.5)*sc,
      op:0.42-age*0.1,
    };
  }).filter(Boolean);

  const burst=t>0.82?(t-0.82)/0.18:0;

  // Royal Enfield palette
  const MAROON="#8B1A1A";
  const DKBLACK="#12100A";
  const CHROME="#BEB8A0";
  const GOLD="#C08828";
  const SILVER="#9A9488";
  const SKIN="#C89060";

  const FX=20,FY=7;   // front wheel center
  const RX=-19,RY=7;  // rear wheel center

  const Wheel=({cx,cy})=>(
    <g transform={`translate(${cx*sc} ${cy*sc})`}>
      {/* Tyre — thick black rubber */}
      <circle r={WR*sc} fill={DKBLACK} stroke="#0A0804" strokeWidth={2.8*sc}/>
      {/* Tyre sidewall highlight */}
      <circle r={WR*sc} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth={4*sc}/>
      {/* Chrome rim */}
      <circle r={(WR-2.2)*sc} fill="none" stroke={CHROME} strokeWidth={1.4*sc} opacity="0.75"/>
      {/* Inner rim ring */}
      <circle r={(WR-3.5)*sc} fill="none" stroke={SILVER} strokeWidth={0.7*sc} opacity="0.5"/>
      {/* 12 spokes */}
      {Array.from({length:12},(_,i)=>{
        const a=(spin+i*30)*Math.PI/180;
        const x1=Math.cos(a)*3*sc, y1=Math.sin(a)*3*sc;
        const x2=Math.cos(a)*(WR-2.8)*sc, y2=Math.sin(a)*(WR-2.8)*sc;
        return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2}
          stroke={CHROME} strokeWidth={0.7*sc} opacity="0.88"/>;

      <circle r={1.8*sc} fill="#3A2408" stroke={GOLD} strokeWidth={0.6*sc}/>

        {/* Headlight glow beam */}
        <circle cx={25*sc} cy={-2*sc} r={10*sc}
          fill="rgba(255,240,140,0.1)" filter="url(#blGlow)"/>
        {/* Speedometer on top */}
        <circle cx={18*sc} cy={-9*sc} r={2.5*sc}
          fill="#1A1408" stroke={CHROME} strokeWidth={0.8*sc}/>
        <circle cx={18*sc} cy={-9*sc} r={1.8*sc} fill="#0A0804"/>

        {/* ── HANDLEBAR ──────────────────────────────────────── */}
        {/* Riser stem */}
        <line x1={15*sc} y1={-5*sc} x2={16*sc} y2={-10*sc}
          stroke={DKBLACK} strokeWidth={2.2*sc} strokeLinecap="round"/>
        {/* Cross bar */}
        <line x1={12*sc} y1={-10*sc} x2={20*sc} y2={-10*sc}
          stroke={DKBLACK} strokeWidth={2.4*sc} strokeLinecap="round"/>
        {/* Grips */}
        <rect x={11*sc} y={-11.2*sc} width={2.5*sc} height={2.5*sc} rx={1.2*sc}
          fill="#0E0804"/>
        <rect x={18.5*sc} y={-11.2*sc} width={2.5*sc} height={2.5*sc} rx={1.2*sc}
          fill="#0E0804"/>
        {/* Throttle/clutch levers */}
        <line x1={20*sc} y1={-10*sc} x2={23*sc} y2={-8*sc}
          stroke={SILVER} strokeWidth={1*sc} strokeLinecap="round"/>
        <line x1={12*sc} y1={-10*sc} x2={9*sc} y2={-8*sc}
          stroke={SILVER} strokeWidth={1*sc} strokeLinecap="round"/>
        {/* Mirror (right side) */}
        <line x1={20*sc} y1={-10.5*sc} x2={23.5*sc} y2={-15*sc}
          stroke={SILVER} strokeWidth={0.9*sc} strokeLinecap="round"/>
        <ellipse cx={24*sc} cy={-15.5*sc} rx={2.2*sc} ry={1.4*sc}
          fill={CHROME} stroke={SILVER} strokeWidth={0.5*sc}/>
        {/* Mirror reflection */}
        <ellipse cx={24*sc} cy={-15.5*sc} rx={1.6*sc} ry={1*sc}
          fill="rgba(150,200,220,0.3)"/>

        {/* ── FOOTPEGS ─────────────────────────────────────────── */}
        <line x1={-3*sc} y1={9*sc} x2={1*sc} y2={9*sc}
          stroke={CHROME} strokeWidth={1.8*sc} strokeLinecap="round"/>
        <line x1={-22*sc} y1={8*sc} x2={-26*sc} y2={8*sc}
          stroke={CHROME} strokeWidth={1.8*sc} strokeLinecap="round"/>

        {/* ── GIRL / PILLION (behind, holding rider) ─────────── */}
        {/* Legs */}
        <line x1={-14*sc} y1={-6*sc} x2={-12*sc} y2={5*sc}
          stroke="#A02860" strokeWidth={2.5*sc} strokeLinecap="round"/>
        <line x1={-17*sc} y1={-6*sc} x2={-18*sc} y2={5*sc}
          stroke="#A02860" strokeWidth={2.4*sc} strokeLinecap="round"/>
        {/* Body / kurta */}
        <path d={`M ${-20*sc} ${-12*sc}
                  Q ${-15.5*sc} ${-14.5*sc}
                    ${-11*sc} ${-12*sc}
                  L ${-11*sc} ${-5.5*sc}
                  Q ${-15.5*sc} ${-4.5*sc}
                    ${-20*sc} ${-5.5*sc} Z`}
          fill="#CC5580"/>
        {/* Kurta shading */}
        <path d={`M ${-19*sc} ${-12*sc}
                  Q ${-15.5*sc} ${-13.5*sc}
                    ${-12*sc} ${-12*sc}
                  L ${-12*sc} ${-9*sc}
                  Q ${-15.5*sc} ${-8*sc}
                    ${-19*sc} ${-9*sc} Z`}
          fill="rgba(255,255,255,0.07)"/>
        {/* Arms hugging rider */}
        <path d={`M ${-12*sc} ${-9.5*sc} Q ${-8*sc} ${-9*sc} ${-5*sc} ${-7*sc}`}
          fill="none" stroke={SKIN} strokeWidth={2.2*sc} strokeLinecap="round"/>
        <path d={`M ${-12*sc} ${-8*sc} Q ${-8*sc} ${-7.5*sc} ${-4.5*sc} ${-6*sc}`}
          fill="none" stroke="#CC5580" strokeWidth={1.5*sc} strokeLinecap="round" opacity="0.7"/>
        {/* Girl head */}
        <circle cx={-15.5*sc} cy={-16*sc} r={4.2*sc} fill={SKIN}/>
        {/* Helmet (open face, maroon) */}
        <path d={`M ${-19.7*sc} ${-16.5*sc}
                  A ${4.2*sc} ${4.2*sc} 0 0 1 ${-11.3*sc} ${-16.5*sc}
                  Q ${-11*sc} ${-22*sc} ${-15.5*sc} ${-22.5*sc}
                  Q ${-20*sc} ${-22*sc} ${-19.7*sc} ${-16.5*sc} Z`}
          fill={MAROON}/>
        {/* Helmet chin strap */}
        <path d={`M ${-19.5*sc} ${-16*sc} Q ${-15.5*sc} ${-13.5*sc} ${-11.5*sc} ${-16*sc}`}
          fill="none" stroke="#600808" strokeWidth={0.7*sc}/>
        {/* Visor rim */}
        <path d={`M ${-19.5*sc} ${-16.5*sc} Q ${-15.5*sc} ${-14.8*sc} ${-11.5*sc} ${-16.5*sc}`}
          fill="none" stroke={CHROME} strokeWidth={0.9*sc}/>
        {/* Helmet ventilation ridge */}
        <path d={`M ${-18*sc} ${-21*sc} Q ${-15.5*sc} ${-22.5*sc} ${-13*sc} ${-21*sc}`}
          fill="none" stroke="#700A0A" strokeWidth={1*sc}/>
        {/* Face */}
        <circle cx={-17*sc} cy={-16*sc} r={0.65*sc} fill="#2A1808"/>
        <circle cx={-14*sc} cy={-16*sc} r={0.65*sc} fill="#2A1808"/>
        <path d={`M ${-17*sc} ${-14.5*sc} Q ${-15.5*sc} ${-13.5*sc} ${-14*sc} ${-14.5*sc}`}
          fill="none" stroke="#8B4444" strokeWidth={0.65*sc} strokeLinecap="round"/>
        {/* Bindi */}
        <circle cx={-15.5*sc} cy={-17.5*sc} r={0.4*sc} fill="#CC2244"/>
        {/* Hair peeking from helmet back */}
        <path d={`M ${-19.5*sc} ${-17.5*sc}
                  Q ${-22*sc} ${-15*sc}
                    ${-24*sc} ${-11*sc}
                  Q ${-25*sc} ${-8*sc}
                    ${-23*sc} ${-6*sc}`}
          fill="none" stroke="#1A0E04" strokeWidth={3.5*sc} strokeLinecap="round" opacity="0.95"/>
        <path d={`M ${-20*sc} ${-17*sc} Q ${-23.5*sc} ${-13*sc} ${-25*sc} ${-9*sc}`}
          fill="none" stroke="#2A1A08" strokeWidth={1.8*sc} strokeLinecap="round" opacity="0.6"/>
        {/* Dupatta streaming behind */}
        <path d={`M ${-14*sc} ${-13*sc}
                  Q ${-21*sc} ${-10*sc}
                    ${-28*sc} ${-8.5*sc}
                  Q ${-31*sc} ${-7*sc}
                    ${-29*sc} ${-5*sc}`}
          fill="none" stroke="#E88030" strokeWidth={2.2*sc} opacity="0.88" strokeLinecap="round"/>
        <path d={`M ${-15*sc} ${-12.5*sc}
                  Q ${-22*sc} ${-9.5*sc}
                    ${-29*sc} ${-8*sc}`}
          fill="none" stroke="#F09040" strokeWidth={1*sc} opacity="0.6" strokeLinecap="round"/>
        {/* Dupatta fringe flutter */}
        <path d={`M ${-28*sc} ${-8.5*sc} Q ${-30*sc} ${-4*sc} ${-28*sc} ${-1*sc}`}
          fill="none" stroke="#E08028" strokeWidth={1.2*sc} opacity="0.65" strokeLinecap="round"/>

        {/* ── BOY / RIDER (front, controls bike) ─────────────── */}
        {/* Legs */}
        <line x1={5*sc} y1={-5.5*sc} x2={2*sc} y2={6*sc}
          stroke="#152850" strokeWidth={2.8*sc} strokeLinecap="round"/>
        <line x1={8*sc} y1={-5.5*sc} x2={10*sc} y2={6*sc}
          stroke="#152850" strokeWidth={2.6*sc} strokeLinecap="round"/>
        {/* Body / riding jacket (dark navy) */}
        <path d={`M ${2*sc} ${-14*sc}
                  Q ${6.5*sc} ${-15.5*sc}
                    ${11*sc} ${-13*sc}
                  L ${11*sc} ${-5*sc}
                  Q ${6.5*sc} ${-4*sc}
                    ${2*sc} ${-5*sc} Z`}
          fill="#1E3870"/>
        {/* Jacket detail - chest zip */}
        <line x1={6.5*sc} y1={-14*sc} x2={6.5*sc} y2={-6*sc}
          stroke="#2A4888" strokeWidth={0.7*sc}/>
        {/* Jacket collar */}
        <path d={`M ${4*sc} ${-13.5*sc} L ${6.5*sc} ${-11*sc} L ${9*sc} ${-13.5*sc}`}
          fill="#2A4888" stroke="#1E3870" strokeWidth={0.5*sc}/>
        {/* Jacket shoulder patches */}
        <rect x={2*sc} y={-14*sc} width={2*sc} height={3*sc} rx={0.5*sc}
          fill="#8B1A1A" opacity="0.8"/>
        <rect x={9.5*sc} y={-14*sc} width={2*sc} height={3*sc} rx={0.5*sc}
          fill="#8B1A1A" opacity="0.8"/>
        {/* Arms reaching to handlebar */}
        <path d={`M ${4*sc} ${-10.5*sc}
                  Q ${9*sc} ${-10.5*sc}
                    ${13*sc} ${-10*sc}`}
          fill="none" stroke={SKIN} strokeWidth={2.4*sc} strokeLinecap="round"/>
        <path d={`M ${4*sc} ${-10*sc}
                  Q ${9*sc} ${-10*sc}
                    ${13*sc} ${-9.5*sc}`}
          fill="none" stroke="#1E3870" strokeWidth={2*sc} strokeLinecap="round" opacity="0.65"/>
        {/* Riding gloves */}
        <circle cx={13.5*sc} cy={-9.8*sc} r={1.5*sc} fill="#0A0804"/>
        {/* Rider head */}
        <circle cx={6.5*sc} cy={-17.5*sc} r={4.5*sc} fill={SKIN}/>
        {/* Full-face helmet (black — classic RE style) */}
        <path d={`M ${2*sc} ${-17.5*sc}
                  A ${4.5*sc} ${4.5*sc} 0 0 1 ${11*sc} ${-17.5*sc}
                  Q ${11.5*sc} ${-23.5*sc}
                    ${6.5*sc} ${-24*sc}
                  Q ${1.5*sc} ${-23.5*sc}
                    ${2*sc} ${-17.5*sc} Z`}
          fill="#181818"/>
        {/* Helmet visor (dark tinted) */}
        <path d={`M ${2.5*sc} ${-17.5*sc}
                  Q ${6.5*sc} ${-15.2*sc}
                    ${10.5*sc} ${-17.5*sc}`}
          fill="rgba(60,120,180,0.22)" stroke="#333" strokeWidth={0.7*sc}/>
        {/* Visor rim */}
        <path d={`M ${2.3*sc} ${-17.2*sc} Q ${6.5*sc} ${-14.8*sc} ${10.7*sc} ${-17.2*sc}`}
          fill="none" stroke="#444" strokeWidth={0.5*sc}/>
        {/* Helmet top ridge */}
        <path d={`M ${3.5*sc} ${-22.5*sc} Q ${6.5*sc} ${-24.2*sc} ${9.5*sc} ${-22.5*sc}`}
          fill="none" stroke="#2A2A2A" strokeWidth={1.2*sc}/>
        {/* Helmet vent slots */}
        {[5,6.5,8].map((xv,i)=>(
          <rect key={i} x={(xv-0.4)*sc} y={-23.2*sc} width={0.8*sc} height={1.5*sc}
            rx={0.3*sc} fill="#252525"/>
        ))}
        {/* RE logo on helmet */}
        <circle cx={6.5*sc} cy={-22*sc} r={1.2*sc} fill={MAROON} opacity="0.85"/>
        <text x={6.5*sc} y={-21.3*sc} textAnchor="middle"
          fill={GOLD} fontSize={1.1*sc} fontWeight="bold" fontFamily="serif">RE</text>
        {/* Helmet chin guard */}
        <path d={`M ${3*sc} ${-17*sc}
                  Q ${6.5*sc} ${-19*sc}
                    ${10*sc} ${-17*sc}`}
          fill="#141414" stroke="#222" strokeWidth={0.6*sc}/>

        {/* ── FLOATING HEART ─────────────────────────────────── */}
        {t>0.05 && (
          <text x={-5*sc} y={-28*sc} textAnchor="middle"
            fontSize={7*sc}
            opacity={0.65+Math.sin(t*14)*0.35}
            style={{userSelect:"none",filter:"drop-shadow(0 0 3px rgba(220,80,80,0.6))"}}>❤️</text>
        )}

      </g>

      {/* ── ARRIVAL BURST ──────────────────────────────────────────── */}
      {burst>0 && [0,0.28,0.56].map((phase,i)=>{
        const rp=Math.min(1,Math.max(0,burst-phase));
        if(rp<=0)return null;
        return <circle key={i} cx={dx} cy={dy}
          r={rp*52} fill="none" stroke={col}
          strokeWidth={Math.max(0.4,2.8-rp*2.5)}
          opacity={(1-rp)*0.88}/>;
      })}
      {t>0.65 && (
        <circle cx={dx} cy={dy}
          r={Math.min(7,((t-0.65)/0.35)*9)}
          fill="none" stroke={col} strokeWidth="1.2"
          opacity={Math.min(0.55,((t-0.65)/0.35)*0.55)}
          strokeDasharray="2 3"/>
      )}
    </svg>
  );
}


const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=IM+Fell+English:ital@0;1&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

/* ═══ RESET & ROOT ═══════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#d4a040;--gold-dim:rgba(212,160,64,.55);--gold-glow:rgba(212,160,64,.18);
  --rose:#d46fa0;--ink:#0e0c06;--ink2:#07001a;
  --text:rgba(220,198,148,.82);--text-dim:rgba(205,180,120,.42);
  --border:rgba(212,160,64,.18);--border-bright:rgba(212,160,64,.5);
}
html{scroll-behavior:smooth;}
body{background:var(--ink);overflow-x:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(212,160,64,.22);border-radius:2px;}

/* ═══ STAR FIELD BACKGROUND ════════════════════════════════════════════════ */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 12% 15%, rgba(212,160,64,.55) 0%, transparent 100%),
    radial-gradient(1px 1px at 28% 72%, rgba(212,160,64,.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 45% 33%, rgba(255,220,160,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 62% 88%, rgba(212,160,64,.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 78% 22%, rgba(212,160,64,.45) 0%, transparent 100%),
    radial-gradient(1px 1px at 91% 55%, rgba(255,220,160,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 7%  48%, rgba(212,160,64,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 66%, rgba(212,160,64,.25) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 33% 90%, rgba(255,230,180,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 82% 78%, rgba(212,160,64,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 19% 39%, rgba(212,160,64,.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 10%, rgba(255,220,160,.35) 0%, transparent 100%);
  animation:twinkle 6s ease-in-out infinite alternate;
}
@keyframes twinkle{
  0%{opacity:.6;}
  50%{opacity:1;}
  100%{opacity:.7;}
}

/* ═══ PASSWORD SCREEN ═══════════════════════════════════════════════════════ */
.pw-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 40%,#1e1608 0%,#0a0805 55%,#06040e 100%);
  position:relative;overflow:hidden;
}
.pw-screen::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(212,160,64,.04) 0%,transparent 70%);
  pointer-events:none;
}
.pw-box{
  position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:22px;
  animation:fadeUp 1.4s cubic-bezier(.16,1,.3,1) both;
  padding:52px 48px 44px;
  border:1px solid rgba(212,160,64,.14);
  background:linear-gradient(160deg,rgba(20,14,4,.98),rgba(8,6,2,.99));
  box-shadow:0 0 120px rgba(0,0,0,.98),0 0 40px rgba(212,160,64,.04),inset 0 1px 0 rgba(212,160,64,.06);
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(32px) scale(.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
.mandala{
  width:96px;height:96px;border:1px solid rgba(205,158,60,.4);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  animation:spin 24s linear infinite;
  box-shadow:0 0 28px rgba(212,160,64,.08),inset 0 0 20px rgba(212,160,64,.03);
}
.mandala-mid{
  width:66px;height:66px;border:1px solid rgba(205,158,60,.2);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  animation:spin 16s linear infinite reverse;
}
.mandala-icon{font-size:1.9rem;animation:spin 16s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.pw-title{
  font-family:'Cinzel Decorative',cursive;font-size:clamp(1.1rem,4vw,1.7rem);
  color:var(--gold);letter-spacing:.1em;text-align:center;
  text-shadow:0 0 40px rgba(212,160,64,.35);
}
.pw-eyebrow{
  font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.48em;
  color:rgba(212,160,64,.38);text-transform:uppercase;
}
.pw-rule{width:200px;height:1px;background:linear-gradient(90deg,transparent,rgba(212,160,64,.4),transparent);}
.pw-input{
  width:240px;padding:13px 18px;background:rgba(212,160,64,.03);
  border:none;border-bottom:1px solid rgba(212,160,64,.35);
  color:var(--gold);font-family:'IM Fell English',serif;font-size:1.1rem;
  text-align:center;letter-spacing:.3em;outline:none;
  transition:border-color .3s,background .3s;
}
.pw-input:focus{border-bottom-color:rgba(212,160,64,.8);background:rgba(212,160,64,.05);}
.pw-input.err{animation:shk .38s ease;}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
.pw-btn{
  font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.38em;color:var(--gold);
  background:rgba(212,160,64,.07);border:1px solid rgba(212,160,64,.35);
  padding:12px 38px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;
}
.pw-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(212,160,64,.1),transparent);
  transform:translateX(-100%);transition:transform .5s;
}
.pw-btn:hover{background:rgba(212,160,64,.14);border-color:rgba(212,160,64,.6);box-shadow:0 0 24px rgba(212,160,64,.12);}
.pw-btn:hover::after{transform:translateX(100%);}
.pw-err{font-family:'IM Fell English',serif;font-style:italic;color:#9a2828;font-size:.88rem;min-height:18px;text-align:center;}
.c-orn{position:absolute;width:64px;height:64px;opacity:.22;}
.c-orn.tl{top:14px;left:14px}.c-orn.tr{top:14px;right:14px;transform:scaleX(-1)}
.c-orn.bl{bottom:14px;left:14px;transform:scaleY(-1)}.c-orn.br{bottom:14px;right:14px;transform:scale(-1)}

/* ═══ PAGE TRANSITION ═══════════════════════════════════════════════════════ */
.page{opacity:0;transition:opacity 1.3s ease;min-height:100vh;background:var(--ink);position:relative;}
.page.show{opacity:1;}
.page::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(212,160,64,.03) 0%,transparent 70%);
}

/* ═══ HEADER ═════════════════════════════════════════════════════════════════*/
.site-header{
  position:relative;z-index:5;text-align:center;padding:36px 20px 18px;
  border-bottom:1px solid rgba(212,160,64,.09);
  background:linear-gradient(180deg,rgba(212,160,64,.025) 0%,transparent 100%);
}
.hdr-eyebrow{

.hdr-title{

.hdr-sub{

.hdr-orn{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:14px;animation:fadeUp .9s .6s both;}
.hdr-line{width:100px;height:1px;background:linear-gradient(90deg,transparent,rgba(212,160,64,.3));}

.hdr-gem{font-size:.65rem;color:rgba(212,160,64,.4);}

/* ═══ NAVIGATION BUTTONS ═══════════════════════════════════════════════════ */
.nav-btns{display:flex;gap:10px;justify-content:center;padding:10px 14px 0;z-index:5;position:relative;}
.nav-btn{
  font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.22em;
  color:rgba(212,160,64,.7);background:rgba(212,160,64,.06);
  border:1px solid rgba(212,160,64,.3);padding:9px 22px;

  position:relative;overflow:hidden;

.nav-btn::before{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1.5px;
  background:var(--gold);transform:scaleX(0);transition:transform .3s;
}
.nav-btn:hover,.nav-btn.active{
  color:var(--gold);background:rgba(212,160,64,.12);
  border-color:rgba(212,160,64,.55);box-shadow:0 0 20px rgba(212,160,64,.1);
}
.nav-btn:hover::before,.nav-btn.active::before{transform:scaleX(1);}
.games-btn{
  background:linear-gradient(135deg,rgba(212,160,64,.1),rgba(212,160,64,.06));
  border:1px solid rgba(212,160,64,.38);color:rgba(212,160,64,.85);
  padding:8px 22px;border-radius:4px;cursor:pointer;
  font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.22em;
  transition:all .28s;text-transform:uppercase;position:relative;overflow:hidden;
}
.games-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(212,160,64,.08),transparent);
  transform:translateX(-100%);transition:transform .5s;
}
.games-btn:hover{
  background:linear-gradient(135deg,rgba(212,160,64,.22),rgba(212,160,64,.12));
  border-color:rgba(212,160,64,.65);color:var(--gold);
  box-shadow:0 0 28px rgba(212,160,64,.14);transform:translateY(-1px);
}
.games-btn:hover::after{transform:translateX(100%);}

/* ═══ MAIN LAYOUT ═══════════════════════════════════════════════════════════ */
.main-body{
  position:relative;z-index:5;display:flex;max-width:1120px;
  margin:0 auto;padding:22px 14px;align-items:flex-start;gap:2px;
}
.map-wrap{flex:1.65;min-width:0;}

/* ═══ MAP FRAME ═════════════════════════════════════════════════════════════ */
.map-frame{
  border:1px solid rgba(212,160,64,.22);padding:8px;position:relative;
  background:rgba(212,160,64,.01);overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.6),0 0 0 1px rgba(0,0,0,.4);
}
.map-frame::before{
  content:'';position:absolute;inset:5px;
  border:1px solid rgba(212,160,64,.07);pointer-events:none;z-index:1;
}
.map-frame::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
  background:radial-gradient(ellipse at 50% 0%,rgba(212,160,64,.04) 0%,transparent 60%);
}
.mc{position:absolute;width:16px;height:16px;border-color:rgba(212,160,64,.55);border-style:solid;border-width:0;z-index:3;transition:opacity .3s;}
.mc.tl{top:-1px;left:-1px;border-top-width:2px;border-left-width:2px}
.mc.tr{top:-1px;right:-1px;border-top-width:2px;border-right-width:2px}
.mc.bl{bottom:-1px;left:-1px;border-bottom-width:2px;border-left-width:2px}
.mc.br{bottom:-1px;right:-1px;border-bottom-width:2px;border-right-width:2px}
.map-img-wrap{position:relative;width:100%;user-select:none;overflow:visible;}
.map-img-wrap img{width:100%;display:block;transition:filter .4s;}
.map-img-wrap:hover img{filter:brightness(1.04);}

/* ═══ PINS ═══════════════════════════════════════════════════════════════════ */
.pin-wrap{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:15;}
.pin-appear{animation:pinShow .65s cubic-bezier(.22,.8,.32,1) both;}
@keyframes pinShow{
  from{opacity:0;transform:translate(-50%,-90%) scale(0) rotate(-15deg);}
  to{opacity:1;transform:translate(-50%,-100%) scale(1) rotate(0deg);}
}
.pin-inner{display:flex;flex-direction:column;align-items:center;position:relative;}
.pin-drop{
  width:28px;height:28px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid rgba(255,255,255,.28);
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s;
  position:relative;flex-shrink:0;
}
.pin-drop-icon{transform:rotate(45deg);font-size:11px;line-height:1;user-select:none;display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
.pin-wrap:hover .pin-drop{transform:rotate(-45deg) scale(1.42);}
.pin-stem{width:2px;height:9px;margin:0 auto;border-radius:0 0 1px 1px;opacity:.85;transition:height .25s;}
.pin-shadow{width:8px;height:3px;border-radius:50%;background:rgba(0,0,0,.28);margin:0 auto;transition:transform .25s;}
.pin-wrap:hover .pin-shadow{transform:scaleX(1.6);}
.pin-pulse{
  position:absolute;top:50%;left:50%;width:28px;height:28px;
  border-radius:50%;transform:translate(-50%,-50%);
  animation:pp 2.8s ease-out infinite;pointer-events:none;
}
@keyframes pp{
  0%{opacity:.65;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(3.5);}
}

/* ── Label ── */
.pin-label{
  position:absolute;top:50%;white-space:nowrap;
  background:rgba(5,3,0,.97);border:1px solid rgba(212,160,64,.4);
  border-radius:3px;padding:4px 10px;font-family:'Cinzel',serif;
  font-size:7.5px;letter-spacing:.16em;pointer-events:none;
  opacity:0;transition:opacity .22s,transform .22s;transform:translateY(-50%) translateX(4px);
}
.pin-label.r{left:calc(100% + 9px);}
.pin-label.l{right:calc(100% + 9px);transform:translateY(-50%) translateX(-4px);}
.pin-wrap:hover .pin-label{opacity:1;transform:translateY(-50%) translateX(0);}

/* ── Home pin ── */
.home-circle{
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;border:2.5px solid rgba(255,200,200,.45);
  box-shadow:0 3px 16px rgba(232,85,85,.55),0 0 30px rgba(232,85,85,.15);
  animation:hBob 2.2s ease-in-out infinite;
}
@keyframes hBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ── Couple arrival ── */
.couple-wrap{position:absolute;transform:translate(-50%,-100%);z-index:25;pointer-events:none;animation:coupleIn .7s cubic-bezier(.22,.8,.32,1) both;}
@keyframes coupleIn{from{opacity:0;transform:translate(-50%,-85%) scale(.85);}to{opacity:1;transform:translate(-50%,-100%) scale(1);}}
.couple-label{text-align:center;font-family:'IM Fell English',serif;font-style:italic;font-size:7px;color:rgba(212,160,64,.9);margin-top:3px;white-space:nowrap;background:rgba(6,4,1,.85);padding:2px 6px;border-radius:2px;border:1px solid rgba(212,160,64,.2);}

/* ── Journey banner ── */
.journey-banner{
  position:absolute;bottom:0;left:0;right:0;z-index:30;
  background:linear-gradient(to top,rgba(6,4,1,.97) 0%,rgba(6,4,1,.8) 70%,transparent 100%);
  padding:12px 16px 14px;display:flex;align-items:center;gap:10px;
  backdrop-filter:blur(4px);
}
.jb-text{font-family:'IM Fell English',serif;font-style:italic;color:rgba(212,160,64,.88);font-size:.8rem;flex:1;line-height:1.5;}
.jb-progress{height:2px;background:rgba(212,160,64,.12);border-radius:2px;flex:1;overflow:hidden;}
.jb-bar{height:100%;background:linear-gradient(90deg,rgba(212,160,64,.6),var(--gold));border-radius:2px;transition:width .1s linear;}
.jb-cancel{background:none;border:1px solid rgba(212,160,64,.2);color:rgba(212,160,64,.45);cursor:pointer;font-size:.7rem;padding:3px 9px;border-radius:3px;transition:all .2s;font-family:'Cinzel',serif;letter-spacing:.12em;}
.jb-cancel:hover{border-color:rgba(212,160,64,.5);color:rgba(212,160,64,.8);}
.jb-dot{display:inline-block;animation:dot 1.3s infinite;}
.jb-dot:nth-child(2){animation-delay:.22s;}
.jb-dot:nth-child(3){animation-delay:.44s;}
@keyframes dot{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ═══ SIDEBAR ═══════════════════════════════════════════════════════════════ */
.sidebar{flex:0 0 266px;padding-left:18px;}
.sb-title{
  font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.32em;
  color:rgba(212,160,64,.38);text-transform:uppercase;margin-bottom:13px;
  display:flex;align-items:center;gap:8px;
}
.sb-title::after{content:'';flex:1;height:1px;background:rgba(212,160,64,.1);}
.home-row{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-bottom:2px solid rgba(232,85,85,.18);margin-bottom:4px;
  background:rgba(232,85,85,.04);transition:background .2s;
}
.home-row:hover{background:rgba(232,85,85,.07);}
.home-badge{
  font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.14em;color:#e85555;
  background:rgba(232,85,85,.1);border:1px solid rgba(232,85,85,.25);padding:3px 8px;
}
.dest-row{
  display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;
  border:1px solid transparent;border-left:2px solid transparent;
  border-bottom:1px solid rgba(212,160,64,.07);
  transition:all .22s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
}
.dest-row::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:0;
  background:rgba(212,160,64,.05);transition:width .22s;
}
.dest-row:hover,.dest-row.active{
  border-bottom-color:rgba(212,160,64,.15);
  border-left-color:rgba(212,160,64,.6);
  background:rgba(212,160,64,.04);
}
.dest-row:hover::before{width:100%;}
.dr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:transform .2s;}
.dest-row:hover .dr-dot{transform:scale(1.4);}
.dr-icon{font-size:.92rem;flex-shrink:0;}
.dr-info{flex:1;min-width:0;}
.dr-name{font-family:'Playfair Display',serif;font-size:.88rem;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dr-state{font-family:'IM Fell English',serif;font-style:italic;font-size:.67rem;color:var(--text-dim);}
.dr-arr{color:rgba(212,160,64,.3);font-size:.72rem;transition:transform .22s,color .22s;}
.dest-row:hover .dr-arr{transform:translateX(5px);color:var(--gold-dim);}

/* ─ Legend ─ */
.legend{margin-top:18px;padding:12px 14px;border:1px solid var(--border);background:rgba(212,160,64,.015);}
.lg-title{font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.3em;color:rgba(212,160,64,.36);text-transform:uppercase;margin-bottom:10px;}
.lg-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.lg-dot{width:8px;height:8px;border-radius:50%;}
.lg-txt{font-family:'IM Fell English',serif;font-style:italic;font-size:.72rem;color:rgba(205,180,120,.48);}

/* ─ Quote box ─ */
.quote-box{
  margin-top:16px;padding:14px;
  border:1px solid rgba(212,160,64,.09);
  background:linear-gradient(135deg,rgba(212,160,64,.02),rgba(212,160,64,.005));
  position:relative;
}
.quote-box::before{content:'\u201C';position:absolute;top:-8px;left:10px;font-family:'Playfair Display',serif;font-size:2.5rem;color:rgba(212,160,64,.2);line-height:1;}
.quote-txt{font-family:'Cormorant Garamond',serif;font-style:italic;color:rgba(205,180,120,.42);font-size:.88rem;line-height:1.8;padding-left:8px;}

/* ═══ MODAL ═════════════════════════════════════════════════════════════════ */
.modal-bg{
  position:fixed;inset:0;z-index:300;background:rgba(3,2,0,.9);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;padding:14px;
  opacity:0;pointer-events:none;transition:opacity .38s ease;
}
.modal-bg.show{opacity:1;pointer-events:all;}
.modal-card{
  background:linear-gradient(165deg,#1e1609,#130e04);
  border:1px solid rgba(212,160,64,.35);max-width:530px;width:100%;
  max-height:92vh;overflow-y:auto;position:relative;
  transform:translateY(22px) scale(.95);
  transition:transform .45s cubic-bezier(.16,1,.3,1);
  box-shadow:0 28px 90px rgba(0,0,0,.95),0 0 80px rgba(212,160,64,.05),0 0 0 1px rgba(212,160,64,.06);
}
.modal-bg.show .modal-card{transform:translateY(0) scale(1);}
.modal-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,160,64,.4),transparent);
}
.gallery-wrap{position:relative;height:235px;overflow:hidden;background:#0c0904;}
.gallery-img{
  width:100%;height:235px;object-fit:cover;
  filter:sepia(15%) saturate(.9) contrast(1.1) brightness(.82);
  transition:transform .7s cubic-bezier(.25,.46,.45,.94),opacity .35s;
}
.modal-card:hover .gallery-img{transform:scale(1.04);}
.gallery-fade{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(19,14,4,.97) 100%);pointer-events:none;}
.gallery-name{
  position:absolute;bottom:13px;left:19px;right:19px;
  font-family:'Cinzel Decorative',cursive;font-size:1.1rem;color:var(--gold);
  text-shadow:0 2px 12px rgba(0,0,0,.9);
}
.gallery-state{font-family:'IM Fell English',serif;font-style:italic;font-size:.72rem;color:rgba(205,180,120,.72);display:block;margin-top:3px;}
.gallery-cap{position:absolute;bottom:40px;right:16px;font-family:'IM Fell English',serif;font-style:italic;font-size:.62rem;color:rgba(212,160,64,.55);background:rgba(6,4,1,.65);padding:2px 8px;border-radius:2px;}
.gallery-dots{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;}
.g-dot{width:6px;height:6px;border-radius:50%;background:rgba(212,160,64,.3);cursor:pointer;transition:all .2s;}
.g-dot.active{background:var(--gold);transform:scale(1.35);}
.gallery-arr{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(6,4,1,.6);border:1px solid rgba(212,160,64,.28);
  color:rgba(212,160,64,.75);width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:.8rem;transition:all .22s;z-index:4;
}
.gallery-arr:hover{background:rgba(212,160,64,.2);border-color:rgba(212,160,64,.65);color:var(--gold);}
.gallery-arr.left{left:9px;}
.gallery-arr.right{right:9px;}
.card-body{padding:18px 22px 26px;}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.ctag{
  font-family:'IM Fell English',serif;font-style:italic;font-size:.72rem;
  color:rgba(205,180,120,.65);background:rgba(212,160,64,.06);
  border:1px solid rgba(212,160,64,.14);padding:3px 9px;
  transition:all .2s;
}
.ctag:hover{background:rgba(212,160,64,.12);border-color:rgba(212,160,64,.28);color:rgba(212,160,64,.85);}
.c-lbl{
  font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.28em;
  color:rgba(212,160,64,.38);text-transform:uppercase;
  display:flex;align-items:center;gap:8px;margin-bottom:6px;
}
.c-lbl::after{content:'';flex:1;height:1px;background:rgba(212,160,64,.1);}
.c-txt{font-family:'Cormorant Garamond',serif;font-style:italic;color:rgba(220,198,148,.82);font-size:1rem;line-height:1.9;margin-bottom:14px;}
.c-song{display:flex;align-items:center;gap:8px;padding-top:12px;border-top:1px solid rgba(212,160,64,.09);color:rgba(205,180,120,.45);font-family:'IM Fell English',serif;font-style:italic;font-size:.84rem;}
.close-x{
  position:absolute;top:11px;right:11px;z-index:10;
  background:rgba(12,8,2,.94);border:1px solid rgba(212,160,64,.25);
  color:rgba(212,160,64,.65);width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:.88rem;transition:all .22s;
}
.close-x:hover{border-color:rgba(212,160,64,.7);color:var(--gold);background:rgba(212,160,64,.1);transform:rotate(90deg);}

/* ═══ FOOTER ════════════════════════════════════════════════════════════════ */
.site-footer{
  text-align:center;padding:14px 20px 28px;
  border-top:1px solid rgba(212,160,64,.07);
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:rgba(205,180,120,.2);font-size:.8rem;line-height:1.8;
}
.site-footer span{color:rgba(212,160,64,.35);}

/* ═══ GAMES HUB ════════════════════════════════════════════════════════════ */
.lk-screen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:12px 12px 90px;
  background:linear-gradient(160deg,#07001a 0%,#120430 55%,#07000e 100%);
  color:rgba(205,180,120,.85);overflow-x:hidden;position:relative;
}
.lk-screen::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 50% 50%,rgba(80,20,120,.08) 0%,transparent 70%);
}
.lk-back{
  align-self:flex-start;background:rgba(212,160,64,.06);
  border:1px solid rgba(212,160,64,.25);color:rgba(212,160,64,.6);
  padding:7px 15px;border-radius:5px;cursor:pointer;
  font-family:'IM Fell English',serif;font-style:italic;font-size:.8rem;
  transition:all .22s;white-space:nowrap;
}
.lk-back:hover{border-color:rgba(212,160,64,.55);color:var(--gold);background:rgba(212,160,64,.1);}
.lk-topbar{display:flex;align-items:center;gap:10px;width:100%;max-width:660px;margin-bottom:8px;flex-wrap:wrap;}
.lk-logo{

}
.lk-tagline{font-family:'IM Fell English',serif;font-style:italic;color:rgba(205,180,120,.35);font-size:.84rem;text-align:center;margin-bottom:22px;max-width:340px;}
.lk-join-box{
  background:linear-gradient(145deg,rgba(28,10,52,.94),rgba(12,4,24,.97));

.lk-join-title{font-family:'Cinzel Decorative',cursive;font-size:.88rem;color:var(--gold);margin-bottom:18px;letter-spacing:.06em;}
.lk-join-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.lk-join-btn{

}
.lk-join-btn.p1{background:rgba(212,160,64,.09);border-color:rgba(212,160,64,.4);color:var(--gold);}
.lk-join-btn.p1:hover{background:rgba(212,160,64,.18);box-shadow:0 0 22px rgba(212,160,64,.2);}
.lk-join-btn.p2{background:rgba(212,111,160,.09);border-color:rgba(212,111,160,.4);color:#d46fa0;}
.lk-join-btn.p2:hover{background:rgba(212,111,160,.18);box-shadow:0 0 22px rgba(212,111,160,.2);}
.lk-join-dot{width:15px;height:15px;border-radius:50%;flex-shrink:0;}
.lk-join-note{margin-top:16px;font-family:'IM Fell English',serif;font-style:italic;font-size:.72rem;color:rgba(205,180,120,.28);line-height:1.6;}
.lk-hub{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 14px 60px;background:linear-gradient(160deg,#07001a 0%,#120430 60%,#07000e 100%);}
.lk-hub-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.1rem,4vw,1.55rem);color:var(--gold);text-shadow:0 0 30px rgba(212,160,64,.4);margin-bottom:5px;}
.lk-hub-sub{font-family:'IM Fell English',serif;font-style:italic;color:rgba(205,180,120,.38);font-size:.82rem;margin-bottom:14px;}
.lk-hub-live{
  display:flex;align-items:center;gap:7px;font-family:'Cinzel',serif;

.lk-hub-cards{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;max-width:680px;}
.lk-hub-card{

  padding:24px 16px 20px;cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;box-shadow:0 4px 22px rgba(0,0,0,.55);text-align:center;
}
.lk-hub-card:hover{
  transform:translateY(-7px) scale(1.02);
  border-color:rgba(212,160,64,.45);
  box-shadow:0 14px 40px rgba(0,0,0,.7),0 0 30px rgba(212,160,64,.08);
}
.lk-hub-card-shine{
  position:absolute;top:-80%;left:-80%;width:260%;height:260%;
  background:radial-gradient(ellipse at 35% 35%,rgba(212,160,64,.07) 0%,transparent 65%);
  pointer-events:none;transition:opacity .3s;
}
.lk-hub-card:hover .lk-hub-card-shine{opacity:1.5;}
.lk-hub-card-icon{font-size:2.2rem;margin-bottom:12px;filter:drop-shadow(0 0 10px rgba(212,160,64,.3));}
.lk-hub-card-name{font-family:'Cinzel Decorative',cursive;font-size:.82rem;color:var(--gold);margin-bottom:8px;letter-spacing:.04em;}
.lk-hub-card-desc{font-family:'IM Fell English',serif;font-style:italic;font-size:.73rem;color:rgba(205,180,120,.4);line-height:1.55;margin-bottom:14px;}
.lk-hub-card-play{font-family:'Cinzel',serif;font-size:.6rem;color:rgba(212,160,64,.45);letter-spacing:.1em;transition:color .2s;}
.lk-hub-card:hover .lk-hub-card-play{color:var(--gold);}
.lk-hub-how{margin-top:32px;max-width:420px;width:100%;text-align:center;}
.lk-hub-how-title{font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.32em;color:rgba(212,160,64,.35);text-transform:uppercase;margin-bottom:16px;}
.lk-hub-how-steps{display:flex;flex-direction:column;gap:10px;}
.lk-hub-step{
  display:flex;align-items:flex-start;gap:12px;font-family:'IM Fell English',serif;
  font-style:italic;font-size:.78rem;color:rgba(205,180,120,.38);
  padding:10px 14px;border:1px solid rgba(212,160,64,.07);
  background:rgba(212,160,64,.01);border-radius:6px;text-align:left;
}
.step-num{
  font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.12em;
  color:rgba(212,160,64,.55);background:rgba(212,160,64,.08);
  border:1px solid rgba(212,160,64,.2);width:22px;height:22px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* ── Lobby / Presence ── */
.lobby-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding:10px 0;width:100%;max-width:440px;}
.player-card{flex:1;min-width:120px;background:rgba(0,0,0,.4);border:1px solid;border-radius:12px;padding:16px 12px;text-align:center;position:relative;overflow:hidden;}
.presence-dot{width:9px;height:9px;border-radius:50%;animation:livePulse 1.4s ease-in-out infinite;}
.lobby-vs{display:flex;align-items:center;justify-content:center;gap:16px;width:100%;}
.lobby-vs-sep{display:flex;flex-direction:column;align-items:center;gap:5px;}
.lobby-vs-txt{font-family:'Cinzel Decorative',cursive;font-size:.78rem;color:rgba(212,160,64,.4);}
.lobby-waiting{display:flex;flex-direction:column;align-items:center;gap:12px;}
.lobby-ready{display:flex;flex-direction:column;align-items:center;gap:10px;}
.lobby-start{
  background:linear-gradient(135deg,rgba(212,160,64,.2),rgba(212,160,64,.1));
  border:1px solid rgba(212,160,64,.5);color:var(--gold);
  padding:12px 36px;border-radius:8px;cursor:pointer;
  font-family:'Cinzel Decorative',cursive;font-size:.82rem;letter-spacing:.06em;
  transition:all .25s;
}
.lobby-start:hover{background:rgba(212,160,64,.28);box-shadow:0 0 24px rgba(212,160,64,.2);}
.compact-pres{display:flex;align-items:center;gap:10px;padding:6px 12px;background:rgba(0,0,0,.3);border:1px solid rgba(212,160,64,.1);border-radius:20px;}
.cp-player{display:flex;align-items:center;gap:5px;}
.cp-dot{width:7px;height:7px;border-radius:50%;}
.cp-name{font-family:'IM Fell English',serif;font-style:italic;font-size:.7rem;color:rgba(205,180,120,.45);}

/* ── Dice ── */
.lk-dice-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .15s;}
.lk-dice-wrap.rolling{animation:diceShake .35s ease-in-out;}
@keyframes diceShake{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg)}75%{transform:rotate(12deg)}}
.dice-spin-txt,.dice-tap-hint{font-family:'IM Fell English',serif;font-style:italic;font-size:.72rem;color:rgba(205,180,120,.4);}

/* ── Toast ── */
.toast{
  position:fixed;top:18px;left:50%;transform:translateX(-50%);
  z-index:9999;padding:10px 22px;border-radius:8px;
  font-family:'IM Fell English',serif;font-style:italic;font-size:.88rem;
  animation:toastIn .3s cubic-bezier(.34,1.56,.64,1) both;
  box-shadow:0 8px 32px rgba(0,0,0,.6);white-space:nowrap;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-12px) scale(.9);}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}}
.toast-info{background:rgba(20,14,4,.97);border:1px solid rgba(212,160,64,.35);color:rgba(212,160,64,.9);}
.toast-capture{background:rgba(30,5,5,.97);border:1px solid rgba(200,60,60,.4);color:rgba(220,100,100,.9);}
.toast-home{background:rgba(4,20,8,.97);border:1px solid rgba(60,180,80,.4);color:rgba(80,200,100,.9);}
.toast-six{background:rgba(10,6,24,.97);border:1px solid rgba(120,80,220,.4);color:rgba(160,120,240,.9);}
.toast-win{background:rgba(20,16,2,.97);border:1px solid rgba(212,160,64,.7);color:var(--gold);}

/* ── Snake & Ladder ── */
.sl-layout{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;justify-content:center;width:100%;max-width:800px;margin-top:6px;}
.sl-ctrl{display:flex;flex-direction:column;gap:10px;min-width:150px;max-width:180px;padding-top:4px;}
.sl-score-card{display:flex;flex-direction:column;align-items:center;padding:10px 12px;background:rgba(0,0,0,.4);border:1px solid;border-radius:8px;min-width:72px;gap:2px;}

/* ── TTT / C4 / WordGuess ── */
.ttt-screen,.c4-screen,.wg-screen{padding-top:8px;}
.ttt-marks{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:340px;padding:10px 16px;margin:10px 0 4px;background:rgba(0,0,0,.25);border:1px solid rgba(212,160,64,.1);border-radius:10px;font-family:'Cinzel Decorative',cursive;font-size:.78rem;}
.ttt-board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0;padding:14px;background:rgba(0,0,0,.3);border:1px solid rgba(212,160,64,.13);border-radius:14px;width:min(310px,90vw);}
.ttt-cell{aspect-ratio:1;border-radius:10px;border:2px solid rgba(212,160,64,.18);background:rgba(10,3,26,.6);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.ttt-cell.hover:hover{border-color:rgba(212,160,64,.45);background:rgba(212,160,64,.06);transform:scale(1.04);}
.ttt-cell.filled{cursor:default;}
.ttt-cell.win-cell{border-color:rgba(212,160,64,.7);background:rgba(212,160,64,.1);box-shadow:0 0 16px rgba(212,160,64,.2);animation:winPulse .8s ease-in-out infinite alternate;}
@keyframes winPulse{from{box-shadow:0 0 8px rgba(212,160,64,.15);}to{box-shadow:0 0 22px rgba(212,160,64,.4);}}
.ttt-mark{font-size:2.2rem;font-weight:900;font-family:'Cinzel Decorative',cursive;animation:markPop .18s cubic-bezier(.2,1.4,.5,1) both;}
@keyframes markPop{from{transform:scale(0) rotate(-15deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.ttt-mark.tx{color:var(--gold);text-shadow:0 0 12px rgba(212,160,64,.6);}
.ttt-mark.to{color:#d46fa0;text-shadow:0 0 12px rgba(212,111,160,.6);}
.ttt-result{margin:8px 0;padding:14px 22px;background:rgba(212,160,64,.08);border:1px solid rgba(212,160,64,.25);border-radius:10px;font-family:'Cinzel Decorative',cursive;font-size:.85rem;color:var(--gold);text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;}
.ttt-replay{background:rgba(212,160,64,.12);border:1px solid rgba(212,160,64,.35);color:var(--gold);border-radius:8px;padding:6px 20px;font-family:'Cinzel Decorative',cursive;font-size:.68rem;cursor:pointer;transition:all .2s;}
.ttt-replay:hover{background:rgba(212,160,64,.22);box-shadow:0 0 12px rgba(212,160,64,.15);}
.c4-grid{display:flex;gap:5px;padding:12px;background:rgba(8,2,30,.85);border:2px solid rgba(212,160,64,.18);border-radius:14px;margin:12px 0;box-shadow:0 4px 24px rgba(0,0,0,.5);}
.c4-col{display:flex;flex-direction:column;gap:5px;align-items:center;cursor:pointer;padding:2px;border-radius:6px;transition:background .15s;position:relative;}
.c4-col.hoverable:hover{background:rgba(212,160,64,.07);}
.c4-preview{width:clamp(30px,8vw,42px);height:10px;border-radius:4px 4px 0 0;opacity:.75;margin-bottom:2px;animation:previewBounce .4s ease-in-out infinite alternate;}
@keyframes previewBounce{from{transform:translateY(0);}to{transform:translateY(-4px);}}
.c4-cell{width:clamp(30px,8vw,42px);height:clamp(30px,8vw,42px);border-radius:50%;background:rgba(20,8,44,.9);border:2px solid rgba(212,160,64,.1);transition:all .2s;}
.c4-cell.filled{border-color:transparent;animation:dropIn .25s cubic-bezier(.4,1.6,.6,1) both;}
@keyframes dropIn{from{transform:scaleY(0) scaleX(1.1);opacity:.5;}to{transform:scaleY(1) scaleX(1);opacity:1;}}
.wg-setter{display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px;background:rgba(0,0,0,.28);border:1px solid rgba(212,160,64,.12);border-radius:12px;max-width:340px;width:100%;margin:12px 0;text-align:center;}
.wg-role-label{font-family:'Cinzel Decorative',cursive;font-size:.82rem;color:rgba(205,180,120,.8);}
.wg-role-hint{font-family:'IM Fell English',serif;font-style:italic;font-size:.77rem;color:rgba(205,180,120,.45);line-height:1.5;}
.wg-input-row{display:flex;gap:8px;align-items:center;width:100%;max-width:300px;}
.wg-input{flex:1;background:rgba(10,3,26,.8);border:2px solid rgba(212,160,64,.3);border-radius:8px;padding:9px 13px;font-family:'Cinzel Decorative',cursive;font-size:1rem;color:var(--gold);text-align:center;letter-spacing:.25em;outline:none;transition:border-color .2s;}
.wg-input:focus{border-color:rgba(212,160,64,.65);}
.wg-btn{background:rgba(212,160,64,.15);border:1px solid rgba(212,160,64,.4);color:var(--gold);border-radius:8px;padding:9px 16px;font-family:'Cinzel Decorative',cursive;font-size:.72rem;cursor:pointer;white-space:nowrap;transition:all .2s;}
.wg-btn:hover{background:rgba(212,160,64,.25);box-shadow:0 0 12px rgba(212,160,64,.18);}
.wg-random{background:transparent;border:1px solid rgba(212,160,64,.18);color:rgba(212,160,64,.55);border-radius:8px;padding:6px 12px;font-family:'IM Fell English',serif;font-style:italic;font-size:.75rem;cursor:pointer;transition:all .2s;}
.wg-random:hover{color:var(--gold);border-color:rgba(212,160,64,.35);}
.wg-wait-dots{font-family:'IM Fell English',serif;font-style:italic;color:rgba(212,160,64,.5);font-size:.85rem;}
.wg-board{display:flex;flex-direction:column;gap:6px;margin:10px 0;width:min(320px,94vw);}
.wg-row{display:flex;gap:6px;justify-content:center;}
.wg-tile{width:clamp(44px,12vw,54px);height:clamp(44px,12vw,54px);border:2px solid rgba(212,160,64,.18);border-radius:6px;background:rgba(10,3,26,.7);display:flex;align-items:center;justify-content:center;font-family:'Cinzel Decorative',cursive;font-size:clamp(.9rem,3vw,1.1rem);color:rgba(205,180,120,.9);font-weight:700;transition:all .2s;}
.wg-tile.filled{border-color:rgba(212,160,64,.35);animation:tileFlip .3s ease both;}
@keyframes tileFlip{0%{transform:rotateX(-90deg);opacity:0;}100%{transform:rotateX(0);opacity:1;}}
.wg-tile.wg-g{background:#2d6a3a;border-color:#4caf71;color:#fff;box-shadow:0 0 8px rgba(76,175,113,.3);}
.wg-tile.wg-y{background:#7a5c1a;border-color:var(--gold);color:#fff;box-shadow:0 0 8px rgba(212,160,64,.25);}
.wg-tile.wg-b{background:rgba(14,6,30,.9);border-color:rgba(80,60,100,.4);color:rgba(180,160,200,.35);}

/* ── Chat ── */
.chat-fab{position:fixed;bottom:20px;right:16px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,rgba(28,10,50,.96),rgba(12,4,24,.98));border:2px solid rgba(212,160,64,.4);color:var(--gold);font-size:1.25rem;cursor:pointer;z-index:300;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.6);transition:all .2s;}
.chat-fab:hover{border-color:rgba(212,160,64,.7);box-shadow:0 4px 24px rgba(212,160,64,.16);}
.chat-fab.open{background:rgba(80,10,10,.9);border-color:rgba(220,80,80,.4);color:rgba(220,120,120,.8);}
.chat-badge{position:absolute;top:-3px;right:-3px;background:#e85;color:#fff;border-radius:50%;width:17px;height:17px;font-size:.58rem;display:flex;align-items:center;justify-content:center;font-family:sans-serif;border:2px solid #07001a;}
.chat-overlay{position:fixed;bottom:0;left:0;right:0;height:min(430px,74vh);background:linear-gradient(180deg,rgba(8,2,20,.97) 0%,rgba(12,4,28,.99) 100%);border-top:2px solid rgba(212,160,64,.22);z-index:290;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.7);}
.chat-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid rgba(212,160,64,.1);}
.chat-hdr-title{font-family:'Cinzel Decorative',cursive;font-size:.75rem;color:rgba(212,160,64,.65);flex-shrink:0;}
.chat-quick-row{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none;}
.chat-quick-row::-webkit-scrollbar{display:none;}
.chat-quick{background:rgba(255,255,255,.04);border:1px solid rgba(212,160,64,.1);border-radius:8px;font-size:1rem;padding:2px 6px;cursor:pointer;transition:background .15s;flex-shrink:0;}
.chat-quick:hover{background:rgba(212,160,64,.12);}
.chat-close{background:transparent;border:none;color:rgba(212,160,64,.4);cursor:pointer;font-size:1rem;padding:2px 5px;flex-shrink:0;}
.chat-msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:7px;scrollbar-width:thin;scrollbar-color:rgba(212,160,64,.12) transparent;}
.chat-empty{font-family:'IM Fell English',serif;font-style:italic;color:rgba(205,180,120,.2);text-align:center;padding:24px;font-size:.82rem;}
.cb{max-width:78%;display:flex;flex-direction:column;gap:2px;}
.cb.mine{align-self:flex-end;align-items:flex-end;}
.cb.theirs{align-self:flex-start;align-items:flex-start;}
.ct{padding:8px 12px;border-radius:12px;font-family:'IM Fell English',serif;font-size:.86rem;line-height:1.5;word-break:break-word;}
.ct.emoji-only{font-size:1.8rem;padding:4px 8px;background:transparent!important;border:none!important;}
.cb.mine .ct{border-radius:12px 12px 4px 12px;color:rgba(255,240,200,.9);}
.cb.theirs .ct{border-radius:12px 12px 12px 4px;color:rgba(255,220,235,.9);}
.cts{font-size:.6rem;color:rgba(205,180,120,.28);font-family:'IM Fell English',serif;}
.typing-row{display:flex;align-items:center;gap:3px;padding:3px 0;}
.td{width:6px;height:6px;border-radius:50%;background:rgba(212,111,160,.5);animation:tdB .9s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.18s;}.td:nth-child(3){animation-delay:.36s;}
@keyframes tdB{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
.emoji-grid{display:flex;flex-wrap:wrap;gap:2px;padding:7px 10px;border-bottom:1px solid rgba(212,160,64,.09);max-height:105px;overflow-y:auto;scrollbar-width:thin;}
.emoji-btn{background:transparent;border:none;font-size:1.12rem;cursor:pointer;padding:3px;border-radius:4px;transition:background .12s;}
.emoji-btn:hover{background:rgba(212,160,64,.1);}
.chat-inp-bar{display:flex;align-items:center;gap:7px;padding:9px 11px;border-top:1px solid rgba(212,160,64,.09);}
.emoji-tog{background:transparent;border:none;font-size:1.15rem;cursor:pointer;padding:3px;flex-shrink:0;}
.chat-inp{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(212,160,64,.18);border-radius:20px;padding:8px 13px;color:rgba(255,240,200,.9);font-family:'IM Fell English',serif;font-size:.86rem;outline:none;}
.chat-inp::placeholder{color:rgba(205,180,120,.25);}
.chat-inp:focus{border-color:rgba(212,160,64,.4);}
.chat-snd{background:rgba(212,160,64,.15);border:1px solid rgba(212,160,64,.35);color:var(--gold);border-radius:50%;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;font-size:.88rem;}
.chat-snd:hover{background:rgba(212,160,64,.28);}

/* ── Room gate ── */
.rg-screen{display:flex;flex-direction:column;align-items:center;padding:20px 16px 60px;width:100%;max-width:420px;text-align:center;}
.rg-icon{font-size:2.8rem;margin:12px 0 6px;filter:drop-shadow(0 0 12px rgba(212,160,64,.3));}
.rg-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.1rem,4vw,1.5rem);color:var(--gold);text-shadow:0 0 24px rgba(212,160,64,.4);margin-bottom:5px;}
.rg-tagline{font-family:'IM Fell English',serif;font-style:italic;color:rgba(205,180,120,.38);font-size:.82rem;margin-bottom:24px;}
.rg-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;width:100%;}
.rg-card{width:clamp(150px,42vw,185px);background:linear-gradient(145deg,rgba(24,8,46,.95),rgba(10,2,22,.98));border:1px solid rgba(212,160,64,.18);border-radius:14px;padding:22px 14px 18px;cursor:pointer;transition:all .28s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;box-shadow:0 4px 22px rgba(0,0,0,.5);}
.rg-card:hover{transform:translateY(-6px);border-color:rgba(212,160,64,.5);box-shadow:0 12px 36px rgba(212,160,64,.1);}
.rg-card-glow{position:absolute;top:-60%;left:-60%;width:220%;height:220%;background:radial-gradient(ellipse at 35% 35%,rgba(212,160,64,.06) 0%,transparent 60%);pointer-events:none;}
.rg-create{border-color:rgba(212,160,64,.22);}
.rg-join{border-color:rgba(212,111,160,.18);}
.rg-card-icon{font-size:1.8rem;margin-bottom:10px;}
.rg-card-label{font-family:'Cinzel Decorative',cursive;font-size:.82rem;color:var(--gold);margin-bottom:7px;}
.rg-card-desc{font-family:'IM Fell English',serif;font-style:italic;font-size:.73rem;color:rgba(205,180,120,.42);line-height:1.55;margin-bottom:12px;}
.rg-card-cta{font-family:'Cinzel Decorative',cursive;font-size:.65rem;color:rgba(212,160,64,.5);letter-spacing:.08em;transition:color .2s;}
.rg-card:hover .rg-card-cta{color:var(--gold);}
.rg-otp-row{display:flex;gap:10px;justify-content:center;margin:18px 0 12px;}
.rg-otp-box{width:52px;height:62px;background:rgba(0,0,0,.45);border:2px solid rgba(212,160,64,.22);border-radius:10px;color:var(--gold);font-family:'Cinzel Decorative',cursive;font-size:1.6rem;text-align:center;outline:none;caret-color:transparent;transition:border-color .2s,box-shadow .2s;}
.rg-otp-box:focus{border-color:rgba(212,160,64,.7);box-shadow:0 0 16px rgba(212,160,64,.15);}
.rg-otp-box.filled{border-color:rgba(212,160,64,.55);background:rgba(212,160,64,.06);}
.rg-err{font-family:'IM Fell English',serif;font-style:italic;font-size:.78rem;color:#ff8877;margin:-4px 0 8px;padding:6px 14px;background:rgba(180,40,40,.12);border:1px solid rgba(200,60,60,.25);border-radius:4px;}
.rg-join-btn{background:linear-gradient(135deg,rgba(212,160,64,.18),rgba(212,160,64,.1));border:1px solid rgba(212,160,64,.45);color:var(--gold);padding:11px 32px;border-radius:8px;cursor:pointer;font-family:'Cinzel Decorative',cursive;font-size:.82rem;letter-spacing:.06em;transition:all .22s;margin-bottom:14px;}
.rg-join-btn:hover:not(:disabled){background:rgba(212,160,64,.26);box-shadow:0 0 20px rgba(212,160,64,.15);}
.rg-join-btn:disabled{opacity:.3;cursor:not-allowed;}
.rg-hint{font-family:'IM Fell English',serif;font-style:italic;font-size:.72rem;color:rgba(205,180,120,.28);line-height:1.55;max-width:300px;}
.rg-code-block{background:linear-gradient(145deg,rgba(20,6,40,.95),rgba(10,2,22,.98));border:1px solid rgba(212,160,64,.28);border-radius:14px;padding:22px 26px;margin-bottom:22px;width:100%;max-width:320px;}
.rg-code-label{font-family:'IM Fell English',serif;font-style:italic;color:rgba(205,180,120,.45);font-size:.78rem;margin-bottom:14px;}
.rg-code-display{display:flex;gap:8px;justify-content:center;margin-bottom:14px;}

const SB_H=()=>({
  "apikey": SB_KEY,
  "Authorization": "Bearer "+SB_KEY,
  "Content-Type": "application/json",
  "Prefer": "return=representation"
});
// Convert /rooms/ABCD/ttt_state  →  ABCD__ttt_state
function sbId(p){return p.replace(/^\/rooms\//,"").replace(/\//g,"__");}

async function fbGet(p){
  try{
    const r=await fetch(SB_URL+"/rest/v1/rooms?id=eq."+encodeURIComponent(sbId(p)),{headers:SB_H()});
    if(!r.ok)return null;
    const a=await r.json();
    return a.length?a[0].data:null;
  }catch{return null;}
}
async function fbGetEx(p){
  try{
    const r=await fetch(SB_URL+"/rest/v1/rooms?id=eq."+encodeURIComponent(sbId(p)),{headers:SB_H()});
    if(!r.ok){
      const body=await r.text().catch(()=>"");
      if(SB_URL.includes("PASTE")||SB_KEY.includes("PASTE"))
        return{data:null,err:"⚠️ Supabase not configured — open the JSX file and fill in SB_URL and SB_KEY"};
      return{data:null,err:"Supabase error "+r.status+(body.includes("permission")?" — check RLS policies":"")};
    }
    const a=await r.json();
    return{data:a.length?a[0].data:null,err:null};
  }catch(e){
    const msg=e?.message||"unknown";
    if(SB_URL.includes("PASTE")||SB_KEY.includes("PASTE"))
      return{data:null,err:"⚠️ Supabase not configured — open the JSX file and fill in SB_URL and SB_KEY"};
    return{data:null,err:"Cannot reach Supabase: "+msg+" — check your URL and key"};
  }
}
async function fbSet(p,d){
  try{
    const r=await fetch(SB_URL+"/rest/v1/rooms",{
      method:"POST",
      headers:{...SB_H(),"Prefer":"resolution=merge-duplicates,return=representation"},
      body:JSON.stringify({id:sbId(p),data:d,updated_at:new Date().toISOString()})
    });
    if(!r.ok){const b=await r.text().catch(()=>"");console.error("sbSet failed",r.status,b);}
    return r.ok;
  }catch(e){console.error("sbSet threw",e?.message);return false;}
}
async function fbPatch(p,d){
  const existing=await fbGet(p)||{};
  return fbSet(p,{...existing,...d});
}
async function fbPush(p,d){
  const existing=await fbGet(p)||{};
  const key="msg_"+Date.now();
  return fbSet(p,{...existing,[key]:d})?key:null;
}

// ROOM CODE MATCHMAKING
// Host creates a 4-digit room code. Guest types it to join.
// Firebase path: /rooms/{CODE}/{gameKey}
// No timestamps, no polling for "online", no clock comparison.
// ════════════════════════════════════════════════════════════════
function genCode(){return String(Math.floor(1000+Math.random()*9000));}

function RoomGate({gameKey,gameTitle,gameIcon,initState,onJoined}){
  const [screen,setScreen]=useState("menu"); // menu | creating | joining | waiting
  const [code,setCode]=useState("");
  const [inputCode,setInputCode]=useState(["","","",""]);
  const [err,setErr]=useState("");
  const [waitDots,setWaitDots]=useState(".");
  const roomPath=code?"/rooms/"+code+"/"+gameKey:null;
  const inputRefs=[useRef(),useRef(),useRef(),useRef()];

  // Animate waiting dots
  useEffect(()=>{
    if(screen!=="waiting")return;
    const iv=setInterval(()=>setWaitDots(d=>d.length>=3?".":".".repeat(d.length+1)),600);
    return()=>clearInterval(iv);
  },[screen]);

  // While waiting (host): poll for guest joining
  useEffect(()=>{
    if(screen!=="waiting"||!roomPath)return;
    const iv=setInterval(async()=>{
      const d=await fbGet(roomPath);
      if(d&&d.p2===true){
        clearInterval(iv);
        // Reset game state fresh for this session
        await fbSet(roomPath+"_state",{...initState,ts:Date.now()});
        onJoined(1,code);
      }
    },1500);
    return()=>clearInterval(iv);
  },[screen,roomPath]);

  const createRoom=async()=>{
    const c=genCode();
    setErr("Creating room…");
    const ok=await fbSet("/rooms/"+c+"/"+gameKey,{p1:true,p2:false,ts:Date.now()});
    if(!ok){setErr("Firebase write failed — check your database rules (Firebase Console → Realtime Database → Rules → set .read and .write to true)");return;}
    setCode(c);
    setErr("");
    setScreen("waiting");
  };

  const joinRoom=async()=>{
    const c=inputCode.join("");
    if(c.length!==4){setErr("Enter all 4 digits");return;}
    setErr("Checking…");
    const {data:d,err:connErr}=await fbGetEx("/rooms/"+c+"/"+gameKey);
    if(connErr){setErr(connErr);return;}
    if(!d||!d.p1){setErr("Room not found. Check the code!");return;}
    if(d.p2){setErr("Room is full — game already started!");return;}
    const patched=await fbPatch("/rooms/"+c+"/"+gameKey,{p2:true});
    if(!patched){setErr("Connection error — try again.");return;}
    setErr("");
    setCode(c);
    onJoined(2,c);
  };

  const handleDigit=(i,val)=>{
    if(!/^\d*$/.test(val))return;
    const next=[...inputCode];
    next[i]=val.slice(-1);
    setInputCode(next);
    setErr("");
    if(val&&i<3)inputRefs[i+1].current?.focus();
    if(!val&&i>0)inputRefs[i-1].current?.focus();
  };

  const handleDigitKey=(i,e)=>{
    if(e.key==="Backspace"&&!inputCode[i]&&i>0){
      inputRefs[i-1].current?.focus();
    }
    if(e.key==="Enter")joinRoom();
  };

  if(screen==="menu")return(
    <div className="rg-screen">
      <button className="lk-back" onClick={()=>onJoined(0,"")}>← Back</button>
      <div className="rg-icon">{gameIcon}</div>
      <div className="rg-title">{gameTitle}</div>
      <div className="rg-tagline">Private room · Just the two of you</div>
      {err&&<div className="rg-err" style={{maxWidth:"320px",textAlign:"center",lineHeight:"1.5"}}>{err}</div>}
      <div className="rg-cards">
        <div className="rg-card rg-create" onClick={createRoom}>
          <div className="rg-card-glow"/>
          <div className="rg-card-icon">🏠</div>
          <div className="rg-card-label">Create Room</div>
          <div className="rg-card-desc">Start a new game and share the code with her</div>
          <div className="rg-card-cta">You go first →</div>
        </div>
        <div className="rg-card rg-join" onClick={()=>{setScreen("joining");setTimeout(()=>inputRefs[0].current?.focus(),100);}}>
          <div className="rg-card-glow"/>
          <div className="rg-card-icon">🔑</div>
          <div className="rg-card-label">Join Room</div>
          <div className="rg-card-desc">Enter the 4-digit code she sent you</div>
          <div className="rg-card-cta">Enter code →</div>
        </div>
      </div>
    </div>
  );

  if(screen==="joining")return(
    <div className="rg-screen">
      <button className="lk-back" onClick={()=>setScreen("menu")}>← Back</button>
      <div className="rg-icon">{gameIcon}</div>
      <div className="rg-title">Enter Room Code</div>
      <div className="rg-tagline">Ask her to share the 4-digit code</div>
      <div className="rg-otp-row">
        {inputCode.map((d,i)=>(
          <input key={i} ref={inputRefs[i]} className={"rg-otp-box"+(d?" filled":"")}
            type="text" inputMode="numeric" maxLength={1} value={d}
            onChange={e=>handleDigit(i,e.target.value)}
            onKeyDown={e=>handleDigitKey(i,e)}
            onFocus={e=>e.target.select()}/>
        ))}
      </div>
      {err&&<div className="rg-err">{err}</div>}
      <button className="rg-join-btn" onClick={joinRoom}
        disabled={inputCode.join("").length!==4}>
        Join Game ✦
      </button>
      <div className="rg-hint">Ask her to open the same game and tap "Create Room"</div>
    </div>
  );

  if(screen==="waiting")return(
    <div className="rg-screen">
      <button className="lk-back" onClick={()=>{setScreen("menu");setCode("");}}>← Cancel</button>
      <div className="rg-icon">{gameIcon}</div>
      <div className="rg-title">Room Created!</div>
      <div className="rg-code-block">
        <div className="rg-code-label">Share this code with her</div>
        <div className="rg-code-display">
          {code.split("").map((d,i)=>(
            <div key={i} className="rg-code-digit">{d}</div>
          ))}
        </div>
        <button className="rg-copy-btn" onClick={()=>{
          navigator.clipboard?.writeText(code).catch(()=>{});
        }}>📋 Copy Code</button>
      </div>
      <div className="rg-waiting-row">
        <div className="rg-waiting-ring"/>
        <div className="rg-waiting-txt">Waiting for her to join{waitDots}</div>
      </div>
      <div className="rg-waiting-sub">She needs to tap "Join Room" and enter <strong style={{color:"#d4a040"}}>{code}</strong></div>
    </div>
  );

  return null;
}

// DICE — animated roll, cycles numbers
// ════════════════════════════════════════════════════════════════
const DICE_DOTS={
  1:[[50,50]],
  2:[[30,30],[70,70]],
  3:[[30,30],[50,50],[70,70]],
  4:[[30,30],[70,30],[30,70],[70,70]],
  5:[[30,30],[70,30],[50,50],[30,70],[70,70]],
  6:[[30,23],[70,23],[30,50],[70,50],[30,77],[70,77]]
};

function DiceFace({value,rolling,canRoll,onRoll,color}){
  const [display,setDisplay]=useState(value||1);
  const col=color||P1C;
  const tiRef=useRef(null);

  useEffect(()=>{
    if(rolling){
      let i=0;
      tiRef.current=setInterval(()=>{
        setDisplay(Math.floor(Math.random()*6)+1);
        i++;
        if(i>14){clearInterval(tiRef.current);}
      },60);
    } else {
      clearInterval(tiRef.current);
      if(value)setDisplay(value);
    }
    return()=>clearInterval(tiRef.current);
  },[rolling,value]);

  return(
    <div className={"lk-dice-wrap"+(rolling?" rolling":"")}
      onClick={canRoll&&!rolling?onRoll:undefined}
      style={{cursor:canRoll&&!rolling?"pointer":"default",opacity:(!canRoll&&!rolling&&!value)?0.35:1}}>
      <svg viewBox="0 0 100 100" width="80" height="80">
        <defs>
          <linearGradient id="dgDiceFace" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#1e0d00"/>
            <stop offset="100%" stopColor="#0a0400"/>
          </linearGradient>
          <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stopColor="rgba(255,255,255,0.07)"/>
            <stop offset="100%" stopColor="rgba(0,0,0,0)"/>
          </linearGradient>
          <filter id="dg-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        {/* Shadow */}
        <rect x="8" y="10" width="88" height="88" rx="18" fill="rgba(0,0,0,0.5)"/>
        {/* Body */}
        <rect x="4" y="4" width="88" height="88" rx="18" fill="url(#dgDiceFace)" stroke={col} strokeWidth="2.5" filter="url(#dg-glow)"/>
        {/* Top shine */}
        <rect x="10" y="8" width="76" height="38" rx="12" fill="url(#shine)"/>
        {/* Dots */}
        {(DICE_DOTS[display]||[]).map(([x,y],i)=>(
          <circle key={i} cx={x} cy={y} r="9"
            fill={col}
            style={{filter:"drop-shadow(0 0 3px "+col+"99)"}}/>
        ))}
        {/* Tap hint */}
        {!value&&!rolling&&canRoll&&(
          <text x="50" y="62" textAnchor="middle" fill={col} fontSize="12" fontFamily="serif" opacity="0.6">TAP</text>
        )}
      </svg>
      {rolling&&<div className="dice-spin-txt">Rolling…</div>}
      {canRoll&&!rolling&&!value&&<div className="dice-tap-hint" style={{color:col}}>Roll dice</div>}
    </div>
  );
}

// TOAST NOTIFICATION
// ════════════════════════════════════════════════════════════════
function Toast({msg,type}){
  if(!msg)return null;
  return <div className={"toast toast-"+type}>{msg}</div>;
}
function useToast(){
  const [toast,setToast]=useState(null);
  const tiRef=useRef(null);
  const show=(msg,type="info",dur=2800)=>{
    setToast({msg,type});
    clearTimeout(tiRef.current);
    tiRef.current=setTimeout(()=>setToast(null),dur);
  };
  return[toast,show];
}

// CHAT PANEL
// ════════════════════════════════════════════════════════════════
function ChatPanel({myP,chatPath,presPath,open,onClose}){
  const [msgs,setMsgs]=useState([]);
  const [inp,setInp]=useState("");
  const [showEmoji,setShowEmoji]=useState(false);
  const [otherTyping,setOtherTyping]=useState(false);
  const [unread,setUnread]=useState(0);
  const bottomRef=useRef(null);
  const typingTimer=useRef(null);
  const lastTs=useRef(Date.now());
  const openRef=useRef(open);
  useEffect(()=>{openRef.current=open;},[open]);

  useEffect(()=>{
    if(!myP||!chatPath)return;
    const poll=async()=>{
      const cd=await fbGet(chatPath);
      if(cd){
        const arr=Object.values(cd).sort((a,b)=>a.ts-b.ts);
        setMsgs(arr);
        if(!openRef.current){
          const nc=arr.filter(m=>m.player!==myP&&m.ts>lastTs.current).length;
          if(nc>0)setUnread(n=>n+nc);
          if(arr.length)lastTs.current=arr[arr.length-1].ts;
        }
      }
      const pd=await fbGet(presPath);
      const other=myP===1?2:1;
      if(pd)setOtherTyping(!!(pd["t"+other]));
    };
    poll();
    const iv=setInterval(poll,2500);
    return()=>clearInterval(iv);
  },[myP,chatPath,presPath]);

  useEffect(()=>{
    if(open){
      setUnread(0);
      if(msgs.length)lastTs.current=msgs[msgs.length-1].ts;
    }
  },[open]);

  useEffect(()=>{
    if(open&&bottomRef.current)bottomRef.current.scrollIntoView({behavior:"smooth"});
  },[msgs,otherTyping,open]);

  const handleInp=(e)=>{
    setInp(e.target.value);
    fbPatch(presPath,{["t"+myP]:true});
    clearTimeout(typingTimer.current);
    typingTimer.current=setTimeout(()=>fbPatch(presPath,{["t"+myP]:false}),2000);
  };
  const send=async()=>{
    const t=inp.trim();if(!t)return;
    await fbPush(chatPath,{player:myP,text:t,ts:Date.now()});
    setInp("");setShowEmoji(false);
    fbPatch(presPath,{["t"+myP]:false});
    clearTimeout(typingTimer.current);
  };
  const quickReact=(e)=>fbPush(chatPath,{player:myP,text:e,ts:Date.now()});

  return(
    <>
      <button className={"chat-fab"+(open?" open":"")} onClick={()=>onClose()}>
        {open?"✕":"💬"}
        {!open&&unread>0&&<span className="chat-badge">{unread>9?"9+":unread}</span>}
      </button>
      {open&&(
        <div className="chat-overlay">
          <div className="chat-hdr">
            <span className="chat-hdr-title">💬 Chat</span>
            <div className="chat-quick-row">
              {["❤️","😂","🥺","💛","🤭","🙏"].map(e=>(
                <button key={e} className="chat-quick" onClick={()=>quickReact(e)}>{e}</button>
              ))}
            </div>
            <button className="chat-close" onClick={()=>onClose()}>✕</button>
          </div>
          <div className="chat-msgs">
            {msgs.length===0&&<div className="chat-empty">Say something sweet… 💌</div>}
            {msgs.map((m,i)=>{
              const mine=m.player===myP;
              const isEmoji=[...m.text].length===1||m.text.length<=2;
              return(
                <div key={i} className={"cb"+(mine?" mine":" theirs")}>
                  <div className={"ct"+(isEmoji?" emoji-only":"")} style={mine?{background:"rgba(212,160,64,.18)",border:"1px solid rgba(212,160,64,.22)"}:{background:"rgba(212,111,160,.14)",border:"1px solid rgba(212,111,160,.18)"}}>{m.text}</div>
                  <div className="cts">{new Date(m.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>
                </div>
              );
            })}
            {otherTyping&&(
              <div className="typing-row">
                <span className="td"/><span className="td"/><span className="td"/>
                <span style={{marginLeft:5,color:P2C,fontSize:".7rem",fontStyle:"italic"}}>typing…</span>
              </div>
            )}
            <div ref={bottomRef}/>
          </div>
          {showEmoji&&(
            <div className="emoji-grid">
              {EMOJIS.map(e=><button key={e} className="emoji-btn" onClick={()=>{setInp(v=>v+e);setShowEmoji(false);}}>{e}</button>)}
            </div>
          )}
          <div className="chat-inp-bar">
            <button className="emoji-tog" onClick={()=>setShowEmoji(s=>!s)}>😊</button>
            <input className="chat-inp" value={inp} onChange={handleInp}
              onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Say something sweet…"/>
            <button className="chat-snd" onClick={send}>➤</button>
          </div>
        </div>
      )}
    </>
  );
}

// GAME PRESENCE BAR — shows who is online in the game room

function GamePresenceBar({myP, presPath}){
  const [online,setOnline]=useState({p1:false,p2:false});
  useEffect(()=>{
    if(!myP||!presPath)return;
    const ping=()=>fbPatch(presPath,{["on"+myP]:Date.now()});
    ping();
    const iv=setInterval(async()=>{
      ping();
      const d=await fbGet(presPath);
      if(d){
        const now=Date.now();
        setOnline({p1:!!(d.on1&&now-d.on1<9000),p2:!!(d.on2&&now-d.on2<9000)});
      }
    },3000);
    return()=>clearInterval(iv);
  },[myP,presPath]);
  const players=[
    {p:1,label:myP===1?"You":"Her",col:P1C},
    {p:2,label:myP===2?"You":"Her",col:P2C},
  ];
  return(
    <div className="pres-row">
      {players.map(({p,label,col})=>{
        const isOn=online[p===1?"p1":"p2"];
        return(
          <div key={p} className="pc-compact">
            <div className={"pc-dot"+(isOn?" pc-on":"")} style={isOn?{}:{background:"rgba(120,100,80,.25)"}}/>
            <span className="pc-status-sm" style={{color:isOn?col:"rgba(205,180,120,.3)"}}>
              {label} {isOn?"· online":"· waiting"}
            </span>
          </div>
        );
      })}
    </div>
  );
}
